<!DOCTYPE html>
<html lang="en"><head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="apple-touch-icon" href="logo.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>    
  <style>        
    :root {            
      --primary: #2f6df6;            
      --bg: #f8fafc;            
      --glass: rgba(255, 255, 255, 0.95);            
      --card-bg: #ffffff;            
      --text: #1e293b;            
      --text-muted: #64748b;            
      --border: #e2e8f0;radius: 24px;            
      --shadow: 0 10px 30px rgba(0,0,0,0.08);            
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);        
    }       
     body.dark-mode {            
       --bg: #0f172a;            
       --glass: rgba(15, 23, 42, 0.9);            
       --card-bg: #1e293b;            
       --text: #f8fafc;            
       --text-muted: #94a3b8;            
       --border: rgba(255,255,255,0.1);            
       --shadow: 0 10px 40px rgba(0,0,0,0.4);        
     }        body {            
       margin: 0; font-family: 'Inter', sans-serif;            
       background: var(--bg); color: var(--text);            
       overflow-x: hidden; transition: background 0.5s ease;        
     }        
    .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }        
    @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }        
    #loading {            position: fixed; inset: 0; background: var(--bg);            
              display: flex; flex-direction: column; justify-content: center;            
              align-items: center; z-index: 9999;            
              transition: opacity 0.5s ease, transform 0.5s ease;        
             }        
    #loading.fade-out { 
      opacity: 0; transform: scale(1.05); pointer-events: none; 
    }
    #loading img { 
      animation: pulse 1.5s ease-in-out infinite; 
    }        
    @keyframes pulse {            
      0%, 100% { transform: scale(1); opacity: 1; }            
      50% { transform: scale(1.1); opacity: 0.7; }
    }        
    .saving-overlay {             
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);             
      display: none; flex-direction: column; justify-content: center;            
      align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white;         
    }        
    .theme-btn {            
      position: absolute; top: 15px; left: 20px;
      background: none; border: none; cursor: pointer; color: var(--text);            
      z-index: 101; transition: var(--transition);        
    }        
    /* --- AUTH SCREEN STYLES --- */        
    .auth-container {            
      display: flex; flex-direction: column; align-items: center; justify-content: center;            
      padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;        
    }        
    .auth-choice-btn {            
      width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border);            
      background: var(--card-bg); color: var(--text); cursor: pointer;            
      margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px;            
      font-weight: 700; font-size: 16px;        
    }        
    .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }        
    .auth-choice-btn i { color: var(--primary); }        
    .home-header {            
      display: flex; flex-direction: column; align-items: center;            
      padding: 15px 0 10px 0; background: var(--glass);             
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);        
    }        
    .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 600px; margin-bottom: 10px; }        
    .main-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; cursor: pointer;}        
    .search-box {            
      flex: 1; background: var(--border);            
      display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;            
      transition: var(--transition); border: 1px solid transparent;        
    }        
    .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }        
    /* HIDDEN UNLESS SEARCHING */        
    #sortGridContainer { display: none; }        
    .sort-select {             
      background: var(--card-bg); color: var(--text); border: 1px solid var(--border);             
      padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; outline: none;        
    }        
    .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }        
    .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 600; }        
    .chip.active { background: var(--primary); color: white; border-color: var(--primary); }        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }        
    .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }        
    .card img { width: 100%; display: block; }        
    .card .stack-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; backdrop-filter: blur(5px); z-index: 5;}        
    /* HOVER OVERLAY */                
    .card-overlay {            
      position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%);            
      opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end;            
      padding: 20px; color: white;        
    }        
    .card:hover .card-overlay { opacity: 1; }        
    .overlay-title { font-weight: 800; font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }        
    .overlay-likes { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; opacity: 0.9; }        
    .overlay-title { font-weight: 800; font-size: 14px; margin-bottom: 4px; }        
    .overlay-likes { display: flex; align-items: center; gap: 5px; font-size: 12px; opacity: 0.9; }        
    /* LIKE ANIMATION */        
    @keyframes heartPop {            
      0% { transform: scale(1); }            
      50% { transform: scale(1.4); }            
      100% { transform: scale(1); }        
    }        
    .heart-active { animation: heartPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }        
    #detailsModal, #uploadModal {             
      position: fixed; inset: 0; background: var(--bg); z-index: 2000;             
      display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto;        
    }        
    #dropZone {            
      position: fixed; inset: 0; background: rgba(47, 109, 246, 0.2);            
      backdrop-filter: blur(10px); z-index: 6000; display: none;            
      border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;            
      align-items: center; justify-content: center; pointer-events: none;        
    }        
    .split-container { display: flex; flex-direction: column; min-height: 100%; width: 100%; }        
    .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 350px; position: relative; }        
    .view-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; min-height: 400px; }        
    .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; }        
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: 0.2s; }        
    .nav-btn:hover { background: rgba(255,255,255,0.3); }        
    .nav-prev { left: 20px; }        
    .nav-next { right: 20px; }        
    .img-counter { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; backdrop-filter: blur(10px); }        
    .view-right { flex: 1; padding: 35px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 5;}        
    .preview-area {            
      width: 100%; height: 200px; border-radius: 20px; border: 2px dashed var(--border);            
      margin-bottom: 20px; display: flex; align-items: center; justify-content: center;            
      overflow: hidden; background: var(--bg); position: relative; cursor: pointer;        
    }        
    .preview-area:hover { border-color: var(--primary); background: rgba(47, 109, 246, 0.05); }        
    .preview-area img { max-width: 100%; max-height: 100%; object-fit: contain; }        
    .view-right { flex: 0.8; padding: 40px; background: var(--card-bg); overflow-y: auto; }        
    .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}        
    input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}        
    /* COMMENTS SYSTEM */        
    .comments-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }        
    .comment-item { margin-bottom: 20px; padding-left: 10px; border-left: 2px solid var(--border); }        
    .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }        
    .comment-author { font-weight: 800; font-size: 13px; color: var(--primary); }        
    .comment-text { font-size: 14px; line-height: 1.5; color: var(--text); }        
    .comment-actions { font-size: 11px; margin-top: 5px; color: var(--text-muted); cursor: pointer; font-weight: 700; }        
    .reply-item { margin-left: 30px; margin-top: 15px; border-left: 2px solid var(--primary); padding-left: 15px; opacity: 0.9; }        
    .tag-creator { display: flex; gap: 10px; margin-bottom: 15px; }        .tag-creator input { margin-bottom: 0; flex: 1; }        
    .tag-creator button { width: auto; padding: 0 20px; margin-bottom: 0; }        
    .comment-input-area { display: flex; gap: 10px; margin-top: 20px; background: var(--bg); padding: 10px; border-radius: 15px; }        
    .comment-input-area input { margin-bottom: 0; background: transparent; border: none; }        
    @media (min-width: 900px) {        
      .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); }        
      input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}        
      @media (min-width: 1000px) {            
        .split-container { flex-direction: row; }            
        .view-right { flex: 0.5; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }            
        .view-left { flex: 1.5; }            .view-right { height: 100vh; position: sticky; top: 0; }        
      }        
      @keyframes spin { to { transform: rotate(360deg); } }    
  </style>
</head>

                                  <textarea id="upLink" placeholder="Image URL"></textarea>        
                                  <textarea id="upCaption" placeholder="Caption"></textarea>        
                                  <input type="text" id="upSource" placeholder="Source Website">        
                                  <div id="modalTags" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px;"></div>        
                                  <button class="primary-btn" onclick="postAsset()">Post to PIXS Cloud</button>        
                                  <button onclick="closeModal('uploadModal')" style="width:100%; border:none; background:none; color:var(--text-muted); margin-top:15px; cursor:pointer;">Cancel</button>
                                </div>
                              </div>
                             <script>
    // --- Configuration & State ---
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";
    const collectionList = ["Nature", "Architecture", "Minimal", "Abstract", "Tech"]; // Default tags

    let allAssets = [];
    let selectedTags = [];
    let currentViewAsset = null;
    let currentImgIdx = 0;
    let editIndex = null;
    let currentUserRole = null;
    let activeReplyTo = null;
    const colorThief = new ColorThief();

    // --- Initialization ---
    window.onload = async () => {
        lucide.createIcons();
        
        // Theme Setup
        if (localStorage.getItem('pixs_dark') === 'true') {
            document.body.classList.add('dark-mode');
            toggleTheme(true);
        }

        // Auth Setup
        currentUserRole = localStorage.getItem('pixs_role');
        if (currentUserRole) {
            showApp();
            await syncFromBin();
        } else {
            showAuth();
        }

        // UI Setup
        setTimeout(() => {
            document.getElementById('loading').classList.add('fade-out');
            renderHomeCollections();
            setupDragAndDrop();
            setupSwipeDetection();
        }, 1000);
    };

    // --- Authentication Logic ---
    function showAuth() {
        document.getElementById('auth').style.display = 'block';
        document.getElementById('app').style.display = 'none';
        document.title = "PIXS | Auth";
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.title = "PIXS | Discover the Extraordinary";
        if (currentUserRole === 'admin') {
            document.getElementById('adminFab').style.display = 'flex';
        }
    }

    function login(role) {
        localStorage.setItem('pixs_role', role);
        currentUserRole = role;
        location.reload();
    }

    function checkAuth() {
        const pass = document.getElementById('accessKey').value;
        if (pass === ADMIN_PASS) login('admin');
        else alert("Access Denied: Incorrect Admin Password");
    }

    function logout() {
        if (confirm("Logout from PIXS?")) {
            localStorage.removeItem('pixs_role');
            location.reload();
        }
    }

    // --- Data Syncing (JSONBin) ---
    async function syncFromBin() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await res.json();
            allAssets = data.record.assets || [];
            applySort();
        } catch (e) { 
            console.error("Sync Error:", e); 
        }
    }

    async function updateBin(silent = false) {
        if (!silent) {
            document.getElementById('saving').style.display = 'flex';
            document.getElementById('savingText').innerText = "Syncing with Cloud...";
        }
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        if (!silent) {
            document.getElementById('saving').style.display = 'none';
            applySort();
        } else {
            renderGrid(allAssets);
        }
    }

    // --- Grid Rendering & Filtering ---
    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset) => {
            const realIndex = allAssets.indexOf(asset);
            const displayUrl = asset.urls ? asset.urls[0] : asset.url;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                ${(asset.urls?.length > 1) ? `<div class="stack-badge">${asset.urls.length}</div>` : ''}
                <img src="${processUrl(displayUrl)}" loading="lazy">
                <div class="card-overlay">
                    <div class="overlay-title">${asset.name}</div>
                    <div class="overlay-likes"><i data-lucide="heart" size="12" style="fill:white"></i> ${asset.likes || 0}</div>
                </div>
            `;
            card.onclick = () => openDetails(asset, realIndex);
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    function applySort() {
        const type = document.getElementById('sortGrid').value;
        if (type === 'likes') allAssets.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        else if (type === 'newest') allAssets.sort((a, b) => b.date - a.date);
        else if (type === 'oldest') allAssets.sort((a, b) => a.date - b.date);
        renderGrid(allAssets);
    }

    // --- Details Modal Logic ---
    function openDetails(asset, index) {
        currentViewAsset = asset;
        editIndex = index;
        currentImgIdx = 0;
        
        document.title = `PIXS | ${asset.name}`;
        document.getElementById('detTitle').innerText = asset.name;
        document.getElementById('detCaption').innerText = asset.caption || "";
        document.getElementById('detLikeCount').innerText = asset.likes || 0;
        
        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (asset.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);

        document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
        
        updateModalImg();
        updateLikeUI();
        renderComments();
        
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    function updateModalImg() {
        const urls = currentViewAsset.urls || [currentViewAsset.url];
        const img = document.getElementById('detImg');
        img.src = processUrl(urls[currentImgIdx]);
        
        document.getElementById('imgCounter').innerText = `${currentImgIdx + 1} / ${urls.length}`;
        document.querySelectorAll('.nav-btn').forEach(b => b.style.display = urls.length > 1 ? 'flex' : 'none');

        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('detPanel').style.borderTop = `8px solid ${rgb}`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) {}
        };
    }

    // --- Asset Management (Admin) ---
    function openUpload(isEdit = false) {
        editIndex = isEdit ? editIndex : null;
        document.getElementById('modalTitle').innerText = isEdit ? "Edit Asset" : "Asset Entry";
        
        if (!isEdit) {
            document.getElementById('upName').value = ''; 
            document.getElementById('upLink').value = '';
            document.getElementById('upSourceSite').value = ''; 
            document.getElementById('upCaption').value = '';
            selectedTags = [];
        }
        
        renderModalTags();
        document.getElementById('uploadModal').style.display = 'block';
    }

    async function postAsset() {
        let title = await translateText(document.getElementById('upName').value);
        let caption = await translateText(document.getElementById('upCaption').value);
        let rawLinks = document.getElementById('upLink').value;
        let links = rawLinks.split(/[,\n]/).map(l => processUrl(l.trim())).filter(l => l !== "");

        const assetObj = {
            name: title,
            urls: links,
            url: links[0],
            sourceSite: document.getElementById('upSourceSite').value,
            caption: caption,
            tags: [...selectedTags],
            date: editIndex !== null ? allAssets[editIndex].date : Date.now(),
            likes: editIndex !== null ? allAssets[editIndex].likes : 0,
            comments: editIndex !== null ? (allAssets[editIndex].comments || []) : []
        };

        if (editIndex !== null) allAssets[editIndex] = assetObj;
        else allAssets.push(assetObj);

        await updateBin();
        closeModal('uploadModal');
    }

    // --- Helpers & UI Extras ---
    function processUrl(url) {
        if (!url) return "";
        if (url.includes('unsplash.com/photos/')) {
            const id = url.split('/').pop().split('?')[0];
            return `https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1200&q=80`;
        }
        return url;
    }

    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode', init ? localStorage.getItem('pixs_dark') === 'true' : undefined);
        if (!init) localStorage.setItem('pixs_dark', document.body.classList.contains('dark-mode'));
        
        const icon = document.getElementById('themeIcon');
        if (icon) {
            icon.setAttribute('data-lucide', document.body.classList.contains('dark-mode') ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.title = "PIXS | Discover the Extraordinary";
    }

    async function translateText(text) {
        if (!text || text.length < 2) return text;
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURI(text)}`);
            const data = await res.json();
            return data[0][0][0];
        } catch (e) { return text; }
    }
</script>
</body>
</html>
