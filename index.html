<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Auth</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading.fade-out { opacity: 0; pointer-events: none; }

        .saving-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white; 
        }

        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        /* --- AUTH --- */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto; }
        .auth-choice-btn { width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px; font-weight: 700; }
        .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-3px); }

        /* --- HEADER & NAVIGATION --- */
        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 0; background: var(--glass); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 800px; }
        .main-logo { width: 40px; height: 40px; object-fit: contain; cursor: pointer;}

        .search-box {
            flex: 1; background: var(--border);
            display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;
            transition: var(--transition);
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .back-btn { 
            display: none; align-items: center; gap: 8px; cursor: pointer; 
            font-weight: 700; color: var(--primary); margin-right: 10px;
        }

        .logout-btn {
            background: var(--border); padding: 10px; border-radius: 50%;
            cursor: pointer; border: none; color: var(--text); transition: var(--transition);
        }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* --- GRID --- */
        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 900px) { .grid { columns: 2; } }

        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }
        .card img { width: 100%; display: block; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%); opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: white; }
        .card:hover .card-overlay { opacity: 1; }

        /* --- MODALS --- */
        #detailsModal, #uploadModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto; }
        .split-container { display: flex; flex-direction: column; min-height: 100%; }
        .view-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .view-left img { max-width: 100%; max-height: 90vh; }
        .view-right { flex: 0.8; padding: 40px; background: var(--card-bg); }

        /* --- COMMENTS --- */
        .comment-item { margin-bottom: 20px; padding-left: 15px; border-left: 3px solid var(--border); }
        .comment-author { font-weight: 800; color: var(--primary); font-size: 14px; }
        .comment-text { font-size: 15px; margin: 5px 0; }
        .reply-item { margin-left: 25px; margin-top: 10px; border-left: 2px solid var(--primary); padding-left: 10px; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .secondary-btn { background: var(--border); color: var(--text); border: none; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; }

        @media (min-width: 1000px) { .split-container { flex-direction: row; } .view-right { height: 100vh; overflow-y: auto; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary);">PIXS CORE LOADING</p>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 15px;">Syncing with Cloud...</p>
</div>

<div id="auth" class="screen">
    <div style="height: 40vh; background: #2f6df6; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: 900;">PIXS</div>
    <div class="auth-container">
        <h2 style="font-weight: 900;">Access Portal</h2>
        <button class="auth-choice-btn" onclick="login('guest')"><i data-lucide="user"></i> Guest Access</button>
        <button class="auth-choice-btn" onclick="document.getElementById('adminArea').style.display='block'"><i data-lucide="shield"></i> Admin</button>
        <div id="adminArea" style="display:none; width:100%;">
            <input type="password" id="passInput" placeholder="Admin Key" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--border); margin-bottom:10px;">
            <button class="primary-btn" onclick="checkAuth()">Sign In</button>
        </div>
    </div>
</div>

<div id="app" class="screen">
    <header class="home-header">
        <div class="header-top">
            <div id="searchBack" class="back-btn" onclick="clearSearch()"><i data-lucide="arrow-left"></i> Home</div>
            <img src="logo.png" class="main-logo" onclick="location.reload()">
            <div class="search-box">
                <i data-lucide="search" size="18"></i>
                <input type="text" id="searchInput" placeholder="Search PIXS..." onkeypress="if(event.key==='Enter') executeSearch()">
            </div>
            <div id="sortGridContainer" style="display:none;">
                <select id="sortGrid" style="padding:10px; border-radius:10px;" onchange="applySort()">
                    <option value="newest">Newest</option>
                    <option value="likes">Popular</option>
                </select>
            </div>
            <button class="logout-btn" onclick="logout()"><i data-lucide="log-out" size="20"></i></button>
        </div>
    </header>

    <div id="grid" class="grid"></div>
    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none;">
        <button onclick="openUpload()" style="background:var(--primary); width:60px; height:60px; border-radius:50%; border:none; color:white; cursor:pointer;"><i data-lucide="plus"></i></button>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:#fff; padding:12px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div class="view-left">
            <img id="detImg" src="">
        </div>
        <div class="view-right">
            <h2 id="detTitle" style="font-weight:900; font-size:32px;"></h2>
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <div onclick="handleLike()" style="cursor:pointer; display:flex; align-items:center; gap:5px;">
                    <i data-lucide="heart" id="heartIcon"></i> <span id="detLikeCount">0</span>
                </div>
                <div onclick="downloadAsset()" style="cursor:pointer; display:flex; align-items:center; gap:5px; color:var(--primary);">
                    <i data-lucide="download"></i> Save Image
                </div>
            </div>
            <p id="detCaption" style="color:var(--text-muted);"></p>
            <button class="primary-btn" onclick="visitOriginal()">Visit Source</button>

            <div class="comments-section" style="margin-top:30px;">
                <h3 style="font-weight:900;">Discussion</h3>
                <div id="commentsList"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <input type="text" id="commentMsg" placeholder="Type a comment..." style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border);">
                    <button onclick="postComment()" style="background:var(--primary); border:none; color:white; padding:0 20px; border-radius:12px; cursor:pointer;">Post</button>
                </div>
            </div>

            <div id="adminTools" style="margin-top:30px; display:none; gap:10px;">
                <button class="secondary-btn" onclick="deleteCurrent()" style="color:#ef4444;">Delete Asset</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <div style="max-width:500px; margin:0 auto; padding:50px;">
        <h2>Upload New Asset</h2>
        <input type="text" id="upName" placeholder="Title" class="primary-btn" style="background:none; color:var(--text); text-align:left; border:1px solid var(--border); margin-bottom:10px;">
        <input type="text" id="upLink" placeholder="Image Link" class="primary-btn" style="background:none; color:var(--text); text-align:left; border:1px solid var(--border); margin-bottom:10px;">
        <textarea id="upCaption" placeholder="Caption" style="width:100%; height:100px; border-radius:15px; border:1px solid var(--border); padding:15px;"></textarea>
        <button class="primary-btn" onclick="postAsset()" style="margin-top:20px;">Publish to PIXS</button>
        <button class="secondary-btn" onclick="closeModal('uploadModal')">Cancel</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentViewAsset = null;
    let currentUserRole = null;

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') document.body.classList.add('dark-mode');
        
        currentUserRole = localStorage.getItem('pixs_role');
        if(currentUserRole) { showApp(); await sync(); } else { showAuth(); }
        
        document.getElementById('loading').classList.add('fade-out');
    };

    function showAuth() { 
        document.getElementById('auth').style.display = 'block'; 
        document.getElementById('app').style.display = 'none';
    }

    function showApp() { 
        document.getElementById('auth').style.display = 'none'; 
        document.getElementById('app').style.display = 'block';
        if(currentUserRole === 'admin') document.getElementById('adminFab').style.display = 'block';
    }

    function login(role) {
        localStorage.setItem('pixs_role', role);
        currentUserRole = role;
        showApp();
        sync();
    }

    function checkAuth() {
        if(document.getElementById('passInput').value === ADMIN_PASS) login('admin');
        else alert("Wrong Password");
    }

    function logout() {
        localStorage.removeItem('pixs_role');
        location.reload();
    }

    async function sync() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
    }

    async function updateBin() {
        document.getElementById('saving').style.display = 'flex';
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        document.getElementById('saving').style.display = 'none';
    }

    // SEARCH SYSTEM
    function executeSearch() {
        const val = document.getElementById('searchInput').value;
        if(!val) return;
        
        document.title = `Search: ${val}`;
        document.getElementById('searchBack').style.display = 'flex';
        document.getElementById('sortGridContainer').style.display = 'block';
        
        const filtered = allAssets.filter(a => a.name.toLowerCase().includes(val.toLowerCase()));
        renderGrid(filtered);
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchBack').style.display = 'none';
        document.getElementById('sortGridContainer').style.display = 'none';
        document.title = "PIXS | Discover";
        renderGrid(allAssets);
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach(asset => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${asset.url}"><div class="card-overlay"><b>${asset.name}</b></div>`;
            card.onclick = () => openDetails(asset);
            grid.appendChild(card);
        });
    }

    function openDetails(asset) {
        currentViewAsset = asset;
        document.getElementById('detImg').src = asset.url;
        document.getElementById('detTitle').innerText = asset.name;
        document.getElementById('detLikeCount').innerText = asset.likes || 0;
        document.getElementById('detCaption').innerText = asset.caption || "";
        document.getElementById('detailsModal').style.display = 'flex';
        document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'block' : 'none';
        renderComments();
        updateLikeUI();
        lucide.createIcons();
    }

    async function downloadAsset() {
        try {
            const response = await fetch(currentViewAsset.url);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentViewAsset.name.replace(/\s+/g, '_')}.jpg`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        } catch (e) {
            alert("Download failed. Try opening in new tab.");
        }
    }

    function renderComments() {
        const list = document.getElementById('commentsList');
        list.innerHTML = '';
        (currentViewAsset.comments || []).forEach(c => {
            list.innerHTML += `<div class="comment-item"><div class="comment-author">${c.role}</div><div class="comment-text">${c.text}</div></div>`;
        });
    }

    async function postComment() {
        const text = document.getElementById('commentMsg').value;
        if(!text) return;
        if(!currentViewAsset.comments) currentViewAsset.comments = [];
        currentViewAsset.comments.push({ text, role: currentUserRole, date: Date.now() });
        document.getElementById('commentMsg').value = '';
        renderComments();
        await updateBin();
    }

    async function handleLike() {
        const liked = JSON.parse(localStorage.getItem('pixs_liked') || "[]");
        if(liked.includes(currentViewAsset.date)) return;
        liked.push(currentViewAsset.date);
        localStorage.setItem('pixs_liked', JSON.stringify(liked));
        currentViewAsset.likes = (currentViewAsset.likes || 0) + 1;
        document.getElementById('detLikeCount').innerText = currentViewAsset.likes;
        updateLikeUI();
        await updateBin();
    }

    function updateLikeUI() {
        const liked = JSON.parse(localStorage.getItem('pixs_liked') || "[]");
        const heart = document.getElementById('heartIcon');
        heart.style.fill = liked.includes(currentViewAsset.date) ? "#ef4444" : "none";
        heart.style.color = liked.includes(currentViewAsset.date) ? "#ef4444" : "currentColor";
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openUpload() { document.getElementById('uploadModal').style.display = 'block'; }

    async function postAsset() {
        const asset = {
            name: document.getElementById('upName').value,
            url: document.getElementById('upLink').value,
            caption: document.getElementById('upCaption').value,
            date: Date.now(),
            likes: 0,
            comments: []
        };
        allAssets.push(asset);
        await updateBin();
        location.reload();
    }

    async function deleteCurrent() {
        if(confirm("Permanently delete this asset?")) {
            allAssets = allAssets.filter(a => a.date !== currentViewAsset.date);
            await updateBin();
            location.reload();
        }
    }

    function toggleTheme() {
        const dark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('pixs_dark', dark);
        lucide.createIcons();
    }
</script>
</body>
</html>
