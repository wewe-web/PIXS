<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Discover the Extraordinary</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #2f6df6; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --muted: #64748b; --border: #e2e8f0; --shadow: 0 20px 40px rgba(0,0,0,0.05);
            --anim: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255,255,255,0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.4s ease; }

        /* Animations */
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Layout */
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 20px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .search-container { display: flex; align-items: center; gap: 15px; max-width: 800px; margin: 0 auto; }
        .search-bar { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 12px 20px; border-radius: 30px; display: flex; align-items: center; transition: var(--anim); }
        .search-bar:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(47, 109, 246, 0.1); }
        .search-bar input { border: none; background: none; outline: none; width: 100%; color: var(--text); margin-left: 10px; }

        .collections { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; justify-content: center; }
        .chip { padding: 8px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: var(--anim); white-space: nowrap; font-size: 14px; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        .grid { columns: 4; column-gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 20px; border-radius: 20px; overflow: hidden; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: var(--anim); animation: slideUp 0.6s ease forwards; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .card img { width: 100%; display: block; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; animation: scaleIn 0.4s ease; }
        .modal-content { display: flex; flex-direction: column; min-height: 100vh; }
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .view-left img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .view-right { flex: 1; padding: 40px; background: var(--card); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: var(--anim); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
        .btn:active { transform: scale(0.95); }

        /* Comment Section */
        .comment-box { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .comment { background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }

        /* Admin FAB */
        #adminFab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(47, 109, 246, 0.3); z-index: 500; transition: var(--anim); }
        #adminFab:hover { transform: rotate(90deg) scale(1.1); }

        @media (max-width: 900px) { .grid { columns: 2; } .modal-content { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="search-container">
            <img src="logo.png" width="40" onclick="handleLogout()" style="cursor:pointer">
            <div class="search-bar">
                <i data-lucide="search" size="18"></i>
                <input type="text" id="mainSearch" placeholder="Search title, tags, or captions..." oninput="smartSearch(this.value)">
                <button id="backBtn" style="display:none; background:none; border:none; color:var(--primary); cursor:pointer;" onclick="resetSearch()">Back</button>
            </div>
            <button class="chip" onclick="toggleTheme()"><i data-lucide="moon" id="tIcon"></i></button>
        </div>
        <div class="collections" id="collectionBar">
            <div class="chip active" onclick="filterCategory('All')">All Explore</div>
            </div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="adminFab" onclick="openUpload()"><i data-lucide="plus"></i></div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="view-left">
                <button style="position:absolute; top:20px; right:20px; background:white; border:none; border-radius:50%; padding:10px; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
                <img id="detImg" src="">
            </div>
            <div class="view-right">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1 id="detTitle" style="margin:0"></h1>
                    <button class="btn btn-outline" onclick="handleLike()"><i data-lucide="heart" id="detHeart"></i> <span id="detLikes">0</span></button>
                </div>
                <p id="detCaption" style="color:var(--muted); margin-top:10px;"></p>
                
                <div class="btn-group">
                    <button class="btn btn-primary" id="visitLink" onclick="window.open(this.dataset.url)">Visit Original</button>
                    <button class="btn btn-outline" style="color:#10b981" onclick="download('png')">PNG</button>
                    <button class="btn btn-outline" style="color:#ef4444" onclick="download('pdf')">PDF</button>
                </div>

                <div class="comment-box">
                    <h3>Comments</h3>
                    <div id="commentList"></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <input type="text" id="commInput" placeholder="Add a comment..." style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
                        <button class="btn btn-primary" onclick="addComment()">Post</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div style="max-width:600px; margin: 40px auto; padding: 20px;">
            <h2>Create New Asset</h2>
            <div id="upPreview" style="width:100%; height:200px; background:#000; border-radius:15px; margin-bottom:20px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                <p style="color:white">Preview Area</p>
            </div>
            <input type="text" id="upTitle" placeholder="Asset Title">
            <textarea id="upLinks" placeholder="Paste Links (one per line)" rows="4" oninput="updatePreview(this.value)"></textarea>
            <input type="text" id="upSite" placeholder="Original Website URL">
            <input type="text" id="upTags" placeholder="Taglines (comma separated)">
            <input type="text" id="upCollection" placeholder="Collection Name">
            <textarea id="upCaption" placeholder="Write a description..."></textarea>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveAsset()">Post to Cloud</button>
                <button class="btn btn-outline" onclick="closeModal('uploadModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "69c90b42ed015c742bc9240a";
        const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
        
        let allAssets = [];
        let currentAssetIndex = null;
        let role = localStorage.getItem('pixs_role') || 'guest';

        // Initialize
        async function init() {
            lucide.createIcons();
            if(role === 'admin') document.getElementById('adminFab').style.display = 'flex';
            await fetchData();
            renderCollections();
        }

        async function fetchData() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: {"X-Master-Key": API_KEY}
            });
            const data = await res.json();
            allAssets = data.record.assets || [];
            renderGrid(allAssets);
        }

        function renderGrid(assets) {
            const grid = document.getElementById('grid');
            grid.innerHTML = assets.map((a, i) => `
                <div class="card" onclick="openDetails(${i})">
                    <img src="${a.urls[0]}" loading="lazy">
                    <div style="padding:15px">
                        <div style="font-weight:800">${a.name}</div>
                        <div style="font-size:12px; color:var(--muted)">${a.collection || 'General'}</div>
                    </div>
                </div>
            `).join('');
        }

        // --- Search Logic ---
        function smartSearch(query) {
            const q = query.toLowerCase();
            const btn = document.getElementById('backBtn');
            btn.style.display = q.length > 0 ? 'inline' : 'none';

            const filtered = allAssets.filter(a => 
                a.name.toLowerCase().includes(q) || 
                (a.caption && a.caption.toLowerCase().includes(q)) ||
                (a.tags && a.tags.some(t => t.toLowerCase().includes(q))) ||
                (a.collection && a.collection.toLowerCase().includes(q))
            );
            renderGrid(filtered);
        }

        function resetSearch() {
            document.getElementById('mainSearch').value = '';
            document.getElementById('backBtn').style.display = 'none';
            renderGrid(allAssets);
        }

        // --- Logout Logic ---
        function handleLogout() {
            const choice = confirm("Are you sure you want to logout or are you just joking?");
            if(choice) {
                localStorage.removeItem('pixs_role');
                location.reload();
            }
        }

        // --- Details & Interactions ---
        function openDetails(index) {
            currentAssetIndex = index;
            const a = allAssets[index];
            document.getElementById('detImg').src = a.urls[0];
            document.getElementById('detTitle').innerText = a.name;
            document.getElementById('detCaption').innerText = a.caption || '';
            document.getElementById('detLikes').innerText = a.likes || 0;
            document.getElementById('visitLink').dataset.url = a.site || '#';
            
            renderComments(a.comments || []);
            document.getElementById('detailsModal').style.display = 'block';
            lucide.createIcons();
        }

        async function handleLike() {
            allAssets[currentAssetIndex].likes = (allAssets[currentAssetIndex].likes || 0) + 1;
            document.getElementById('detLikes').innerText = allAssets[currentAssetIndex].likes;
            await syncCloud();
        }

        function renderComments(comments) {
            const list = document.getElementById('commentList');
            list.innerHTML = comments.map(c => `
                <div class="comment"><b>${c.user}:</b> ${c.text}</div>
            `).join('');
        }

        async function addComment() {
            const input = document.getElementById('commInput');
            if(!input.value) return;
            
            const newComm = { user: role.toUpperCase(), text: input.value };
            if(!allAssets[currentAssetIndex].comments) allAssets[currentAssetIndex].comments = [];
            allAssets[currentAssetIndex].comments.push(newComm);
            
            renderComments(allAssets[currentAssetIndex].comments);
            input.value = '';
            await syncCloud();
        }

        // --- Downloads ---
        async function download(type) {
            const img = document.getElementById('detImg');
            if(type === 'png') {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = `pixs-${Date.now()}.png`;
                link.click();
            } else {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                pdf.text(document.getElementById('detTitle').innerText, 10, 10);
                pdf.addImage(img.src, 'JPEG', 10, 20, 180, 120);
                pdf.save('pixs-asset.pdf');
            }
        }

        // --- Upload Logic ---
        function openUpload() { document.getElementById('uploadModal').style.display = 'block'; }
        
        function updatePreview(val) {
            const links = val.split('\n').filter(l => l.trim() !== "");
            if(links.length > 0) {
                document.getElementById('upPreview').innerHTML = `<img src="${links[0]}" style="width:100%; height:100%; object-fit:cover;">`;
            }
        }

        async function saveAsset() {
            const newAsset = {
                name: document.getElementById('upTitle').value,
                urls: document.getElementById('upLinks').value.split('\n').filter(l => l.trim() !== ""),
                site: document.getElementById('upSite').value,
                tags: document.getElementById('upTags').value.split(','),
                collection: document.getElementById('upCollection').value,
                caption: document.getElementById('upCaption').value,
                likes: 0,
                comments: [],
                date: Date.now()
            };
            allAssets.unshift(newAsset);
            await syncCloud();
            location.reload();
        }

        async function syncCloud() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {"Content-Type": "application/json", "X-Master-Key": API_KEY},
                body: JSON.stringify({assets: allAssets})
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('tIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function renderCollections() {
            const cats = [...new Set(allAssets.map(a => a.collection))].filter(c => c);
            const bar = document.getElementById('collectionBar');
            cats.forEach(c => {
                bar.innerHTML += `<div class="chip" onclick="filterCategory('${c}')">${c}</div>`;
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            if(cat === 'All') return renderGrid(allAssets);
            const filtered = allAssets.filter(a => a.collection === cat);
            renderGrid(filtered);
        }

        init();
    </script>
</body>
</html>
