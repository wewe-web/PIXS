<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s ease; }
        @keyframes screenReveal { from { opacity: 0; } to { opacity: 1; } }

        #loading, .saving-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .saving-overlay { background: rgba(0,0,0,0.7); display: none; z-index: 5000; backdrop-filter: blur(8px); color: white; }

        .theme-btn { position: absolute; top: 15px; left: 20px; background: none; border: none; cursor: pointer; color: var(--text); z-index: 101; }

        .home-header { display: flex; flex-direction: column; align-items: center; padding: 20px 0 10px 0; background: var(--glass); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        
        .search-box { width: 80%; max-width: 350px; background: var(--border); display: flex; align-items: center; padding: 8px 16px; border-radius: 30px; margin-bottom: 12px; }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 600; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }
        .card img { width: 100%; display: block; }
        .card .stack-icon { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; backdrop-filter: blur(4px); }

        #detailsModal, #uploadModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto; }
        
        .split-container { display: flex; flex-direction: column; min-height: 100%; width: 100%; }
        
        /* SWIPEABLE AREA */
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; min-height: 400px; overflow: hidden; }
        .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s ease; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(10px); }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }
        .img-counter { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; z-index: 10; }

        .view-right { flex: 1; padding: 35px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 5;}

        .preview-area { width: 100%; height: 200px; border-radius: 20px; border: 2px dashed var(--border); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--bg); }
        .preview-area img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .view-right { flex: 0.5; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .view-left { flex: 1.5; }
        }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <img src="logo.png" style="width: 60px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary);">PIXS</p>
</div>

<div id="saving" class="saving-overlay">
    <p>Updating Cloud...</p>
</div>

<div id="app" class="screen" style="display:block;">
    <header class="home-header">
        <img src="logo.png" style="width:40px; margin-bottom: 10px;">
        <div class="search-box">
            <i data-lucide="search" size="18"></i>
            <input type="text" id="searchInput" placeholder="Search Assets...">
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    
    <div style="position: fixed; bottom: 30px; right: 30px; z-index: 99;">
        <div style="background: var(--primary); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer;" onclick="openUpload()"><i data-lucide="plus" size="28"></i></div>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:#fff; padding:10px; border-radius:50%;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div class="view-left" id="swipeArea">
            <button class="nav-btn nav-prev" onclick="changeImg(-1)"><i data-lucide="chevron-left"></i></button>
            <img id="detImg" src="">
            <div class="img-counter" id="imgCounter">1 / 1</div>
            <button class="nav-btn nav-next" onclick="changeImg(1)"><i data-lucide="chevron-right"></i></button>
        </div>
        <div class="view-right" id="detPanel">
            <h2 id="detTitle" style="font-weight:900; margin:0;"></h2>
            <p id="detCaption" style="color: var(--text-muted);"></p>
            <div id="detTags" style="display:flex; gap:8px; margin: 20px 0; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="dynamicBtn" onclick="visitOriginal()">Source Site</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="editCurrentAsset()" style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:none; color:var(--text);">Edit</button>
                <button onclick="deleteCurrentAsset()" style="flex:1; padding:12px; border-radius:12px; border:1px solid #ef4444; background:none; color:#ef4444;">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <div style="max-width:500px; margin:0 auto; padding:50px 20px;">
        <h2 style="text-align:center;">New Asset</h2>
        <div class="preview-area" id="upPreview">Preview</div>
        <input type="text" id="upName" placeholder="Title">
        <textarea id="upLinks" placeholder="Paste URLs (Comma or New Line separated)" rows="5" oninput="updatePreview()"></textarea>
        <textarea id="upCaption" placeholder="Description" rows="2"></textarea>
        <div id="modalTags" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:20px;"></div>
        <button class="primary-btn" onclick="postAsset()">Save to Gallery</button>
        <button class="primary-btn" style="background:none; color:var(--text-muted);" onclick="closeModal('uploadModal')">Cancel</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const collectionList = ["All", "Memes", "Vintage", "Minimal", "Nature", "Abstract", "Wallpapers", "Tech"];

    let allAssets = [];
    let selectedTags = [];
    let currentAsset = null;
    let currentImgIdx = 0;
    let editIndex = null;
    const colorThief = new ColorThief();

    window.onload = async () => {
        lucide.createIcons();
        await syncFromBin();
        renderHomeCollections();
        document.getElementById('loading').style.display = 'none';
        
        // Swipe Detection
        let touchstartX = 0;
        let touchendX = 0;
        const swipeArea = document.getElementById('swipeArea');
        swipeArea.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        swipeArea.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) changeImg(1);
            if (touchendX > touchstartX + 50) changeImg(-1);
        });
    };

    async function syncFromBin() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgUrl = Array.isArray(asset.urls) ? asset.urls[0] : asset.url;
            card.innerHTML = `
                ${(asset.urls && asset.urls.length > 1) ? `<div class="stack-icon">${asset.urls.length} images</div>` : ''}
                <img src="${imgUrl}">
            `;
            card.onclick = () => openDetails(asset, idx);
            grid.appendChild(card);
        });
    }

    function openDetails(asset, index) {
        currentAsset = asset;
        editIndex = index;
        currentImgIdx = 0;
        
        document.getElementById('detTitle').innerText = asset.name;
        document.getElementById('detCaption').innerText = asset.caption || "";
        updateModalImg();

        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (asset.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
        
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    function updateModalImg() {
        const urls = Array.isArray(currentAsset.urls) ? currentAsset.urls : [currentAsset.url];
        const img = document.getElementById('detImg');
        img.src = urls[currentImgIdx];
        
        document.getElementById('imgCounter').innerText = `${currentImgIdx + 1} / ${urls.length}`;
        document.querySelectorAll('.nav-btn').forEach(b => b.style.display = urls.length > 1 ? 'block' : 'none');

        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                document.getElementById('detPanel').style.borderTop = `8px solid rgb(${color[0]},${color[1]},${color[2]})`;
            } catch(e){}
        };
    }

    function changeImg(dir) {
        const urls = Array.isArray(currentAsset.urls) ? currentAsset.urls : [currentAsset.url];
        currentImgIdx = (currentImgIdx + dir + urls.length) % urls.length;
        updateModalImg();
    }

    function updatePreview() {
        const val = document.getElementById('upLinks').value;
        const first = val.split(/[,\n]/)[0].trim();
        const preview = document.getElementById('upPreview');
        if(first.startsWith('http')) preview.innerHTML = `<img src="${first}">`;
    }

    function openUpload() {
        document.getElementById('upName').value = '';
        document.getElementById('upLinks').value = '';
        document.getElementById('upCaption').value = '';
        selectedTags = [];
        renderModalTags();
        document.getElementById('uploadModal').style.display = 'block';
    }

    function renderModalTags() {
        const container = document.getElementById('modalTags');
        container.innerHTML = '';
        collectionList.filter(c => c !== "All").forEach(cat => {
            const tag = document.createElement('div');
            tag.className = `chip ${selectedTags.includes(cat) ? 'active' : ''}`;
            tag.innerText = cat;
            tag.onclick = () => {
                tag.classList.toggle('active');
                if(selectedTags.includes(cat)) selectedTags = selectedTags.filter(t => t !== cat);
                else selectedTags.push(cat);
            };
            container.appendChild(tag);
        });
    }

    async function postAsset() {
        const name = document.getElementById('upName').value;
        const linksStr = document.getElementById('upLinks').value;
        if(!name || !linksStr) return alert("Fill fields");

        const links = linksStr.split(/[,\n]/).map(l => l.trim()).filter(l => l !== "");
        const newAsset = {
            name,
            urls: links,
            caption: document.getElementById('upCaption').value,
            tags: [...selectedTags]
        };

        document.getElementById('saving').style.display = 'flex';
        allAssets.push(newAsset);
        await updateBin();
        closeModal('uploadModal');
        document.getElementById('saving').style.display = 'none';
    }

    async function updateBin() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        renderGrid(allAssets);
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function renderHomeCollections() {
        const wrapper = document.getElementById('homeCollections');
        collectionList.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'chip' + (cat === "All" ? " active" : "");
            chip.innerText = cat;
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                if (cat === "All") renderGrid(allAssets);
                else renderGrid(allAssets.filter(a => a.tags?.includes(cat)));
            };
            wrapper.appendChild(chip);
        });
    }
</script>
</body>
</html>
