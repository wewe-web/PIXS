<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Auth</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    /* Loading Overlay */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #loading.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }
    #loading img { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* Header & Navigation */
    .home-header {
      display: flex; flex-direction: column; align-items: center;
      padding: 15px 0; background: var(--glass);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; align-items: center; gap: 15px; width: 95%; max-width: 1200px; }
    .main-logo { width: 40px; height: 40px; cursor: pointer; }
    .search-box {
      flex: 1; background: var(--border);
      display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;
    }
    .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

    .collections-wrapper { 
      width: 100%; overflow-x: auto; white-space: nowrap; 
      padding: 15px 20px; display: flex; gap: 10px; scrollbar-width: none; 
    }
    .chip { 
      padding: 8px 20px; background: var(--card-bg); border: 1px solid var(--border); 
      border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); 
    }
    .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Grid System */
    .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 1100px) { .grid { columns: 3; } }
    @media (max-width: 800px) { .grid { columns: 2; } }
    
    .card { 
      break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); 
      overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); 
      cursor: pointer; transition: var(--transition); position: relative; 
    }
    .card img { width: 100%; display: block; transition: 0.5s; }
    .card:hover img { transform: scale(1.03); }

    /* Admin FAB */
    #adminFab {
      position: fixed; bottom: 30px; right: 30px; z-index: 999;
      display: none; /* Shown via JS */
    }
    .fab-btn {
      background: var(--primary); width: 65px; height: 65px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: white;
      cursor: pointer; box-shadow: 0 10px 25px rgba(47, 109, 246, 0.4);
      transition: var(--transition);
    }
    .fab-btn:hover { transform: translateY(-5px) rotate(90deg); }

    /* Modals & Buttons */
    .primary-btn { 
      background: var(--primary); color: white; border: none; padding: 16px; 
      border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; 
      transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .theme-btn {
      position: fixed; top: 15px; left: 20px; background: var(--card-bg);
      border: 1px solid var(--border); padding: 10px; border-radius: 50%;
      cursor: pointer; color: var(--text); z-index: 1000; box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

  <button class="theme-btn" onclick="toggleTheme()">
    <i id="themeIcon" data-lucide="moon"></i>
  </button>

  <div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
  </div>

  <div id="auth" class="screen" style="display: block;">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="max-width: 450px; margin: -40px auto 0; padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; text-align: center; box-shadow: var(--shadow);">
      <img src="logo.png" style="width: 60px; margin-bottom: 20px;">
      <h2 style="font-weight: 900; margin-bottom: 10px;">Welcome to PIXS</h2>
      <p style="color: var(--text-muted); margin-bottom: 30px;">Select your access level to continue</p>
      
      <button class="primary-btn" onclick="loginGuest()" style="background: var(--card-bg); color: var(--text); border: 1px solid var(--border); margin-bottom: 15px; justify-content: flex-start; padding: 20px;">
        <i data-lucide="user" style="color: var(--primary)"></i>
        <div style="text-align: left;">
          <div style="font-size: 16px;">Guest Access</div>
          <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">View, Like & Discover Assets</div>
        </div>
      </button>

      <button class="primary-btn" onclick="showAdminPrompt()" style="background: var(--card-bg); color: var(--text); border: 1px solid var(--border); justify-content: flex-start; padding: 20px;">
        <i data-lucide="shield-check" style="color: var(--primary)"></i>
        <div style="text-align: left;">
          <div style="font-size: 16px;">Administrator</div>
          <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">Full Management & Upload Access</div>
        </div>
      </button>

      <div id="adminInputArea" style="display: none; margin-top: 20px;">
        <input type="password" id="accessKey" placeholder="Enter Admin Password" style="padding: 15px; border-radius: 12px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; margin-bottom: 10px;">
        <button class="primary-btn" onclick="checkAuth()">Login as Admin</button>
      </div>
    </div>
  </div>

  <div id="app" class="screen">
    <header class="home-header">
      <div class="header-top">
        <img src="logo.png" class="main-logo" onclick="location.reload()">
        <div class="search-box">
          <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search title, tags, or caption..." oninput="handleSearch(this.value)">
        </div>
        <select class="sort-select" id="sortGrid" onchange="applySort()" style="background: none; border: none; font-weight: 700; color: var(--text); cursor: pointer;">
          <option value="newest">Newest</option>
          <option value="likes">Popular</option>
          <option value="oldest">Oldest</option>
        </select>
      </div>
      
      <div class="collections-wrapper" id="homeCollections">
        <div class="chip active" onclick="filterByTag('all')">All Collections</div>
        </div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="adminFab">
      <div class="fab-btn" onclick="openUpload()">
        <i data-lucide="plus" size="32"></i>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Mock Login Functions for UI demonstration
    function loginGuest() {
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('loading').classList.add('fade-out');
    }

    function showAdminPrompt() {
      document.getElementById('adminInputArea').style.display = 'block';
    }

    function checkAuth() {
      // If password is correct (e.g., 'admin123')
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('adminFab').style.display = 'flex'; // Show the Add Button
      document.getElementById('loading').classList.add('fade-out');
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const icon = document.getElementById('themeIcon');
      const isDark = document.body.classList.contains('dark-mode');
      icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();
    }

    // Initial load handling
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('fade-out');
      }, 1000);
    });
  </script>
</body>
</html>
