<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0b0e14; /* Deep Charcoal */
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #161b22;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        /* Screen Transitions */
        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Loading & Overlays */
        #loading, .saving-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .saving-overlay { background: rgba(0,0,0,0.8); display: none; z-index: 5000; backdrop-filter: blur(12px); color: white; }

        .theme-btn {
            position: fixed; top: 20px; left: 20px;
            background: var(--card-bg); border: 1px solid var(--border); 
            cursor: pointer; color: var(--text); padding: 10px;
            z-index: 1001; transition: var(--transition); border-radius: 12px;
            box-shadow: var(--shadow);
        }

        /* Header & Navigation */
        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; background: var(--glass); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .search-box {
            width: 85%; max-width: 400px; background: var(--bg);
            display: flex; align-items: center; padding: 12px 20px; border-radius: 30px; 
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); font-size: 14px; }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 10px; scrollbar-width: none; }
        .chip { padding: 8px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 500; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(47, 109, 246, 0.3); }

        /* Masonry Grid */
        .grid { columns: 2; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 768px) { .grid { columns: 3; } }
        @media (min-width: 1100px) { .grid { columns: 4; } }

        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; border: 1px solid var(--border); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .card img { width: 100%; display: block; transition: transform 0.5s ease; }
        .card:hover img { transform: scale(1.05); }
        .card .stack-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: white; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; backdrop-filter: blur(5px); z-index: 2; }

        /* Detail View */
        #detailsModal, #uploadModal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto;
        }

        .split-container { display: flex; flex-direction: column; min-height: 100vh; }
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; min-height: 400px; }
        .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
        .nav-prev { left: 20px; } .nav-next { right: 20px; }

        .view-right { flex: 1; padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; z-index: 5; }

        /* Buttons & Inputs */
        .primary-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); }
        .primary-btn:active { transform: scale(0.98); }
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 16px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; font-size: 15px; }

        #dropZone {
            position: fixed; inset: 0; background: rgba(47, 109, 246, 0.15);
            backdrop-filter: blur(10px); z-index: 6000; display: none;
            border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;
            align-items: center; justify-content: center; pointer-events: none;
        }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .view-right { flex: 0.4; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .view-left { flex: 0.6; }
        }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <div style="font-weight: 900; font-size: 24px; color: var(--primary); letter-spacing: 4px;">PIXS</div>
</div>

<div id="dropZone">
    <div style="text-align: center; color: var(--primary);">
        <i data-lucide="upload-cloud" size="64"></i>
        <h2 style="font-weight: 800; margin-top: 20px;">Drop to Upload to PIXS</h2>
    </div>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid var(--primary); border-radius: 50%; border-top-color: transparent; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 20px; font-weight: 600; letter-spacing: 1px;">SYNCING CLOUD...</p>
</div>

<div id="auth" class="screen">
    <div style="height: 40vh; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); display:flex; align-items:center; justify-content:center;">
        <h1 style="color:white; font-size: 40px; font-weight:900; letter-spacing:8px;">PIXS</h1>
    </div>
    <div style="padding: 50px 30px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; text-align: center;">
        <h2 style="font-weight: 800; margin-bottom: 30px;">Identity Verification</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key" style="text-align:center;">
        <button class="primary-btn" onclick="checkAuth()">Enter Gallery</button>
    </div>
</div>

<div id="app" class="screen">
    <header class="home-header">
        <div style="font-weight:900; font-size:22px; letter-spacing:3px; margin-bottom:15px; color:var(--primary);">PIXS</div>
        <div class="search-box">
            <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
            <input type="text" id="searchInput" placeholder="Search your assets...">
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    
    <div style="position: fixed; bottom: 35px; right: 35px; z-index: 99;">
        <button style="background: var(--primary); width:70px; height:70px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: 0 15px 35px rgba(47, 109, 246, 0.4);" onclick="openUpload()">
            <i data-lucide="plus" size="32"></i>
        </button>
    </div>
</div>

<div id="detailsModal">
    <button style="position:fixed; top:25px; right:25px; z-index:2100; border:none; background:white; color:black; width:45px; height:45px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div class="view-left" id="swipeArea">
            <button class="nav-btn nav-prev" onclick="changeImg(-1)"><i data-lucide="chevron-left"></i></button>
            <img id="detImg" src="">
            <button class="nav-btn nav-next" onclick="changeImg(1)"><i data-lucide="chevron-right"></i></button>
        </div>
        <div class="view-right">
            <h1 id="detTitle" style="font-weight:900; font-size:32px; margin:0 0 15px 0;"></h1>
            <p id="detCaption" style="color: var(--text-muted); line-height:1.7; font-size:15px;"></p>
            <div id="detTags" style="display:flex; gap:10px; margin: 30px 0; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="dynamicBtn" onclick="visitOriginal()">Visit Source</button>
            
            <div style="display:flex; gap:12px; margin-top:12px;">
                <button class="primary-btn" style="background:#10b981; flex:1;" onclick="downloadPNG()">PNG</button>
                <button class="primary-btn" style="background:#ef4444; flex:1;" onclick="downloadPDF()">PDF</button>
            </div>

            <div style="margin-top:40px; border-top:1px solid var(--border); padding-top:30px; display:flex; gap:15px;">
                <button onclick="editCurrentAsset()" style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:15px; border-radius:15px; cursor:pointer; font-weight:600;">Edit</button>
                <button onclick="deleteCurrentAsset()" style="flex:1; background:rgba(239, 68, 68, 0.1); border:none; color:#ef4444; padding:15px; border-radius:15px; cursor:pointer; font-weight:600;">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <div style="max-width:600px; margin:0 auto; padding:60px 25px;">
        <h2 id="modalTitle" style="font-weight:900; font-size:28px; text-align:center; margin-bottom:30px;">New Asset</h2>
        <div id="upPreview" style="height:200px; background:var(--bg); border-radius:20px; border:2px dashed var(--border); margin-bottom:20px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <p style="color:var(--text-muted);">Preview Area</p>
        </div>
        <input type="text" id="upName" placeholder="Asset Name">
        <textarea id="upLink" placeholder="Paste Image URLs (one per line) or drag files" rows="4" oninput="updatePreview()"></textarea>
        <input type="text" id="upSourceSite" placeholder="Source Website URL (Optional)">
        <textarea id="upCaption" placeholder="Notes/Description" rows="3"></textarea>
        
        <p style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px;">Categorize</p>
        <div id="modalTags" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:30px; max-height:150px; overflow-y:auto; padding:5px;"></div>
        
        <button class="primary-btn" id="saveBtn" onclick="postAsset()">Sync to Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; color:var(--text-muted); cursor:pointer; margin-top:15px; padding-bottom:50px;">Cancel</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const AUTH_KEY = "qwerty_1227_pics_xioleng";

    const collectionList = ["All", "Minimal", "Wallpapers", "Aesthetic", "Architecture", "Technology", "Art", "3D Art", "Futuristic", "Photography", "Illustrations", "Cyberpunk", "Vintage"];

    let allAssets = []; 
    let selectedTags = []; 
    let currentViewAsset = null; 
    let currentImgIdx = 0; 
    let editIndex = null;
    const colorThief = new ColorThief();

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') toggleTheme(true);
        if(localStorage.getItem('pixs_signed_in') === 'true') {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            await syncFromBin();
        }
        document.getElementById('loading').style.display = 'none';
        renderHomeCollections();
        setupDragAndDrop();
    };

    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode');
        if(!init) localStorage.setItem('pixs_dark', isDark);
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    async function syncFromBin() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
            const data = await res.json();
            allAssets = data.record.assets || [];
            renderGrid(allAssets);
        } catch (e) { alert("Sync Error. Check API Key."); }
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid'); 
        grid.innerHTML = '';
        assets.forEach((asset, idx) => {
            const card = document.createElement('div'); 
            card.className = 'card';
            const urls = asset.urls || [asset.url];
            card.innerHTML = `
                ${urls.length > 1 ? `<div class="stack-badge"><i data-lucide="layers" size="10" style="margin-right:4px"></i> STACK ${urls.length}</div>` : ''}
                <img src="${urls[0]}" onerror="this.src='https://via.placeholder.com/400?text=Private+Asset'" loading="lazy">
            `;
            card.onclick = () => openDetails(asset, allAssets.indexOf(asset));
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    function renderHomeCollections() {
        const wrapper = document.getElementById('homeCollections'); wrapper.innerHTML = '';
        collectionList.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'chip' + (cat === "All" ? " active" : ""); chip.innerText = cat;
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                renderGrid(cat === "All" ? allAssets : allAssets.filter(a => a.tags?.includes(cat)));
            };
            wrapper.appendChild(chip);
        });
    }

    function openDetails(data, index) {
        currentViewAsset = data; editIndex = index; currentImgIdx = 0;
        document.getElementById('detTitle').innerText = data.name;
        document.getElementById('detCaption').innerText = data.caption || "No description provided.";
        updateModalImg();
        
        const tagBox = document.getElementById('detTags'); tagBox.innerHTML = '';
        (data.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
        document.getElementById('detailsModal').style.display = 'block';
    }

    function updateModalImg() {
        const urls = currentViewAsset.urls || [currentViewAsset.url];
        const img = document.getElementById('detImg');
        img.src = urls[currentImgIdx];
        document.querySelectorAll('.nav-btn').forEach(b => b.style.display = urls.length > 1 ? 'flex' : 'none');
        
        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) {}
        };
    }

    function changeImg(dir) {
        const urls = currentViewAsset.urls || [currentViewAsset.url];
        currentImgIdx = (currentImgIdx + dir + urls.length) % urls.length;
        updateModalImg();
    }

    function openUpload() {
        editIndex = null;
        document.getElementById('upName').value = ''; document.getElementById('upLink').value = '';
        document.getElementById('upSourceSite').value = ''; document.getElementById('upCaption').value = '';
        document.getElementById('upPreview').innerHTML = `<p>Preview Area</p>`;
        selectedTags = [];
        renderModalTags();
        document.getElementById('uploadModal').style.display = 'block';
    }

    function updatePreview() {
        const val = document.getElementById('upLink').value;
        const first = val.split(/[\n,]/)[0].trim();
        if(first.startsWith('http') || first.startsWith('data:')) {
            document.getElementById('upPreview').innerHTML = `<img src="${first}" style="max-width:100%; max-height:100%;">`;
        }
    }

    function renderModalTags() {
        const container = document.getElementById('modalTags'); container.innerHTML = '';
        collectionList.filter(c => c !== "All").forEach(cat => {
            const tag = document.createElement('div');
            tag.className = `chip ${selectedTags.includes(cat) ? 'active' : ''}`; tag.innerText = cat;
            tag.onclick = () => {
                tag.classList.toggle('active');
                if(selectedTags.includes(cat)) selectedTags = selectedTags.filter(t => t !== cat);
                else selectedTags.push(cat);
            };
            container.appendChild(tag);
        });
    }

    async function postAsset() {
        const name = document.getElementById('upName').value;
        const links = document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== "");
        if(!name || links.length === 0) return alert("Title and Image URL required");

        document.getElementById('saving').style.display = 'flex';
        const assetObj = { 
            name, urls: links, url: links[0], 
            sourceSite: document.getElementById('upSourceSite').value,
            caption: document.getElementById('upCaption').value,
            tags: [...selectedTags]
        };

        if(editIndex !== null) allAssets[editIndex] = assetObj;
        else allAssets.unshift(assetObj);

        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });

        renderGrid(allAssets);
        closeModal('uploadModal');
        document.getElementById('saving').style.display = 'none';
    }

    function setupDragAndDrop() {
        window.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropZone').style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => { if(e.relatedTarget === null) document.getElementById('dropZone').style.display = 'none'; });
        window.addEventListener('drop', (e) => {
            e.preventDefault(); document.getElementById('dropZone').style.display = 'none';
            const file = e.dataTransfer.files[0];
            if(file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    openUpload();
                    document.getElementById('upLink').value = ev.target.result;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        });
    }

    function checkAuth() {
        if(document.getElementById('accessKey').value === AUTH_KEY) {
            localStorage.setItem('pixs_signed_in', 'true');
            location.reload();
        } else alert("Access Denied");
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function visitOriginal() { window.open(currentViewAsset.sourceSite || currentViewAsset.urls[currentImgIdx], '_blank'); }

    async function deleteCurrentAsset() {
        if(confirm("Confirm deletion?")) {
            allAssets.splice(editIndex, 1);
            document.getElementById('saving').style.display = 'flex';
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ assets: allAssets })
            });
            renderGrid(allAssets);
            closeModal('detailsModal');
            document.getElementById('saving').style.display = 'none';
        }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allAssets.filter(a => a.name.toLowerCase().includes(term) || a.tags?.some(t => t.toLowerCase().includes(term))));
    });
</script>

</body>
</html>
