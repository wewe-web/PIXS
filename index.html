<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Discover the Extraordinary</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      radius: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    .screen {
      display: none;
      min-height: 100vh;
      animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes screenReveal {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #loading.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .saving-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 5000;
      backdrop-filter: blur(8px);
      color: white;
    }

    .theme-btn {
      position: absolute;
      top: 15px;
      left: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      z-index: 101;
      transition: var(--transition);
    }

    /* --- AUTH --- */
    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
    }

    .auth-choice-btn {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      margin-bottom: 15px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 700;
      font-size: 16px;
    }

    /* --- HEADER --- */
    .home-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 0 10px 0;
      background: var(--glass);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 90%;
      max-width: 600px;
      margin-bottom: 10px;
    }

    .search-box {
      flex: 1;
      background: var(--border);
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 30px;
    }

    .search-box input {
      border: none;
      background: none;
      width: 100%;
      margin-left: 10px;
      outline: none;
      color: var(--text);
    }

    .grid {
      columns: 4;
      column-gap: 16px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 800px) { .grid { columns: 2; } }

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      border-radius: 24px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      cursor: pointer;
      position: relative;
    }

    .card img { width: 100%; display: block; }

    /* --- MODAL FIXES --- */
    #detailsModal {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 2000;
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }

    .split-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .view-left {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 50vh;
    }

    .view-left img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
    }

    .view-right {
      flex: 1;
      padding: 30px;
      background: var(--card-bg);
      color: var(--text);
    }

    @media (min-width: 1000px) {
      .split-container { flex-direction: row; }
      .view-right { flex: 0.5; height: 100vh; position: sticky; top: 0; border-left: 1px solid var(--border); }
      .view-left { flex: 1.5; }
    }

    .primary-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    input, textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 16px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

  <div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
  </div>

  <div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px; font-weight: 600;">Updating Cloud...</p>
  </div>

  <div id="auth" class="screen">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; text-align: center;">
      <div class="auth-container">
        <img src="logo.png" style="width: 60px; margin-bottom: 10px;">
        <h2 style="font-weight: 900;">Welcome to PIXS</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Select access level</p>

        <button class="auth-choice-btn" onclick="login('guest')">
          <i data-lucide="user"></i>
          <div style="text-align: left;">
            <div>Guest Access</div>
            <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">View & Discover</div>
          </div>
        </button>

        <button class="auth-choice-btn" onclick="document.getElementById('adminInputArea').style.display='block'">
          <i data-lucide="shield-check"></i>
          <div style="text-align: left;">
            <div>Administrator</div>
            <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">Manage Assets</div>
          </div>
        </button>

        <div id="adminInputArea" style="display: none; width: 100%; margin-top: 10px;">
          <input type="password" id="accessKey" placeholder="Enter Admin Password">
          <button class="primary-btn" onclick="checkAuth()">Login as Admin</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="screen">
    <header class="home-header">
      <div class="header-top">
        <img src="logo.png" class="main-logo" style="width:40px; cursor:pointer;" onclick="logout()">
        <div class="search-box">
          <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search PIXS..." oninput="handleSearch(this.value)">
        </div>
        <select class="sort-select" id="sortGrid" onchange="applySort()" style="padding:8px; border-radius:20px;">
          <option value="newest">Newest</option>
          <option value="likes">Likes</option>
        </select>
      </div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none;">
      <div style="background: var(--primary); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: var(--shadow);" onclick="openUpload()">
        <i data-lucide="plus" size="32"></i>
      </div>
    </div>
  </div>

  <div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:#fff; padding:12px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')">
      <i data-lucide="x"></i>
    </button>
    <div class="split-container">
      <div class="view-left">
        <img id="detImg" src="">
      </div>
      <div class="view-right">
        <h2 id="detTitle" style="font-weight:900; font-size:32px; margin:0;"></h2>
        <p id="detCaption" style="color:var(--text-muted);"></p>
        <div id="detTags" style="display:flex; gap:8px; margin: 20px 0;"></div>
        <button class="primary-btn" id="dynamicBtn">Visit Original</button>
        <div id="adminTools" style="display:none; margin-top:20px; gap:10px;">
            <button onclick="deleteCurrentAsset()" style="flex:1; color:red; background:none; border:1px solid red; padding:10px; border-radius:10px;">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="uploadModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:40px; overflow-y:auto;">
    <div style="max-width:500px; margin:0 auto;">
        <h2>New Asset</h2>
        <input type="text" id="upName" placeholder="Title">
        <textarea id="upLink" placeholder="Image URLs (one per line)"></textarea>
        <textarea id="upCaption" placeholder="Caption"></textarea>
        <button class="primary-btn" onclick="postAsset()">Post to Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; margin-top:10px;">Cancel</button>
    </div>
  </div>

  <script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentUserRole = null;
    const colorThief = new ColorThief();

    window.onload = async () => {
      lucide.createIcons();
      currentUserRole = localStorage.getItem('pixs_role');
      
      if (currentUserRole) {
        showApp();
        await syncFromBin();
      } else {
        showAuth();
      }

      setTimeout(() => {
        document.getElementById('loading').classList.add('fade-out');
      }, 1000);
    };

    function showAuth() {
      document.getElementById('auth').style.display = 'block';
      document.getElementById('app').style.display = 'none';
    }

    function showApp() {
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      if (currentUserRole === 'admin') {
        document.getElementById('adminFab').style.display = 'flex';
      }
    }

    function checkAuth() {
      const pass = document.getElementById('accessKey').value;
      if (pass === ADMIN_PASS) {
        login('admin');
      } else {
        alert("Incorrect Password");
      }
    }

    function login(role) {
      localStorage.setItem('pixs_role', role);
      currentUserRole = role;
      location.reload();
    }

    function logout() {
      localStorage.removeItem('pixs_role');
      location.reload();
    }

    async function syncFromBin() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { "X-Master-Key": API_KEY }
        });
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
      } catch (e) { console.error(e); }
    }

    function renderGrid(assets) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      assets.forEach((asset, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${asset.urls ? asset.urls[0] : asset.url}"><div style="padding:15px; font-weight:700;">${asset.name}</div>`;
        card.onclick = () => openDetails(asset, index);
        grid.appendChild(card);
      });
    }

    function openDetails(asset, index) {
      document.getElementById('detImg').src = asset.urls ? asset.urls[0] : asset.url;
      document.getElementById('detTitle').innerText = asset.name;
      document.getElementById('detCaption').innerText = asset.caption || "";
      document.getElementById('detailsModal').style.display = 'flex';
      document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
    }

    function openUpload() {
      document.getElementById('uploadModal').style.display = 'block';
    }

    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      lucide.createIcons();
    }

    async function postAsset() {
        const title = document.getElementById('upName').value;
        const links = document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== "");
        const assetObj = { name: title, urls: links, date: Date.now(), likes: 0 };
        allAssets.push(assetObj);
        
        document.getElementById('saving').style.display = 'flex';
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        location.reload();
    }
  </script>
</body>
</html>
