<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading, .saving-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .saving-overlay { background: rgba(0,0,0,0.7); display: none; z-index: 5000; backdrop-filter: blur(8px); color: white; }

        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 0 6px 0;
            background: var(--glass); position: sticky;
            top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .search-box {
            width: 90%; max-width: 500px; background: var(--border);
            display: flex; align-items: center; padding: 10px 18px; border-radius: 30px; margin-bottom: 8px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .collections-wrapper::-webkit-scrollbar { display: none; }

        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; display: block; }

        #dropZone {
            position: fixed; inset: 0; background: rgba(47, 109, 246, 0.2);
            backdrop-filter: blur(10px); z-index: 6000; display: none;
            border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;
            align-items: center; justify-content: center; pointer-events: none;
        }

        #detailsModal, #uploadModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; animation: fullSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); flex-direction: column; }
        
        .view-right { flex: 0.8; padding: 30px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); overflow-y: auto;}

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}

        @media (min-width: 800px) {
            .view-right { flex: 0.6; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .split-container { display: flex; height: 100%; }
        }
        
        @keyframes fullSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fullSlideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <img src="logo.png" style="width: 60px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
</div>

<div id="dropZone">
    <div style="text-align: center; color: var(--primary);">
        <i data-lucide="upload-cloud" size="60"></i>
        <h2 style="font-weight: 800;">Drop to Post to PIXS</h2>
    </div>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 15px; font-weight: 600;">Updating Cloud...</p>
</div>

<div id="auth" class="screen">
    <div style="height: 45vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; text-align: center; box-shadow: 0 -10px 20px rgba(0,0,0,0.05);">
        <img src="logo.png" style="width: 50px; margin-bottom: 20px;">
        <h2 style="font-weight: 800;">Access Private Gallery</h2>
        <input type="password" id="accessKey" placeholder="Enter Access Key">
        <button class="primary-btn" onclick="checkAuth()">Login to PIXS</button>
    </div>
</div>

<div id="app" class="screen">
    <header class="home-header">
        <img src="logo.png" class="main-logo" style="width:32px;">
        <div class="search-box">
            <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
            <input type="text" id="searchInput" placeholder="Search across collections...">
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    <div style="position: fixed; bottom: 30px; right: 30px; z-index: 99;">
        <div style="background: var(--primary); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: 0 10px 25px rgba(47, 109, 246, 0.4);" onclick="openUpload()"><i data-lucide="plus" size="32"></i></div>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:rgba(255,255,255,0.9); color:#000; padding:12px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div style="flex:1.4; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <img id="detImg" src="" style="max-width:100%; max-height:100%; object-fit:contain;">
        </div>
        <div class="view-right" id="detPanel">
            <h2 id="detTitle" style="font-weight:900; font-size:32px; margin:0 0 10px 0; letter-spacing:-1px;"></h2>
            <p id="detCaption" style="color: var(--text-muted); line-height:1.6;"></p>
            <div id="detTags" style="display:flex; gap:8px; margin: 25px 0; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="dynamicBtn" onclick="visitOriginal()"><i data-lucide="external-link" size="18"></i> Visit Original Site</button>
            <div style="display:flex; gap:12px;">
                <button class="primary-btn" style="background:#10b981; flex:1;" onclick="downloadPNG()">PNG</button>
                <button class="primary-btn" style="background:#ef4444; flex:1;" onclick="downloadPDF()">PDF</button>
            </div>
            
            <div style="margin-top:30px; border-top:1px dashed var(--border); padding-top:25px; display:flex; gap:12px;">
                <button onclick="editCurrentAsset()" style="flex:1; background:none; border:1px solid var(--border); color:var(--text); padding:12px; border-radius:12px; cursor:pointer; font-weight:600;">Edit</button>
                <button onclick="deleteCurrentAsset()" style="flex:1; background:none; border:1px solid #ef4444; color:#ef4444; padding:12px; border-radius:12px; cursor:pointer; font-weight:600;">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:var(--border); color:var(--text); padding:10px; border-radius:50%; cursor:pointer;" onclick="closeModal('uploadModal')"><i data-lucide="x"></i></button>
    <div style="max-width:550px; margin:0 auto; padding:60px 25px; width:100%; box-sizing:border-box;">
        <h2 id="modalTitle" style="text-align:center; font-weight:900; letter-spacing:-1px; margin-bottom:25px;">Asset Entry</h2>
        
        <input type="text" id="upName" placeholder="Asset Title">
        <textarea id="upCaption" placeholder="Internal Description" rows="3"></textarea>
        
        <div style="background: var(--border); padding:15px; border-radius:20px; margin-bottom:20px;">
            <p style="font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px;">Sources</p>
            <input type="text" id="upLink" placeholder="Image URL (Direct Link)">
            <input type="text" id="upSourceSite" placeholder="Original Website Link">
        </div>

        <p style="font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px;">Collections</p>
        <input type="text" id="tagSearch" placeholder="Search 50+ collections..." style="padding:10px; font-size:13px; margin-bottom:10px;" oninput="filterModalTags()">
        <div id="modalTags" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:25px; max-height:160px; overflow-y:auto; background:var(--card-bg); padding:12px; border-radius:16px; border:1px solid var(--border);"></div>
        
        <button class="primary-btn" id="saveBtn" onclick="postAsset()" style="padding:18px; font-size:16px;">Post to Cloud</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const AUTH_KEY = "qwerty_1227_pics_xioleng";

    const collectionList = [
        "Memes", "Vintage", "Nature", "Minimal", "Abstract", "Wallpapers", "Aesthetic", "Architecture", 
        "Travel", "Food", "Gaming", "Technology", "Cars", "Animals", "Space", "Anime", "Art", 
        "Fashion", "Music", "Sports", "Urban", "Mountains", "Beaches", "Flowers", "Night Sky", 
        "Photography", "Illustrations", "Waterfalls", "Cityscapes", "Retro", "3D Art", "Futuristic", 
        "Street Art", "Minimalist Design", "Office/Workspace", "Fitness", "Birds", "Landscapes", 
        "Portraits", "Cinematic", "Black & White", "Quotes", "Festivals", "Gadgets", "Gaming Setup", 
        "Surreal", "Fantasy", "Motorcycles", "Coffee", "Seasonal", "Textures", "Cartoons", 
        "Vintage Posters", "Inspirational", "Cyberpunk"
    ];

    let allAssets = [];
    let selectedTags = [];
    let currentViewAsset = null;
    let editIndex = null;
    const colorThief = new ColorThief();

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') toggleTheme(true);
        if(localStorage.getItem('pixs_signed_in') === 'true') {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            await syncFromBin();
        } else {
            document.getElementById('auth').style.display = 'block';
        }
        document.getElementById('loading').style.display = 'none';
        renderHomeCollections();
        setupDragAndDrop();
    };

    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode');
        if(!init) localStorage.setItem('pixs_dark', isDark);
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    async function syncFromBin() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
            const data = await res.json();
            allAssets = data.record.assets || [];
            renderGrid(allAssets);
        } catch (e) { console.error("Sync Error", e); }
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${asset.url}" loading="lazy">`;
            card.onclick = () => openDetails(asset, allAssets.indexOf(asset));
            grid.appendChild(card);
        });
    }

    function renderHomeCollections() {
        const wrapper = document.getElementById('homeCollections');
        wrapper.innerHTML = '';
        collectionList.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = cat;
            chip.onclick = () => {
                const isActive = chip.classList.contains('active');
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                if (isActive) renderGrid(allAssets);
                else {
                    chip.classList.add('active');
                    renderGrid(allAssets.filter(a => a.tags?.includes(cat)));
                }
            };
            wrapper.appendChild(chip);
        });
    }

    function openDetails(data, index) {
        currentViewAsset = data;
        editIndex = index;
        document.getElementById('detTitle').innerText = data.name;
        document.getElementById('detCaption').innerText = data.caption || "";
        const img = document.getElementById('detImg');
        img.crossOrigin = "Anonymous";
        img.src = data.url;

        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('detPanel').style.borderTop = `8px solid ${rgb}`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) { console.log("CORS restriction on color extraction"); }
        };

        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (data.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    function visitOriginal() {
        const url = currentViewAsset.sourceSite || currentViewAsset.url;
        window.open(url, '_blank');
    }

    function openUpload(isEdit = false) {
        editIndex = isEdit ? editIndex : null;
        document.getElementById('modalTitle').innerText = isEdit ? "Edit Asset" : "Upload Asset";
        document.getElementById('saveBtn').innerText = isEdit ? "Update Asset" : "Post to Cloud";
        if(!isEdit) {
            document.getElementById('upName').value = '';
            document.getElementById('upLink').value = '';
            document.getElementById('upSourceSite').value = '';
            document.getElementById('upCaption').value = '';
            selectedTags = [];
        }
        document.getElementById('uploadModal').style.display = 'flex';
        renderModalTags();
    }

    function renderModalTags() {
        const container = document.getElementById('modalTags');
        container.innerHTML = '';
        collectionList.forEach(cat => {
            const tag = document.createElement('div');
            tag.className = `chip ${selectedTags.includes(cat) ? 'active' : ''}`;
            tag.innerText = cat;
            tag.onclick = () => {
                tag.classList.toggle('active');
                if(selectedTags.includes(cat)) selectedTags = selectedTags.filter(t => t !== cat);
                else selectedTags.push(cat);
            };
            container.appendChild(tag);
        });
    }

    function filterModalTags() {
        const term = document.getElementById('tagSearch').value.toLowerCase();
        document.querySelectorAll('#modalTags .chip').forEach(tag => {
            tag.style.display = tag.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    async function postAsset() {
        const name = document.getElementById('upName').value;
        const url = document.getElementById('upLink').value;
        if(!name || !url) return alert("Required fields missing");

        document.getElementById('saving').style.display = 'flex';
        const assetObj = { 
            name, url, 
            sourceSite: document.getElementById('upSourceSite').value,
            caption: document.getElementById('upCaption').value, 
            tags: [...selectedTags] 
        };

        if(editIndex !== null) allAssets[editIndex] = assetObj;
        else allAssets.push(assetObj);

        await updateBin();
        closeModal('uploadModal');
        document.getElementById('saving').style.display = 'none';
    }

    async function updateBin() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        renderGrid(allAssets);
    }

    function editCurrentAsset() {
        const asset = currentViewAsset;
        closeModal('detailsModal');
        openUpload(true);
        document.getElementById('upName').value = asset.name;
        document.getElementById('upLink').value = asset.url;
        document.getElementById('upSourceSite').value = asset.sourceSite || "";
        document.getElementById('upCaption').value = asset.caption || "";
        selectedTags = [...(asset.tags || [])];
        renderModalTags();
    }

    async function deleteCurrentAsset() {
        if(confirm("Permanently delete this asset?")) {
            document.getElementById('saving').style.display = 'flex';
            allAssets.splice(editIndex, 1);
            await updateBin();
            closeModal('detailsModal');
            document.getElementById('saving').style.display = 'none';
        }
    }

    function setupDragAndDrop() {
        window.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropZone').style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) document.getElementById('dropZone').style.display = 'none'; });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('dropZone').style.display = 'none';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => { openUpload(); document.getElementById('upLink').value = ev.target.result; };
                reader.readAsDataURL(file);
            }
        });
    }

    function checkAuth() {
        if(document.getElementById('accessKey').value === AUTH_KEY) {
            localStorage.setItem('pixs_signed_in', 'true');
            location.reload();
        } else alert("Invalid Key");
    }

    function closeModal(id) { 
        const modal = document.getElementById(id);
        modal.style.animation = "fullSlideDown 0.4s forwards";
        setTimeout(() => { modal.style.display = 'none'; modal.style.animation = ""; }, 400);
    }

    async function downloadPNG() {
        const response = await fetch(currentViewAsset.url);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${currentViewAsset.name}.png`;
        link.click();
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(currentViewAsset.name, 10, 10);
        doc.addImage(currentViewAsset.url, 'JPEG', 10, 20, 180, 150);
        doc.save(`${currentViewAsset.name}.pdf`);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allAssets.filter(a => a.name.toLowerCase().includes(term) || a.tags?.some(t => t.toLowerCase().includes(term))));
    });
</script>
</body>
</html>
