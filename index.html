<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Discover the Extraordinary</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    body {
      margin: 0; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x: hidden; transition: background 0.5s ease;
    }

    /* --- ENHANCED ANIMATIONS --- */
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .screen { display: none; min-height: 100vh; animation: fadeIn 0.8s var(--transition); }
    .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; position: relative; animation: slideUp 0.6s var(--transition) backwards; }
    .card:hover { transform: translateY(-8px) scale(1.02); z-index: 10; }
    
    /* --- SLIDER STYLES --- */
    .slider-container { position: relative; width: 100%; height: 85vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; padding: 15px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(10px); transition: 0.3s; }
    .slider-btn:hover { background: var(--primary); }
    .prev-btn { left: 20px; }
    .next-btn { right: 20px; }

    /* --- COMMENT NESTING --- */
    .comment-item { margin-top: 10px; padding: 10px; border-left: 2px solid var(--border); transition: 0.3s; }
    .reply-box { margin-left: 20px; border-left: 1px dashed var(--border); padding-left: 15px; margin-top: 8px; }
    .comment-actions { font-size: 11px; display: flex; gap: 10px; margin-top: 5px; color: var(--primary); cursor: pointer; }
    .admin-del { color: #ef4444 !important; font-weight: bold; }

    /* Existing Class Upgrades */
    .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); }
    .primary-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
    .chip { padding: 8px 16px; border-radius: 20px; background: var(--border); font-size: 12px; cursor: pointer; transition: 0.3s; white-space: nowrap; font-weight: 600; }
    .chip.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(47, 109, 246, 0.3); }

    /* Layout Fixed */
    .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 1000px) { .grid { columns: 2; } }
    
    .home-header { position: sticky; top: 0; z-index: 100; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 0; }
  </style>
</head>

<body>
  <button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

  <div id="loading">
    <img src="logo.png" style="width: 80px; animation: bounce 2s infinite;">
    <p style="margin-top: 15px; font-weight: 900; color: var(--primary); letter-spacing: 4px;">PIXS CORE</p>
  </div>

  <div id="saving" class="saving-overlay">
    <div style="border: 4px solid #fff; border-radius: 50%; border-top-color: var(--primary); width: 40px; height: 40px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px; font-weight: 800;">SYNCING CLOUD...</p>
  </div>

  <div id="auth" class="screen">
    <div style="height: 45vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; position: relative;">
      <div class="auth-container">
        <h1 style="font-weight: 900; font-size: 32px;">PIXS</h1>
        <p style="color: var(--text-muted); margin-top: -10px;">Cloud Repository v2.0</p>
        <button class="auth-choice-btn" onclick="login('guest')"><i data-lucide="user"></i> Guest Access</button>
        <button class="auth-choice-btn" onclick="document.getElementById('adminInputArea').style.display='block'"><i data-lucide="shield-check"></i> Administrator</button>
        <div id="adminInputArea" style="display: none; width: 100%; animation: slideUp 0.4s ease;">
          <input type="password" id="accessKey" placeholder="Admin Key">
          <button class="primary-btn" onclick="checkAuth()">Authorize System</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="screen">
    <header class="home-header">
      <div class="header-top" style="width: 90%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px;">
        <img src="logo.png" style="width:45px; cursor:pointer;" onclick="logoutTrigger()">
        <div class="search-box">
          <i data-lucide="search" size="18"></i>
          <input type="text" id="searchInput" placeholder="Explore aesthetics..." onkeyup="smartSearch(this.value)">
        </div>
      </div>
      <div class="collections-bar" id="collectionsBar" style="width: 90%; max-width: 1200px; margin: 10px auto 0;">
          <span class="chip active" onclick="filterByCollection('All')">All</span>
          </div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 500; display: none;">
      <button class="primary-btn" style="width:70px; height:70px; border-radius:50%; box-shadow: 0 10px 30px rgba(47, 109, 246, 0.5);" onclick="openUpload()"><i data-lucide="plus" size="32"></i></button>
    </div>
  </div>

  <div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:1000; border:none; background:var(--card-bg); padding:15px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    
    <div class="split-container">
      <div class="view-left">
          <div class="slider-container">
              <button class="slider-btn prev-btn" onclick="changeSlide(-1)"><i data-lucide="chevron-left"></i></button>
              <img id="detImg" src="" style="animation: fadeIn 0.5s ease;">
              <button class="slider-btn next-btn" onclick="changeSlide(1)"><i data-lucide="chevron-right"></i></button>
          </div>
          <div style="position:absolute; bottom:30px; left:30px; display:flex; gap:15px;">
              <button class="primary-btn" style="width:auto; padding: 10px 25px;" onclick="downloadFile('png')"><i data-lucide="download"></i> PNG</button>
              <button class="secondary-btn" onclick="downloadFile('pdf')">PDF Export</button>
          </div>
      </div>
      
      <div class="view-right" style="animation: slideInRight 0.6s var(--transition);">
        <h1 id="detTitle" style="font-weight:900; margin:0; font-size: 32px;"></h1>
        <p id="detCaption" style="color:var(--text-muted); font-size: 16px; margin: 15px 0;"></p>
        
        <div id="detTags" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 25px;"></div>
        
        <div style="display:flex; justify-content: space-between; align-items:center; background: var(--bg); padding: 15px; border-radius: 20px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="likeBtn" onclick="handleLike()" style="background:var(--primary); border:none; border-radius: 50%; width: 45px; height: 45px; cursor:pointer; color: white;">
                    <i id="likeIcon" data-lucide="heart"></i>
                </button>
                <span style="font-weight: 800; font-size: 18px;" id="detLikeCount">0</span>
            </div>
            <a id="detSource" href="#" target="_blank" class="secondary-btn" style="text-decoration:none;">Original Site <i data-lucide="external-link" size="14"></i></a>
        </div>

        <div class="comment-box">
            <h3 style="font-weight: 900;">Discussions</h3>
            <div id="commentList" style="max-height: 300px; overflow-y: auto; padding-right: 10px;"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <input type="text" id="commentInput" placeholder="Write a public comment..." style="margin:0;">
                <button class="primary-btn" style="width: auto; padding: 0 20px;" onclick="addComment()"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div id="adminTools" style="display:none; margin-top:30px; padding:20px; border-radius: 20px; background: rgba(239, 68, 68, 0.1);">
            <p style="margin:0 0 10px 0; font-weight:800; color:#ef4444;">Admin Privileges</p>
            <button onclick="deleteAsset()" style="color:#ef4444; background:none; border:none; cursor:pointer; font-weight:700; text-decoration: underline;">DELETE ENTIRE ASSET</button>
        </div>
      </div>
    </div>
  </div>

  <div id="uploadModal" class="modal" style="position:fixed; inset:0; background:var(--bg); z-index:4000; display:none; padding:40px; overflow-y:auto; animation: slideUp 0.5s ease;">
    <div style="max-width:600px; margin:0 auto; background: var(--card-bg); padding: 40px; border-radius: 40px; box-shadow: var(--shadow);">
        <h2 style="font-weight: 900; margin-top: 0;">Upload to PIXS</h2>
        
        <div id="upPreview" style="width:100%; height:250px; background:var(--border); border-radius:20px; margin-bottom:20px; overflow:hidden; display:flex; align-items:center; justify-content:center;">
            <p style="color:var(--text-muted);">Image Preview</p>
        </div>

        <input type="text" id="upName" placeholder="Visual Title">
        <textarea id="upLink" placeholder="Image URLs (Paste one per line for multiple slides)" onchange="updateUpPreview()" style="height: 100px;"></textarea>
        <input type="text" id="upSource" placeholder="Direct Source URL">
        <textarea id="upCaption" placeholder="Write a short description..."></textarea>
        <input type="text" id="upTags" placeholder="Tags (e.g. moody, 4k, clean)">
        
        <label style="font-weight: 700; font-size: 14px; margin-bottom: 8px; display: block;">Primary Collection</label>
        <select id="upCollection" style="margin-bottom: 25px;"></select>

        <button class="primary-btn" onclick="postAsset()">PUBLISH TO CLOUD</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; margin-top:15px; cursor:pointer; color: var(--text-muted);">Dismiss</button>
    </div>
  </div>

  <script>
    // --- SETTINGS ---
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";
    const COLLECTIONS = ["Memes", "Educational", "Technology", "Minimal", "Vintage", "Nature", "Abstract", "Architecture", "Cyberpunk", "Gaming", "Photography", "UI/UX", "3D Art", "Space", "Anime", "Movies", "Cars", "Travel", "Food", "Fashion", "Music", "Aesthetic", "Workspaces", "Vector", "Patterns", "Logos", "Business", "Health", "Sport", "Animals", "Ocean", "Macro", "Portrait", "Sky", "Dark", "Light", "Monochrome", "Gradient", "Retro", "Futuristic", "Industrial", "Handcrafted", "Sketch", "Oil Painting", "Typography", "Coding", "Science", "History", "News", "Miscellaneous"];

    let allAssets = [];
    let currentUserRole = null;
    let activeAssetIdx = null;
    let currentSlideIdx = 0;
    let likedAssets = JSON.parse(localStorage.getItem('pixs_liked') || "[]");

    window.onload = async () => {
      initCollections();
      currentUserRole = localStorage.getItem('pixs_role');
      if (currentUserRole) { showApp(); await syncFromBin(); } else { showAuth(); }
      setTimeout(() => document.getElementById('loading').classList.add('fade-out'), 1000);
      lucide.createIcons();
    };

    function initCollections() {
        const sel = document.getElementById('upCollection');
        const bar = document.getElementById('collectionsBar');
        COLLECTIONS.sort().forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
            bar.innerHTML += `<span class="chip" onclick="filterByCollection('${c}')">${c}</span>`;
        });
    }

    // --- AUTH ---
    function login(role) { localStorage.setItem('pixs_role', role); location.reload(); }
    function showAuth() { document.getElementById('auth').style.display = 'block'; }
    function showApp() { 
        document.getElementById('app').style.display = 'block'; 
        if(currentUserRole === 'admin') document.getElementById('adminFab').style.display = 'flex';
    }
    function checkAuth() {
      if (document.getElementById('accessKey').value === ADMIN_PASS) login('admin');
      else alert("System Access Denied.");
    }
    function logoutTrigger() { document.getElementById('logoutConfirm').style.display = 'flex'; }
    function confirmLogout(yes) {
        if(yes) { localStorage.removeItem('pixs_role'); location.reload(); }
        else { document.getElementById('logoutConfirm').style.display = 'none'; }
    }

    // --- DATA HANDLING ---
    async function syncFromBin() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
      const data = await res.json();
      allAssets = data.record.assets || [];
      renderGrid(allAssets);
    }

    async function updateBin() {
      document.getElementById('saving').style.display = 'flex';
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
        body: JSON.stringify({ assets: allAssets })
      });
      document.getElementById('saving').style.display = 'none';
      renderGrid(allAssets);
    }

    // --- GRID RENDERING ---
    function renderGrid(assets) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      assets.forEach((asset, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const imgUrl = (asset.urls && asset.urls.length > 0) ? asset.urls[0] : (asset.url || "");
        card.innerHTML = `
          <img src="${imgUrl}" loading="lazy">
          <div class="card-info">
            <span style="font-weight:900; font-size:14px;">${asset.name}</span>
            <span style="font-size:12px; opacity:0.8; display:flex; align-items:center; gap:4px;"><i data-lucide="heart" size="12" fill="${likedAssets.includes(asset.date) ? 'currentColor' : 'none'}"></i> ${asset.likes || 0}</span>
          </div>`;
        card.onclick = () => openDetails(asset);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    // --- SLIDER & DETAILS ---
    function openDetails(asset) {
      activeAssetIdx = allAssets.indexOf(asset);
      currentSlideIdx = 0;
      updateSlider();
      
      document.getElementById('detTitle').innerText = asset.name;
      document.getElementById('detCaption').innerText = asset.caption || "No description provided.";
      document.getElementById('detLikeCount').innerText = asset.likes || 0;
      document.getElementById('detSource').href = asset.sourceSite || "#";
      
      const tagBox = document.getElementById('detTags');
      tagBox.innerHTML = `<span class="chip active">${asset.collection}</span>`;
      if(asset.tags) asset.tags.forEach(t => tagBox.innerHTML += `<span class="chip">#${t}</span>`);
      
      renderComments();
      document.getElementById('detailsModal').style.display = 'flex';
      document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'block' : 'none';
      lucide.createIcons();
    }

    function updateSlider() {
        const asset = allAssets[activeAssetIdx];
        const urls = asset.urls || [asset.url];
        document.getElementById('detImg').src = urls[currentSlideIdx];
        document.querySelector('.prev-btn').style.display = urls.length > 1 ? 'block' : 'none';
        document.querySelector('.next-btn').style.display = urls.length > 1 ? 'block' : 'none';
    }

    function changeSlide(dir) {
        const urls = allAssets[activeAssetIdx].urls || [allAssets[activeAssetIdx].url];
        currentSlideIdx = (currentSlideIdx + dir + urls.length) % urls.length;
        updateSlider();
    }

    function handleLike() {
        const asset = allAssets[activeAssetIdx];
        if (likedAssets.includes(asset.date)) return alert("Already liked!");
        
        asset.likes = (asset.likes || 0) + 1;
        likedAssets.push(asset.date);
        localStorage.setItem('pixs_liked', JSON.stringify(likedAssets));
        document.getElementById('detLikeCount').innerText = asset.likes;
        updateBin();
    }

    // --- NESTED COMMENTS ---
    function renderComments() {
        const list = document.getElementById('commentList');
        const comments = allAssets[activeAssetIdx].comments || [];
        list.innerHTML = comments.length ? '' : '<p style="opacity:0.5; font-size:13px;">Start the conversation...</p>';
        
        comments.forEach((c, idx) => {
            list.appendChild(createCommentElement(c, idx, false));
        });
        lucide.createIcons();
    }

    function createCommentElement(c, idx, isReply, parentIdx = null) {
        const div = document.createElement('div');
        div.className = isReply ? 'reply-box' : 'comment-item';
        div.innerHTML = `
            <div style="font-weight:800; font-size:13px; color:var(--primary);">${c.user} ${c.isAdmin ? '🛡️' : ''}</div>
            <div style="font-size:14px; margin:4px 0;">${c.text}</div>
            <div class="comment-actions">
                <span onclick="likeComment(${idx}, ${parentIdx})">❤️ ${c.likes || 0}</span>
                <span onclick="setupReply(${idx}, '${c.user}')">Reply</span>
                ${currentUserRole === 'admin' ? `<span class="admin-del" onclick="deleteComment(${idx}, ${parentIdx})">Delete</span>` : ''}
            </div>
        `;
        
        if (c.replies) {
            c.replies.forEach((r, rIdx) => {
                div.appendChild(createCommentElement(r, rIdx, true, idx));
            });
        }
        return div;
    }

    function setupReply(idx, user) {
        const input = document.getElementById('commentInput');
        input.value = `@${user} `;
        input.focus();
        input.dataset.replyTo = idx;
    }

    function addComment() {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (!text) return;

        const newComment = {
            user: currentUserRole === 'admin' ? 'ADMIN' : 'GUEST_' + Math.floor(Math.random()*100),
            text: text,
            likes: 0,
            isAdmin: currentUserRole === 'admin',
            replies: []
        };

        const parentIdx = input.dataset.replyTo;
        if (parentIdx !== undefined && parentIdx !== "") {
            allAssets[activeAssetIdx].comments[parentIdx].replies.push(newComment);
            delete input.dataset.replyTo;
        } else {
            if (!allAssets[activeAssetIdx].comments) allAssets[activeAssetIdx].comments = [];
            allAssets[activeAssetIdx].comments.push(newComment);
        }

        input.value = '';
        renderComments();
        updateBin();
    }

    function deleteComment(idx, parentIdx) {
        if (parentIdx === null) allAssets[activeAssetIdx].comments.splice(idx, 1);
        else allAssets[activeAssetIdx].comments[parentIdx].replies.splice(idx, 1);
        renderComments();
        updateBin();
    }

    function likeComment(idx, parentIdx) {
        let target;
        if (parentIdx === null) target = allAssets[activeAssetIdx].comments[idx];
        else target = allAssets[activeAssetIdx].comments[parentIdx].replies[idx];
        
        target.likes = (target.likes || 0) + 1;
        renderComments();
        updateBin();
    }

    // --- ASSET MANAGEMENT ---
    function updateUpPreview() {
        const lines = document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== "");
        if(lines.length > 0) document.getElementById('upPreview').innerHTML = `<img src="${lines[0]}" style="width:100%; height:100%; object-fit:cover; animation: fadeIn 0.5s;">`;
    }

    async function postAsset() {
        const lines = document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== "");
        if (lines.length === 0) return alert("Add at least one image link!");

        const asset = {
            name: document.getElementById('upName').value || "Untitled Artwork",
            urls: lines,
            caption: document.getElementById('upCaption').value,
            sourceSite: document.getElementById('upSource').value,
            collection: document.getElementById('upCollection').value,
            tags: document.getElementById('upTags').value.split(',').map(t => t.trim()).filter(t => t !== ""),
            date: Date.now(),
            likes: 0,
            comments: []
        };
        allAssets.unshift(asset);
        await updateBin();
        closeModal('uploadModal');
    }

    function deleteAsset() {
        if(confirm("DANGER: This will wipe this asset from the cloud. Proceed?")) {
            allAssets.splice(activeAssetIdx, 1);
            updateBin();
            closeModal('detailsModal');
        }
    }

    // --- UTILS ---
    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openUpload() { document.getElementById('uploadModal').style.display = 'block'; }
    function filterByCollection(tag) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        if(tag === 'All') renderGrid(allAssets);
        else renderGrid(allAssets.filter(a => a.collection === tag));
    }
    function smartSearch(val) {
        const q = val.toLowerCase();
        renderGrid(allAssets.filter(a => a.name.toLowerCase().includes(q) || (a.caption||"").toLowerCase().includes(q) || a.collection.toLowerCase().includes(q)));
    }
    function downloadFile(type) {
        const img = document.getElementById('detImg').src;
        if(type === 'png') {
            const link = document.createElement('a');
            link.href = img; link.download = 'PIXS_Asset.png'; link.click();
        } else {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.text(document.getElementById('detTitle').innerText, 10, 10);
            pdf.addImage(img, 'JPEG', 10, 20, 180, 140);
            pdf.save('PIXS_Export.pdf');
        }
    }
  </script>
</body>
</html>
