<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Auth</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #loading.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }
        #loading img { animation: pulse 1.5s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .saving-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white; 
        }

        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        /* --- AUTH SCREEN STYLES --- */
        .auth-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;
        }
        .auth-choice-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text); cursor: pointer;
            margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px;
            font-weight: 700; font-size: 16px;
        }
        .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }
        .auth-choice-btn i { color: var(--primary); }

        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 0 10px 0; background: var(--glass); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 600px; margin-bottom: 10px; }
        .main-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; cursor: pointer;}

        .search-box {
            flex: 1; background: var(--border);
            display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .sort-select { 
            background: var(--card-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; outline: none;
        }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 600; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }
        .card img { width: 100%; display: block; }
        .card .stack-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; backdrop-filter: blur(5px); z-index: 5;}

        /* HOVER OVERLAY */
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%);
            opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; color: white;
        }
        .card:hover .card-overlay { opacity: 1; }
        .overlay-title { font-weight: 800; font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .overlay-likes { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; opacity: 0.9; }

        #detailsModal, #uploadModal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto;
        }
        
        #dropZone {
            position: fixed; inset: 0; background: rgba(47, 109, 246, 0.2);
            backdrop-filter: blur(10px); z-index: 6000; display: none;
            border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;
            align-items: center; justify-content: center; pointer-events: none;
        }

        .split-container { display: flex; flex-direction: column; min-height: 100%; width: 100%; }
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 350px; position: relative; }
        .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }
        .img-counter { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; backdrop-filter: blur(10px); }

        .view-right { flex: 1; padding: 35px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 5;}

        .preview-area {
            width: 100%; min-height: 120px; border-radius: 20px; border: 2px dashed var(--border);
            margin-bottom: 20px; display: flex; align-items: center; justify-content: flex-start;
            overflow-x: auto; background: var(--bg); position: relative; cursor: pointer; padding: 8px;
        }
        .preview-area img { max-height: 80px; border-radius:12px; margin-right:6px; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}

        .tag-creator { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag-creator input { margin-bottom: 0; flex: 1; }
        .tag-creator button { width: auto; padding: 0 20px; margin-bottom: 0; }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .view-right { flex: 0.5; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .view-left { flex: 1.5; }
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <body style="font-family:sans-serif; --primary:#007bff; --card-bg:#fff; --border:#ccc; background:#f5f5f5; margin:0; padding:0;">

    <!-- HEADER -->
    <header style="background: var(--primary); color:white; padding:20px; text-align:center;">
        <h1>My Image Upload Page</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main style="padding:20px;">
        <p>Click the + button at the bottom-right to upload images, add titles, captions, source, collections, and tags.</p>

        <!-- Uploaded items (if you want a display area) -->
        <div id="uploadedItems" style="display:flex; gap:10px; flex-wrap: wrap;"></div>
    </main>

    <!-- PLUS BUTTON & MODAL will be added by script -->
    <!-- Script below includes modal, plus button, drag/drop, preview, title, caption, collection, tags, post/cancel -->

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        let uploadedFiles = [];
        let customTags = [];
        let collections = ["Art", "Photography", "Design", "Nature"];
        let activeCollection = null;

        // PLUS BUTTON
        const plusBtn = document.createElement("button");
        plusBtn.textContent = "+";
        plusBtn.style.cssText = `
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 30px; background: var(--primary); color: white;
            border: none; cursor: pointer; z-index: 999;
        `;
        document.body.appendChild(plusBtn);

        // MODAL
        const uploadModal = document.createElement("div");
        uploadModal.id = "uploadModal";
        uploadModal.style.cssText = `
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10000; backdrop-filter: blur(8px);
            padding: 20px;
        `;
        uploadModal.innerHTML = `
            <div style="background: var(--card-bg); border-radius: 24px; width: 90%; max-width: 600px; padding: 20px; max-height: 90%; overflow-y: auto;">
                <h2 style="margin-top:0;">Upload Images / Links</h2>
                <div class="preview-area" id="previewArea" style="min-height:120px; border:2px dashed var(--border); border-radius:12px; display:flex; flex-wrap: wrap; gap:10px; justify-content:center; align-items:center; cursor:pointer;">Click or drag files here</div>
                <input type="file" id="fileInput" multiple style="display:none">
                <input type="text" id="titleInput" placeholder="Title" style="width:100%; margin-top:10px; padding:8px;">
                <textarea id="captionInput" placeholder="Caption" style="width:100%; margin-top:10px; padding:8px;"></textarea>
                <input type="text" id="sourceInput" placeholder="Source" style="width:100%; margin-top:10px; padding:8px;">
                <div id="collectionsContainer" style="display:flex; gap:10px; margin:10px 0;"></div>
                <div class="tag-creator" style="display:flex; gap:5px;">
                    <input type="text" id="tagInput" placeholder="Add custom tag" style="flex:1; padding:5px;">
                    <button id="addTagBtn">Add</button>
                </div>
                <div id="tagsContainer" style="display:flex; gap:8px; flex-wrap: wrap; margin-top:5px;"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="primary-btn" id="postBtn">Post</button>
                    <button class="primary-btn" id="cancelBtn" style="background:#aaa">Cancel</button>
                </div>
            </div>
        `;
        document.body.appendChild(uploadModal);

        // Elements
        const previewArea = document.getElementById("previewArea");
        const fileInput = document.getElementById("fileInput");
        const titleInput = document.getElementById("titleInput");
        const captionInput = document.getElementById("captionInput");
        const sourceInput = document.getElementById("sourceInput");
        const collectionsContainer = document.getElementById("collectionsContainer");
        const tagInput = document.getElementById("tagInput");
        const addTagBtn = document.getElementById("addTagBtn");
        const tagsContainer = document.getElementById("tagsContainer");
        const postBtn = document.getElementById("postBtn");
        const cancelBtn = document.getElementById("cancelBtn");

        // Collections
        collections.forEach(col => {
            const chip = document.createElement("div");
            chip.className = "chip";
            chip.textContent = col;
            chip.style.cssText = "padding:5px 12px; border-radius:16px; border:1px solid var(--primary); cursor:pointer;";
            chip.addEventListener("click", () => {
                document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                activeCollection = col;
            });
            collectionsContainer.appendChild(chip);
        });

        // OPEN MODAL
        plusBtn.addEventListener("click", () => uploadModal.style.display = "flex");
        cancelBtn.addEventListener("click", () => { uploadModal.style.display = "none"; resetModal(); });

        // Drag & drop
        previewArea.addEventListener("click", () => fileInput.click());
        previewArea.addEventListener("dragover", e => { e.preventDefault(); previewArea.style.borderColor = "var(--primary)"; });
        previewArea.addEventListener("dragleave", e => { e.preventDefault(); previewArea.style.borderColor = "var(--border)"; });
        previewArea.addEventListener("drop", e => { e.preventDefault(); previewArea.style.borderColor = "var(--border)"; handleFiles(e.dataTransfer.files); });

        fileInput.addEventListener("change", e => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let f of files) uploadedFiles.push({file:f, url: URL.createObjectURL(f)});
            updatePreview();
        }

        function updatePreview() {
            previewArea.innerHTML = "";
            uploadedFiles.forEach((fObj, idx) => {
                const img = document.createElement("img");
                img.src = fObj.url;
                img.title = fObj.file.name;
                img.style.cssText = "width:80px; height:80px; object-fit:cover; border-radius:8px; cursor:pointer;";
                img.addEventListener("click", () => { uploadedFiles.splice(idx,1); updatePreview(); });
                previewArea.appendChild(img);
            });
            if(uploadedFiles.length===0) previewArea.textContent="Click or drag files here";
        }

        // Tags
        addTagBtn.addEventListener("click", () => {
            const val = tagInput.value.trim();
            if(val && !customTags.includes(val)) { customTags.push(val); renderTags(); tagInput.value=""; }
        });
        function renderTags() {
            tagsContainer.innerHTML="";
            customTags.forEach((t, idx)=>{
                const span=document.createElement("span");
                span.textContent=t+" ✕";
                span.style.cssText="background: var(--primary); color:white; padding:4px 10px; border-radius:12px; cursor:pointer; font-size:12px;";
                span.addEventListener("click",()=>{ customTags.splice(idx,1); renderTags(); });
                tagsContainer.appendChild(span);
            });
        }

        // Post
        postBtn.addEventListener("click", () => {
            if(!uploadedFiles.length) return alert("Add at least one file");
            const asset = {
                files: uploadedFiles.map(f=>f.file),
                title: titleInput.value,
                caption: captionInput.value,
                source: sourceInput.value,
                collection: activeCollection,
                tags: [...customTags]
            };
            console.log("POST ASSET:", asset);
            alert("Asset posted! Check console.");
            uploadModal.style.display="none"; resetModal();
        });

        function resetModal() {
            uploadedFiles=[]; customTags=[]; activeCollection=null;
            titleInput.value=""; captionInput.value=""; sourceInput.value="";
            previewArea.textContent="Click or drag files here";
            tagsContainer.innerHTML="";
            document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        }
    });
    </script>

</body>
</html>
