<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Discover the Extraordinary</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
/* =======================
   GLOBAL VARIABLES
======================= */
:root {
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 20px;

    --bg: #f2f2f2;
    --fg: #222;
    --accent: #ff3c00;
    --accent-dark: #e63b00;
    --shadow: rgba(0,0,0,0.15);
}

/* =======================
   BASE STYLES
======================= */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* =======================
   DARK MODE
======================= */
body.dark-mode {
    --bg: #1e1e1e;
    --fg: #eee;
    --accent: #ff6b6b;
    --accent-dark: #e65c5c;
}

/* =======================
   SCREENS
======================= */
.screen {
    display: none;
    width: 100%;
    flex: 1;
    padding: 16px;
}

/* =======================
   BUTTONS
======================= */
button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: var(--accent-dark);
}

/* FAB BUTTON */
.fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 28px;
    box-shadow: 0 4px 12px var(--shadow);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
}

.fab:hover {
    background: var(--accent-dark);
    transform: scale(1.05);
}

/* =======================
   CARDS & GRID
======================= */
#grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
}

.card {
    background: #fff;
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 6px var(--shadow);
}

body.dark-mode .card {
    background: #2a2a2a;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card h4 {
    padding: 8px;
    font-size: 14px;
    text-align: center;
}

/* =======================
   MODALS
======================= */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-content {
    background: var(--bg);
    color: var(--fg);
    padding: 24px;
    border-radius: var(--radius-lg);
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
}

/* CLOSE BUTTON */
.closeBtn {
    position: absolute;
    top: 12px;
    right: 12px;
    cursor: pointer;
    font-size: 22px;
    font-weight: bold;
}

/* =======================
   SLIDER
======================= */
#sliderWrapper {
    display: flex;
    transition: transform 0.3s ease;
    gap: 8px;
    margin-top: 12px;
}

#sliderWrapper img {
    border-radius: var(--radius-md);
    flex-shrink: 0;
}

/* =======================
   CHIPS / TAGS
======================= */
.chip {
    display: inline-block;
    padding: 4px 8px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    font-size: 12px;
    margin: 2px 2px 2px 0;
}

/* =======================
   INPUTS
======================= */
input, textarea, select {
    width: 100%;
    padding: 8px 12px;
    border-radius: var(--radius-md);
    border: 1px solid #ccc;
    margin-bottom: 12px;
    font-size: 14px;
}

body.dark-mode input,
body.dark-mode textarea,
body.dark-mode select {
    background: #333;
    color: #fff;
    border: 1px solid #555;
}

/* =======================
   COMMENTS
======================= */
#commentList div {
    background: var(--bg);
    padding: 8px 12px;
    margin-bottom: 6px;
    border-radius: var(--radius-sm);
}

/* =======================
   SEARCH
======================= */
#searchInput {
    width: calc(100% - 40px);
    margin-right: 8px;
}

/* =======================
   RESPONSIVE
======================= */
@media(max-width: 480px) {
    #grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }

    .fab {
        width: 48px;
        height: 48px;
        font-size: 24px;
    }
}

</style>
</head>
<body>
  <!-- --- THEME BUTTON & LOADING --- -->
  <button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

  <div id="loading">
    <img src="logo.png" style="width: 80px; animation: float 3s ease-in-out infinite;">
    <p style="margin-top: 20px; font-weight: 800; color: var(--primary); letter-spacing: 8px; font-size: 14px; text-transform: uppercase;">PIXS CORE</p>

    <p id="savingText" style="margin-top: 20px; font-weight: 600; letter-spacing: 2px;">SYNCING DATA...</p>
  </div>

  <!-- --- LOGOUT CONFIRM --- -->
  <div id="logoutConfirm" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
      <div style="background: var(--card-bg); padding: 40px; border-radius: var(--radius-lg); text-align: center; width: 90%; max-width: 400px; border: 1px solid var(--border);">
          <h3 style="margin-top:0; font-size: 24px;">End Session?</h3>
          <p style="color: var(--text-muted); margin-bottom: 30px;">You are about to log out of the PIXS ecosystem.</p>
          <button class="primary-btn" onclick="confirmLogout(true)" style="background: #ef4444; margin-bottom: 12px; box-shadow: 0 10px 20px rgba(239,68,68,0.3);">Terminate Session</button>
          <button class="secondary-btn" style="width:100%" onclick="confirmLogout(false)">Return to Dashboard</button>
      </div>
  </div>

  <!-- --- AUTH SCREEN --- -->
  <div id="auth" class="screen">
    <div style="height: 45vh; background: linear-gradient(to bottom, transparent, var(--bg)), url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; max-width: 500px; margin: -60px auto 0; position: relative; z-index: 5;">
      <div style="background: var(--card-bg); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border);">
        <h2 style="font-weight: 800; font-size: 36px; margin-bottom: 10px;">Access PIXS</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Curate, Discover, and Organize</p>
        <button class="auth-choice-btn" onclick="login('guest')">
          <i data-lucide="user"></i> Guest Explorer
        </button>
        <button class="auth-choice-btn" onclick="document.getElementById('adminInputArea').style.display='block'">
          <i data-lucide="shield-check"></i> Administrator
        </button>
        <div id="adminInputArea" style="display: none; width: 100%; margin-top: 20px; animation: reveal 0.4s ease;">
          <input type="password" id="accessKey" placeholder="Authorization Key">
          <button class="primary-btn" onclick="checkAuth()">Authorize Access</button>
        </div>
      </div>
    </div>
  </div>

  <!-- --- APP SCREEN --- -->
  <div id="app" class="screen">
    <header class="home-header">
      <div style="display: flex; align-items: center; gap: 20px; width: 90%; max-width: 1000px; margin-bottom: 10px;">
        <img src="logo.png" style="width:45px; height:45px; cursor:pointer; border-radius:12px;" onclick="logoutTrigger()">
        <div class="search-box">
          <i data-lucide="search" size="20" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search pixels, tags, or collections..." onkeyup="smartSearch(this.value)">
        </div>
        <button id="searchBackBtn" class="secondary-btn" style="display:none;" onclick="clearSearch()">Reset</button>
      </div>
      <div class="collections-bar" id="collectionsBar">
          <span class="chip active" onclick="filterByCollection('All')">All Feed</span>
      </div>
    </header>

    <div id="grid" class="grid"></div>

    <button id="adminFab" class="fab-btn" onclick="openUpload()">
        <i data-lucide="plus" size="32"></i>
    </button>
  </div>

  <!-- --- DETAILS MODAL WITH FULL EDIT --- -->
  <div id="detailsModal">
    <button style="position:fixed; top:25px; right:25px; z-index:100; border:none; background:var(--card-bg); padding:15px; border-radius:50%; box-shadow: var(--shadow); cursor:pointer; border:1px solid var(--border);" onclick="closeModal('detailsModal')">
      <i data-lucide="x"></i>
    </button>
    
    <div class="split-container">
      <div class="view-left">
          <div class="slider-container">
            <button class="slider-btn prev-btn" onclick="moveSlider(-1)"><i data-lucide="chevron-left"></i></button>
            <div class="slider-wrapper" id="sliderWrapper"></div>
            <button class="slider-btn next-btn" onclick="moveSlider(1)"><i data-lucide="chevron-right"></i></button>
          </div>
          <div style="position:absolute; bottom:25px; left:25px; display:flex; gap:12px; z-index:20;">
              <button class="secondary-btn" style="background:rgba(255,255,255,0.2); color:white; backdrop-filter:blur(10px); border:none;" onclick="downloadFile('png')"><i data-lucide="download" size="16"></i> Image</button>
          </div>
      </div>

      <div class="view-right">
        <!-- --- EDIT AREA WITH NAME, CAPTION, TAGS, COLLECTION, SOURCE --- -->
        <div id="editTitleArea" style="display:none; margin-bottom:25px; padding: 20px; background: var(--bg); border-radius: var(--radius-md);">
            <h4 style="margin-top:0">Edit Metadata</h4>
            <input type="text" id="editName" placeholder="Asset Title">
            <textarea id="editCaption" placeholder="Detailed description..." style="height: 100px;"></textarea>
            <input type="text" id="editTags" placeholder="Custom Tags (comma separated)">
            <select id="editCollection"></select>
            <input type="text" id="editSource" placeholder="Direct Source URL">
            <button class="primary-btn" onclick="saveEdits()">Apply Changes</button>
        </div>

        <h2 id="detTitle" style="font-weight:800; margin:0 0 10px; font-size: 32px; letter-spacing: -1px;"></h2>
        <p id="detCaption" style="color:var(--text-muted); line-height: 1.7; font-size: 16px; margin-bottom: 25px;"></p>
        <div id="detTags" style="display:flex; gap:8px; flex-wrap:wrap; margin:20px 0;"></div>

        <!-- --- LIKE, SOURCE, COMMENTS, ADMIN --- -->
        <div style="display:flex; gap:20px; align-items:center; margin:30px 0; padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
            <button onclick="handleLike()" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:10px; color:var(--text); font-weight:800; font-size: 18px;">
                <i id="likeIcon" data-lucide="heart" size="24"></i> <span id="detLikeCount">0</span>
            </button>
            <a id="detSource" href="#" target="_blank" class="secondary-btn" style="text-decoration:none; flex: 1; text-align: center;">Visit Origin <i data-lucide="external-link" size="14"></i></a>
        </div>

        <div class="comment-section">
            <h4 style="font-weight:800; display:flex; align-items:center; gap:12px; margin-bottom: 20px;">Discussion <i data-lucide="message-square" size="20" style="color: var(--primary);"></i></h4>
            <div id="commentList"></div>
            <div style="display:flex; gap:12px; margin-top:25px; position: sticky; bottom: 0; background: var(--card-bg); padding: 15px 0;">
                <input type="text" id="commentInput" placeholder="Write your thoughts..." style="margin:0;">
                <button class="primary-btn" style="width: 60px; padding:0;" onclick="addComment()"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div id="adminTools" style="display:none; margin-top:40px; padding:25px; background: rgba(239,68,68,0.05); border-radius: var(--radius-md); border: 1px dashed #ef4444;">
            <p style="margin-top:0; color:#ef4444; font-weight:800; font-size: 12px; text-transform: uppercase;">Admin Privilege</p>
            <div style="display:flex; gap:20px;">
                <button onclick="toggleEditMode()" style="color:var(--primary); background:none; border:none; cursor:pointer; font-weight:700;">Edit Entry</button>
                <button onclick="deleteAsset()" style="color:#ef4444; background:none; border:none; cursor:pointer; font-weight:700;">Delete Entry</button>
            </div>
        </div>
      </div>
    </div>
  </div>

  <!-- --- UPLOAD MODAL --- -->
  <div id="uploadModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:30px; overflow-y:auto;">
    <div style="max-width:600px; margin:0 auto; padding-bottom:100px; animation: reveal 0.6s ease;">
        <div id="upPreview" style="width:100%; height:300px; background:var(--border); border-radius:var(--radius-md); margin-bottom:30px; overflow:hidden; display:flex; align-items:center; justify-content:center; border: 2px dashed var(--text-muted);">
            <p style="color:var(--text-muted); font-weight: 600;">Content Preview</p>
        </div>
        <h2 style="font-weight: 800; font-size: 28px; margin-bottom: 25px;">Push New Content</h2>
        <input type="text" id="upName" placeholder="Title of the Pixel">
        <textarea id="upLink" placeholder="Image URLs (Paste links, one per line)" onchange="updateUpPreview()" style="height:120px;"></textarea>
        <input type="text" id="upSource" placeholder="Direct Source URL (e.g. Dribbble link)">
        <textarea id="upCaption" placeholder="Pixels are better with descriptions..."></textarea>
        <input type="text" id="upTags" placeholder="Custom Tags (comma separated)">
        <p style="font-size:12px; font-weight:800; margin-bottom:10px; color: var(--text-muted);">COLLECTION HUB</p>
        <select id="upCollection"></select>
        <button class="primary-btn" onclick="postAsset()" style="margin-top: 20px;">Deploy to Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; margin-top:20px; cursor:pointer; font-weight:700; color: var(--text-muted);">Discard Draft</button>
    </div>
  </div>

  <script>
    /* --- FULL JS LOGIC INCLUDING EDIT --- */
    const BIN_IDS = [
      "69c90b42ed015c742bc9240a",
      "697bf24443b1c97be955f57b",
      "697bf23343b1c97be955f560",
      "697bf22243b1c97be955f549",
      "697bf206ae596e708f01ccfa",
      "697bf1e143b1c97be955f502",

      "697bf184ae596e708f01cc69",
      "697bf17043b1c97be955f480",
      "6979d3b243b1c97be9514916",
      "6979d397ae596e708ffd1cb8",
      "6979d37ad0ea881f408cb41c",
      "6979d361d0ea881f408cb3df",
      "6979d34b43b1c97be9514820",
      "6979caa4ae596e708ffd06f1",
      "6975849aae596e708ff3ac71",
      "69758488ae596e708ff3ac46",
      "6975846eae596e708ff3ac0e",
      "6975845143b1c97be947d90a",
      "697583fed0ea881f40834015",
      "69736f22d0ea881f407f8807"
    ];
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentUserRole = null;
    let activeAssetIdx = null;
    let currentSlide = 0;
    
    const COLLECTIONS = ["Nature","Minimal","Abstract","Tech","Architecture","Memes","Educational","Vintage","UI Design","3D Art","Photography","Cyberpunk","Street Art","Space","Animals","Gaming","Branding","Typography","Illustrations","Interior","Fashion","Cars","Music","Cinema","Coding","Marketing","Crypto","Health","Food","Travel","Quotes","Sketches","Patterns","Logos","Mobile","Web","Icons","Motion","TV Series", "Films", "Anime","Product","Aesthetic","Retrowave","Surreal","Fantasy"];

    // --- INITIAL LOAD ---
    document.addEventListener("DOMContentLoaded", () => {
        allAssets = []; // Will fetch or generate asset list
        populateCollections();
        lucide.replace();
        showScreen("auth");
    });

    function showScreen(screenId) {
        document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
        document.getElementById(screenId).style.display = "block";
    }

    // --- THEME TOGGLE ---
    function toggleTheme() {
        document.body.classList.toggle("dark-mode");
        const icon = document.getElementById("themeIcon");
        icon.setAttribute("data-lucide", document.body.classList.contains("dark-mode") ? "sun" : "moon");
        lucide.replace();
    }

    // --- AUTH ---
    function login(role) {
        currentUserRole = role;
        showScreen("app");
        loadAssets();
    }

    function checkAuth() {
        const key = document.getElementById("accessKey").value;
        if (key === ADMIN_PASS) {
            currentUserRole = "admin";
            showScreen("app");
            document.getElementById("adminFab").style.display = "block";
            loadAssets();
        } else {
            alert("Authorization Failed");
        }
    }

    // --- LOGOUT ---
    function logoutTrigger() {
        document.getElementById("logoutConfirm").style.display = "flex";
    }

    function confirmLogout(confirm) {
        if (confirm) location.reload();
        else document.getElementById("logoutConfirm").style.display = "none";
    }

    // --- ASSET LOADING & GRID ---
    function loadAssets() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        allAssets.forEach((asset, idx) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${asset.images[0]}" alt="${asset.name}">
                <h4>${asset.name}</h4>
            `;
            card.onclick = () => openDetails(idx);
            grid.appendChild(card);
        });
    }

    function populateCollections() {
        const upColl = document.getElementById("upCollection");
        const editColl = document.getElementById("editCollection");
        COLLECTIONS.forEach(c => {
            const opt1 = document.createElement("option");
            opt1.value = c; opt1.text = c; upColl.add(opt1);
            const opt2 = document.createElement("option");
            opt2.value = c; opt2.text = c; editColl.add(opt2);
        });
    }

    // --- DETAILS MODAL ---
    function openDetails(idx) {
        activeAssetIdx = idx;
        currentSlide = 0;
        const asset = allAssets[idx];
        document.getElementById("detailsModal").style.display = "flex";
        document.getElementById("detTitle").textContent = asset.name;
        document.getElementById("detCaption").textContent = asset.caption;
        document.getElementById("detTags").innerHTML = asset.tags.map(t => `<span class="chip">${t}</span>`).join("");
        document.getElementById("detLikeCount").textContent = asset.likes || 0;
        document.getElementById("detSource").href = asset.source || "#";
        renderSlider(asset.images);

        // Admin edit toggle
        if(currentUserRole === "admin") {
            document.getElementById("adminTools").style.display = "block";
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = "none";
        toggleEditMode(false); // reset edit view
    }

    function renderSlider(images) {
        const wrapper = document.getElementById("sliderWrapper");
        wrapper.innerHTML = images.map(src => `<img src="${src}" style="width:100%; height:auto; border-radius: var(--radius-md);">`).join("");
        showSlide(0);
    }

    function moveSlider(dir) {
        const asset = allAssets[activeAssetIdx];
        currentSlide += dir;
        if(currentSlide < 0) currentSlide = asset.images.length - 1;
        if(currentSlide >= asset.images.length) currentSlide = 0;
        showSlide(currentSlide);
    }

    function showSlide(idx) {
        const wrapper = document.getElementById("sliderWrapper");
        wrapper.style.transform = `translateX(-${idx*100}%)`;
    }

    // --- ADMIN EDIT ---
    function toggleEditMode(forceOff = false) {
        const editArea = document.getElementById("editTitleArea");
        if(forceOff) {
            editArea.style.display = "none";
            return;
        }
        const isVisible = editArea.style.display === "block";
        if(isVisible) {
            editArea.style.display = "none";
        } else {
            editArea.style.display = "block";
            const asset = allAssets[activeAssetIdx];
            document.getElementById("editName").value = asset.name;
            document.getElementById("editCaption").value = asset.caption;
            document.getElementById("editTags").value = asset.tags.join(", ");
            document.getElementById("editCollection").value = asset.collection || COLLECTIONS[0];
            document.getElementById("editSource").value = asset.source || "";
        }
    }

    function saveEdits() {
        const asset = allAssets[activeAssetIdx];
        asset.name = document.getElementById("editName").value;
        asset.caption = document.getElementById("editCaption").value;
        asset.tags = document.getElementById("editTags").value.split(",").map(t => t.trim());
        asset.collection = document.getElementById("editCollection").value;
        asset.source = document.getElementById("editSource").value;

        // Update UI
        document.getElementById("detTitle").textContent = asset.name;
        document.getElementById("detCaption").textContent = asset.caption;
        document.getElementById("detTags").innerHTML = asset.tags.map(t => `<span class="chip">${t}</span>`).join("");
        document.getElementById("detSource").href = asset.source || "#";

        // Hide edit area
        toggleEditMode(true);

        alert("Asset updated successfully!");
        loadAssets(); // refresh grid
    }

    function deleteAsset() {
        if(confirm("Are you sure you want to delete this asset?")) {
            allAssets.splice(activeAssetIdx, 1);
            closeModal("detailsModal");
            loadAssets();
        }
    }

    // --- LIKE FUNCTION ---
    function handleLike() {
        const asset = allAssets[activeAssetIdx];
        asset.likes = (asset.likes || 0) + 1;
        document.getElementById("detLikeCount").textContent = asset.likes;
    }

    // --- COMMENTS ---
    function addComment() {
        const input = document.getElementById("commentInput");
        const text = input.value.trim();
        if(!text) return;
        const asset = allAssets[activeAssetIdx];
        if(!asset.comments) asset.comments = [];
        asset.comments.push(text);
        renderComments();
        input.value = "";
    }

    function renderComments() {
        const asset = allAssets[activeAssetIdx];
        const list = document.getElementById("commentList");
        list.innerHTML = (asset.comments || []).map(c => `<div style="padding:8px 12px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom:6px;">${c}</div>`).join("");
    }

    // --- SEARCH ---
    function smartSearch(query) {
        query = query.toLowerCase();
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        allAssets.filter(a => 
            a.name.toLowerCase().includes(query) ||
            a.tags.some(t => t.toLowerCase().includes(query)) ||
            (a.collection && a.collection.toLowerCase().includes(query))
        ).forEach((asset, idx) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="${asset.images[0]}" alt="${asset.name}"><h4>${asset.name}</h4>`;
            card.onclick = () => openDetails(idx);
            grid.appendChild(card);
        });
        document.getElementById("searchBackBtn").style.display = query ? "inline-block" : "none";
    }

    function clearSearch() {
        document.getElementById("searchInput").value = "";
        smartSearch("");
    }

    // --- UPLOAD ---
    function openUpload() {
        document.getElementById("uploadModal").style.display = "block";
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = "none";
    }

    function updateUpPreview() {
        const urls = document.getElementById("upLink").value.split("\n").filter(u => u.trim()!=="");
        const preview = document.getElementById("upPreview");
        preview.innerHTML = urls.map(u => `<img src="${u}" style="max-width:100%; max-height:100%;">`).join("");
    }

    function postAsset() {
        const newAsset = {
            name: document.getElementById("upName").value,
            caption: document.getElementById("upCaption").value,
            tags: document.getElementById("upTags").value.split(",").map(t=>t.trim()),
            collection: document.getElementById("upCollection").value,
            source: document.getElementById("upSource").value,
            images: document.getElementById("upLink").value.split("\n").filter(u=>u.trim()!==""),
            likes: 0,
            comments: []
        };
        allAssets.unshift(newAsset);
        closeModal("uploadModal");
        loadAssets();
        alert("New pixel deployed!");
    }

  </script>
</body>
</html>
