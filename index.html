<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Auth & Gallery</title>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* --- Animations --- */
    @keyframes screenReveal { 
      from { opacity: 0; transform: scale(0.98); } 
      to { opacity: 1; transform: scale(1); } 
    }
    @keyframes pulse { 
      0%, 100% { transform: scale(1); opacity: 1; } 
      50% { transform: scale(1.1); opacity: 0.7; } 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .screen { 
      display: none; 
      min-height: 100vh; 
      animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
    }
    .screen.active { display: block; }

    /* --- UI Components --- */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999;
    }

    .theme-btn {
      position: fixed; top: 15px; left: 20px;
      background: var(--card-bg); border: 1px solid var(--border); 
      border-radius: 50%; width: 40px; height: 40px;
      cursor: pointer; color: var(--text); z-index: 101;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }

    .primary-btn {
      background: var(--primary); color: white; border: none;
      padding: 16px; border-radius: 16px; font-weight: 600;
      width: 100%; cursor: pointer; display: flex;
      justify-content: center; align-items: center; gap: 10px;
      transition: var(--transition);
    }

    input, textarea {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); padding: 15px;
      border-radius: 16px; width: 100%; box-sizing: border-box;
      margin-bottom: 12px; outline: none;
    }

    /* --- Auth Layout --- */
    .auth-hero { height: 40vh; background: #2f6df6; border-radius: 0 0 40px 40px; }
    .auth-card {
      max-width: 450px; margin: -60px auto 0; padding: 40px;
      background: var(--card-bg); border-radius: 30px;
      box-shadow: var(--shadow); text-align: center;
    }
    .auth-choice-btn {
      width: 100%; padding: 18px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card-bg);
      color: var(--text); cursor: pointer; margin-bottom: 12px;
      display: flex; align-items: center; gap: 15px; transition: var(--transition);
    }
    .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-2px); }

    /* --- Main App Layout --- */
    .home-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--glass); backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border); padding: 15px 0;
    }
    .header-content {
      max-width: 1200px; margin: 0 auto; display: flex;
      align-items: center; gap: 20px; padding: 0 20px;
    }
    .search-box {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; padding: 10px 18px;
      border-radius: 30px;
    }
    .grid {
      columns: 2; column-gap: 16px; padding: 20px;
      max-width: 1400px; margin: 0 auto;
    }

    @media (min-width: 768px) { .grid { columns: 3; } }
    @media (min-width: 1024px) { .grid { columns: 4; } }

    .card {
      break-inside: avoid; margin-bottom: 16px;
      border-radius: var(--radius); overflow: hidden;
      background: var(--card-bg); position: relative;
      transition: var(--transition);
    }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }

    /* --- Modals --- */
    .modal-full {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 2000; display: none; overflow-y: auto;
    }
  </style>
</head>
<body>

  <div id="loading">
    <img src="logo.png" style="width: 80px;" onerror="this.style.display='none'">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
  </div>

  <button class="theme-btn" onclick="toggleTheme()">
    <i id="themeIcon" data-lucide="moon"></i>
  </button>

  <section id="auth" class="screen active">
    <div class="auth-hero"></div>
    <div class="auth-card">
      <img src="logo.png" style="width: 60px; margin-bottom: 15px;">
      <h2 style="font-weight: 900; margin: 0;">Welcome to PIXS</h2>
      <p style="color: var(--text-muted); margin-bottom: 30px;">Select your access level to continue</p>
      
      <button class="auth-choice-btn" onclick="login('guest')">
        <i data-lucide="user"></i>
        <div style="text-align: left;">
          <div style="font-weight: 700;">Guest Access</div>
          <div style="font-size: 11px; color: var(--text-muted);">View, Like & Discover</div>
        </div>
      </button>

      <button class="auth-choice-btn" onclick="toggleAdminPrompt()">
        <i data-lucide="shield-check"></i>
        <div style="text-align: left;">
          <div style="font-weight: 700;">Administrator</div>
          <div style="font-size: 11px; color: var(--text-muted);">Full Management Access</div>
        </div>
      </button>

      <div id="adminInputArea" style="display: none; margin-top: 15px;">
        <input type="password" id="accessKey" placeholder="Enter Admin Password">
        <button class="primary-btn" onclick="checkAuth()">Login as Admin</button>
      </div>
    </div>
  </section>

  <section id="app" class="screen">
    <header class="home-header">
      <div class="header-content">
        <img src="logo.png" style="width: 40px; cursor: pointer;" onclick="logout()">
        <div class="search-box">
          <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search PIXS..." oninput="handleSearch(this.value)" style="border:none; margin:0; padding:0 10px; background:transparent;">
        </div>
        <select class="sort-select" style="padding: 8px; border-radius: 12px; border: 1px solid var(--border);">
          <option value="newest">Newest</option>
          <option value="likes">Trending</option>
        </select>
      </div>
    </header>

    <div id="grid" class="grid">
      <div class="card"><img src="https://via.placeholder.com/300x400" alt="Placeholder"></div>
      <div class="card"><img src="https://via.placeholder.com/300x200" alt="Placeholder"></div>
      <div class="card"><img src="https://via.placeholder.com/300x500" alt="Placeholder"></div>
    </div>

    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; display: none;">
      <button class="primary-btn" style="width: 60px; height: 60px; border-radius: 50%;" onclick="openUpload()">
        <i data-lucide="plus" size="30"></i>
      </button>
    </div>
  </section>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Hide Loading Screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 1000);
    });

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const icon = document.getElementById('themeIcon');
      const isDark = document.body.classList.contains('dark-mode');
      icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();
    }

    function toggleAdminPrompt() {
      const area = document.getElementById('adminInputArea');
      area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    function login(type) {
      document.getElementById('auth').classList.remove('active');
      document.getElementById('app').classList.add('active');
      if(type === 'admin') document.getElementById('adminFab').style.display = 'block';
    }

    function checkAuth() {
      const pass = document.getElementById('accessKey').value;
      if(pass === "1234") { // Placeholder logic
        login('admin');
      } else {
        alert("Invalid Password");
      }
    }

    function logout() {
      document.getElementById('app').classList.remove('active');
      document.getElementById('auth').classList.add('active');
    }
  
    // --- Configuration & State ---
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";
    const collectionList = ["Nature", "Architecture", "Minimal", "Abstract", "Tech"]; // Default tags

    let allAssets = [];
    let selectedTags = [];
    let currentViewAsset = null;
    let currentImgIdx = 0;
    let editIndex = null;
    let currentUserRole = null;
    let activeReplyTo = null;
    const colorThief = new ColorThief();

    // --- Initialization ---
    window.onload = async () => {
        lucide.createIcons();
        
        // Theme Setup
        if (localStorage.getItem('pixs_dark') === 'true') {
            document.body.classList.add('dark-mode');
            toggleTheme(true);
        }

        // Auth Setup
        currentUserRole = localStorage.getItem('pixs_role');
        if (currentUserRole) {
            showApp();
            await syncFromBin();
        } else {
            showAuth();
        }

        // UI Setup
        setTimeout(() => {
            document.getElementById('loading').classList.add('fade-out');
            renderHomeCollections();
            setupDragAndDrop();
            setupSwipeDetection();
        }, 1000);
    };

    // --- Authentication Logic ---
    function showAuth() {
        document.getElementById('auth').style.display = 'block';
        document.getElementById('app').style.display = 'none';
        document.title = "PIXS | Auth";
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.title = "PIXS | Discover the Extraordinary";
        if (currentUserRole === 'admin') {
            document.getElementById('adminFab').style.display = 'flex';
        }
    }

    function login(role) {
        localStorage.setItem('pixs_role', role);
        currentUserRole = role;
        location.reload();
    }

    function checkAuth() {
        const pass = document.getElementById('accessKey').value;
        if (pass === ADMIN_PASS) login('admin');
        else alert("Access Denied: Incorrect Admin Password");
    }

    function logout() {
        if (confirm("Logout from PIXS?")) {
            localStorage.removeItem('pixs_role');
            location.reload();
        }
    }

    // --- Data Syncing (JSONBin) ---
    async function syncFromBin() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await res.json();
            allAssets = data.record.assets || [];
            applySort();
        } catch (e) { 
            console.error("Sync Error:", e); 
        }
    }

    async function updateBin(silent = false) {
        if (!silent) {
            document.getElementById('saving').style.display = 'flex';
            document.getElementById('savingText').innerText = "Syncing with Cloud...";
        }
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        if (!silent) {
            document.getElementById('saving').style.display = 'none';
            applySort();
        } else {
            renderGrid(allAssets);
        }
    }

    // --- Grid Rendering & Filtering ---
    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset) => {
            const realIndex = allAssets.indexOf(asset);
            const displayUrl = asset.urls ? asset.urls[0] : asset.url;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                ${(asset.urls?.length > 1) ? `<div class="stack-badge">${asset.urls.length}</div>` : ''}
                <img src="${processUrl(displayUrl)}" loading="lazy">
                <div class="card-overlay">
                    <div class="overlay-title">${asset.name}</div>
                    <div class="overlay-likes"><i data-lucide="heart" size="12" style="fill:white"></i> ${asset.likes || 0}</div>
                </div>
            `;
            card.onclick = () => openDetails(asset, realIndex);
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    function applySort() {
        const type = document.getElementById('sortGrid').value;
        if (type === 'likes') allAssets.sort((a, b) => (b.likes || 0) - (a.likes || 0));
        else if (type === 'newest') allAssets.sort((a, b) => b.date - a.date);
        else if (type === 'oldest') allAssets.sort((a, b) => a.date - b.date);
        renderGrid(allAssets);
    }

    // --- Details Modal Logic ---
    function openDetails(asset, index) {
        currentViewAsset = asset;
        editIndex = index;
        currentImgIdx = 0;
        
        document.title = `PIXS | ${asset.name}`;
        document.getElementById('detTitle').innerText = asset.name;
        document.getElementById('detCaption').innerText = asset.caption || "";
        document.getElementById('detLikeCount').innerText = asset.likes || 0;
        
        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (asset.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);

        document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
        
        updateModalImg();
        updateLikeUI();
        renderComments();
        
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    function updateModalImg() {
        const urls = currentViewAsset.urls || [currentViewAsset.url];
        const img = document.getElementById('detImg');
        img.src = processUrl(urls[currentImgIdx]);
        
        document.getElementById('imgCounter').innerText = `${currentImgIdx + 1} / ${urls.length}`;
        document.querySelectorAll('.nav-btn').forEach(b => b.style.display = urls.length > 1 ? 'flex' : 'none');

        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('detPanel').style.borderTop = `8px solid ${rgb}`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) {}
        };
    }

    // --- Asset Management (Admin) ---
    function openUpload(isEdit = false) {
        editIndex = isEdit ? editIndex : null;
        document.getElementById('modalTitle').innerText = isEdit ? "Edit Asset" : "Asset Entry";
        
        if (!isEdit) {
            document.getElementById('upName').value = ''; 
            document.getElementById('upLink').value = '';
            document.getElementById('upSourceSite').value = ''; 
            document.getElementById('upCaption').value = '';
            selectedTags = [];
        }
        
        renderModalTags();
        document.getElementById('uploadModal').style.display = 'block';
    }

    async function postAsset() {
        let title = await translateText(document.getElementById('upName').value);
        let caption = await translateText(document.getElementById('upCaption').value);
        let rawLinks = document.getElementById('upLink').value;
        let links = rawLinks.split(/[,\n]/).map(l => processUrl(l.trim())).filter(l => l !== "");

        const assetObj = {
            name: title,
            urls: links,
            url: links[0],
            sourceSite: document.getElementById('upSourceSite').value,
            caption: caption,
            tags: [...selectedTags],
            date: editIndex !== null ? allAssets[editIndex].date : Date.now(),
            likes: editIndex !== null ? allAssets[editIndex].likes : 0,
            comments: editIndex !== null ? (allAssets[editIndex].comments || []) : []
        };

        if (editIndex !== null) allAssets[editIndex] = assetObj;
        else allAssets.push(assetObj);

        await updateBin();
        closeModal('uploadModal');
    }

    // --- Helpers & UI Extras ---
    function processUrl(url) {
        if (!url) return "";
        if (url.includes('unsplash.com/photos/')) {
            const id = url.split('/').pop().split('?')[0];
            return `https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1200&q=80`;
        }
        return url;
    }

    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode', init ? localStorage.getItem('pixs_dark') === 'true' : undefined);
        if (!init) localStorage.setItem('pixs_dark', document.body.classList.contains('dark-mode'));
        
        const icon = document.getElementById('themeIcon');
        if (icon) {
            icon.setAttribute('data-lucide', document.body.classList.contains('dark-mode') ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.title = "PIXS | Discover the Extraordinary";
    }

    async function translateText(text) {
        if (!text || text.length < 2) return text;
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURI(text)}`);
            const data = await res.json();
            return data[0][0][0];
        } catch (e) { return text; }
    }
</script>
</body>
</html>
