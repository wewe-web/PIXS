<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* 🏠 IMPROVED HEADER */
        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0 10px 0;
            background: var(--glass); position: sticky;
            top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .main-logo { width: 55px; height: auto; margin-bottom: 15px; transition: var(--transition); cursor: pointer; }
        .main-logo:hover { transform: scale(1.1); }
        
        .search-box {
            width: 80%; max-width: 350px; background: var(--border);
            display: flex; align-items: center; padding: 8px 16px; border-radius: 30px; margin-bottom: 15px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box:focus-within { background: var(--card-bg); border-color: var(--primary); width: 400px; }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); font-size: 14px; }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 5px 20px 15px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .chip { padding: 6px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }

        /* 🖼️ GRID */
        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; display: block; min-height: 100px; background: #eee; }

        /* 📱 FULL SCREEN MODALS (100% Improvement) */
        #detailsModal, #uploadModal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; animation: fullSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .split-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .view-left img { width: 100%; height: 100%; object-fit: contain; }
        
        .view-right { 
            flex: 1; padding: 35px; background: var(--card-bg); color: var(--text); 
            border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -15px 40px rgba(0,0,0,0.15); 
            overflow-y: auto; z-index: 2;
        }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .view-left { flex: 1.5; }
            .view-right { flex: 0.5; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
        }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}

        #loading, .saving-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 800; color: var(--primary); letter-spacing: 3px;">PIXS CORE</p>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 40px; height: 40px; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 15px; font-weight: 700;">Syncing Cloud...</p>
</div>

<div id="app" class="screen" style="display:block;">
    <header class="home-header">
        <img src="logo.png" class="main-logo" onclick="location.reload()">
        <div class="search-box">
            <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
            <input type="text" id="searchInput" placeholder="Search PIXS...">
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    
    <div style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display:flex; flex-direction:column; gap:15px;">
        <button class="theme-btn" onclick="toggleTheme()" style="background:var(--card-bg); border:1px solid var(--border); width:55px; height:55px; border-radius:50%; box-shadow:var(--shadow); color:var(--text); cursor:pointer;"><i id="themeIcon" data-lucide="moon"></i></button>
        <div style="background: var(--primary); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: 0 10px 25px rgba(47, 109, 246, 0.4);" onclick="openUpload()"><i data-lucide="plus" size="32"></i></div>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:25px; right:25px; z-index:100; border:none; background:#fff; color:#000; padding:12px; border-radius:50%; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.2);" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div class="view-left">
            <img id="detImg" src="">
        </div>
        <div class="view-right" id="detPanel">
            <h2 id="detTitle" style="font-weight:900; font-size:36px; margin:0 0 10px 0; letter-spacing:-1.5px;"></h2>
            <p id="detCaption" style="color: var(--text-muted); line-height:1.7; font-size:15px;"></p>
            <div id="detTags" style="display:flex; gap:8px; margin: 30px 0; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="dynamicBtn" onclick="visitOriginal()"><i data-lucide="external-link" size="18"></i> Source Site</button>
            <div style="display:flex; gap:12px; margin-bottom:30px;">
                <button class="primary-btn" style="background:#10b981; flex:1;" onclick="downloadPNG()">Download PNG</button>
                <button class="primary-btn" style="background:#ef4444; flex:1;" onclick="downloadPDF()">Export PDF</button>
            </div>
            
            <div style="display:flex; gap:12px; border-top:1px dashed var(--border); padding-top:25px;">
                <button onclick="editCurrentAsset()" style="flex:1; background:none; border:1px solid var(--border); color:var(--text); padding:14px; border-radius:14px; cursor:pointer; font-weight:700;">Edit</button>
                <button onclick="deleteCurrentAsset()" style="flex:1; background:none; border:1px solid #ef4444; color:#ef4444; padding:14px; border-radius:14px; cursor:pointer; font-weight:700;">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <div style="max-width:600px; margin:0 auto; padding:60px 25px; width:100%; box-sizing:border-box; overflow-y:auto;">
        <h2 id="modalTitle" style="text-align:center; font-weight:900; font-size:32px; letter-spacing:-1px; margin-bottom:30px;">Upload to PIXS</h2>
        
        <input type="text" id="upName" placeholder="Asset Name">
        <textarea id="upLink" placeholder="Paste Image URLs (Separate multiple with commas or new lines. Max 10)" rows="4"></textarea>
        <input type="text" id="upSourceSite" placeholder="Original Website / Social Media Link">
        <textarea id="upCaption" placeholder="Internal Description / Project Context"></textarea>
        
        <p style="font-size:11px; font-weight:900; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px;">Select Collections</p>
        <input type="text" id="tagSearch" placeholder="Filter collections..." style="padding:10px; font-size:13px; margin-bottom:12px;" oninput="filterModalTags()">
        <div id="modalTags" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:25px; max-height:180px; overflow-y:auto; background:var(--card-bg); padding:15px; border-radius:20px; border:1px solid var(--border);"></div>
        
        <button class="primary-btn" id="saveBtn" onclick="postAsset()" style="padding:20px; font-size:17px;">Verify & Post</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; color:var(--text-muted); cursor:pointer; margin-top:10px; font-weight:600;">Discard Changes</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";

    const collectionList = [
        "All", "Memes", "Vintage", "Nature", "Minimal", "Abstract", "Wallpapers", "Aesthetic", "Architecture", 
        "Travel", "Food", "Gaming", "Technology", "Cars", "Animals", "Space", "Anime", "Art", 
        "Fashion", "Music", "Sports", "Urban", "Mountains", "Beaches", "Flowers", "Night Sky", 
        "Photography", "Illustrations", "Waterfalls", "Cityscapes", "Retro", "3D Art", "Futuristic", 
        "Street Art", "Minimalist Design", "Office/Workspace", "Fitness", "Birds", "Landscapes", 
        "Portraits", "Cinematic", "Black & White", "Quotes", "Festivals", "Gadgets", "Gaming Setup", 
        "Surreal", "Fantasy", "Motorcycles", "Coffee", "Seasonal", "Textures", "Cartoons", 
        "Vintage Posters", "Inspirational", "Cyberpunk"
    ];

    let allAssets = [];
    let selectedTags = [];
    let currentViewAsset = null;
    let editIndex = null;
    const colorThief = new ColorThief();

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') toggleTheme(true);
        await syncFromBin();
        document.getElementById('loading').style.display = 'none';
        renderHomeCollections();
    };

    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode');
        if(!init) localStorage.setItem('pixs_dark', isDark);
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    async function syncFromBin() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            // Pinterest/IG fix: We force a reload if the image fails
            card.innerHTML = `<img src="${asset.url}" onerror="this.src='https://via.placeholder.com/400?text=Private+Source+Link'" loading="lazy">`;
            card.onclick = () => openDetails(asset, allAssets.indexOf(asset));
            grid.appendChild(card);
        });
    }

    function renderHomeCollections() {
        const wrapper = document.getElementById('homeCollections');
        wrapper.innerHTML = '';
        collectionList.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'chip' + (cat === 'All' ? ' active' : '');
            chip.innerText = cat;
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                if (cat === 'All') renderGrid(allAssets);
                else renderGrid(allAssets.filter(a => a.tags?.includes(cat)));
            };
            wrapper.appendChild(chip);
        });
    }

    function openDetails(data, index) {
        currentViewAsset = data;
        editIndex = index;
        document.getElementById('detTitle').innerText = data.name;
        document.getElementById('detCaption').innerText = data.caption || "No description provided.";
        const img = document.getElementById('detImg');
        img.src = data.url;

        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('detPanel').style.borderTop = `10px solid ${rgb}`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) { console.log("Color skip"); }
        };

        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (data.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    async function postAsset() {
        const name = document.getElementById('upName').value;
        const rawLinks = document.getElementById('upLink').value;
        if(!name || !rawLinks) return alert("Title and Image Links are required.");

        document.getElementById('saving').style.display = 'flex';
        
        // Split by comma or newline, remove whitespace, filter empty
        let links = rawLinks.split(/[,\n]/).map(l => l.trim()).filter(l => l !== "");
        
        // Limit to 10 for performance
        if(links.length > 10) links = links.slice(0, 10);

        links.forEach(url => {
            const assetObj = { 
                name: links.length > 1 ? `${name} - Part ${links.indexOf(url)+1}` : name,
                url: url, 
                sourceSite: document.getElementById('upSourceSite').value,
                caption: document.getElementById('upCaption').value, 
                tags: [...selectedTags] 
            };

            if(editIndex !== null && links.length === 1) {
                allAssets[editIndex] = assetObj;
            } else {
                allAssets.push(assetObj);
            }
        });

        await updateBin();
        closeModal('uploadModal');
        document.getElementById('saving').style.display = 'none';
        location.reload(); // Refresh to clean states
    }

    async function updateBin() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
    }

    function openUpload() {
        document.getElementById('uploadModal').style.display = 'flex';
        renderModalTags();
    }

    function renderModalTags() {
        const container = document.getElementById('modalTags');
        container.innerHTML = '';
        collectionList.filter(c => c !== "All").forEach(cat => {
            const tag = document.createElement('div');
            tag.className = `chip ${selectedTags.includes(cat) ? 'active' : ''}`;
            tag.innerText = cat;
            tag.onclick = () => {
                tag.classList.toggle('active');
                if(selectedTags.includes(cat)) selectedTags = selectedTags.filter(t => t !== cat);
                else selectedTags.push(cat);
            };
            container.appendChild(tag);
        });
    }

    function filterModalTags() {
        const term = document.getElementById('tagSearch').value.toLowerCase();
        document.querySelectorAll('#modalTags .chip').forEach(tag => {
            tag.style.display = tag.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        editIndex = null; selectedTags = []; 
    }

    function visitOriginal() {
        const url = currentViewAsset.sourceSite || currentViewAsset.url;
        window.open(url, '_blank');
    }

    async function downloadPNG() {
        const response = await fetch(currentViewAsset.url);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `PIXS_${currentViewAsset.name}.png`;
        link.click();
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(currentViewAsset.name, 10, 10);
        doc.addImage(currentViewAsset.url, 'JPEG', 10, 20, 180, 150);
        doc.save(`${currentViewAsset.name}.pdf`);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allAssets.filter(a => a.name.toLowerCase().includes(term) || a.tags?.some(t => t.toLowerCase().includes(term))));
    });
</script>
</body>
</html>
