<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Discover the Extraordinary</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      radius: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* --- ANIMATIONS --- */
    @keyframes screenReveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cardIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s var(--transition); }
    .card { animation: cardIn 0.5s var(--transition) backwards; transition: var(--transition); }
    .card:hover { transform: translateY(-5px); }
    .chip { padding: 6px 14px; border-radius: 20px; background: var(--border); font-size: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .chip.active { background: var(--primary); color: white; }

    #loading {
      position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 9999; transition: 0.5s;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }

    .saving-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; 
      flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
      backdrop-filter: blur(8px); color: white;
    }

    .theme-btn {
      position: absolute; top: 15px; left: 20px; background: none; border: none; 
      cursor: pointer; color: var(--text); z-index: 101; transition: var(--transition);
    }

    /* --- AUTH --- */
    .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto; }
    .auth-choice-btn {
      width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border); 
      background: var(--card-bg); color: var(--text); cursor: pointer; margin-bottom: 15px; 
      transition: var(--transition); display: flex; align-items: center; gap: 15px; font-weight: 700;
    }

    /* --- HEADER --- */
    .home-header {
      display: flex; flex-direction: column; align-items: center; padding: 15px 0; 
      background: var(--glass); position: sticky; top: 0; z-index: 100; 
      backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 800px; }
    .search-box { flex: 1; background: var(--border); display: flex; align-items: center; padding: 10px 18px; border-radius: 30px; }
    .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

    .collections-bar { display: flex; gap: 10px; overflow-x: auto; width: 90%; max-width: 800px; padding: 10px 0; scrollbar-width: none; }
    .collections-bar::-webkit-scrollbar { display: none; }

    .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 800px) { .grid { columns: 2; } }

    .card { break-inside: avoid; margin-bottom: 16px; border-radius: 24px; overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; position: relative; }
    .card img { width: 100%; display: block; }
    .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }

    /* --- MODALS --- */
    #detailsModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
    .split-container { display: flex; flex-direction: column; min-height: 100vh; }
    .view-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
    .view-left img { max-width: 100%; max-height: 85vh; object-fit: contain; transition: 0.3s; }
    .view-right { flex: 0.8; padding: 30px; background: var(--card-bg); }

    @media (min-width: 1000px) {
      .split-container { flex-direction: row; }
      .view-right { height: 100vh; overflow-y: auto; border-left: 1px solid var(--border); }
    }

    .primary-btn {
      background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; 
      font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
    }
    .secondary-btn { background: var(--border); color: var(--text); border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }

    input, textarea, select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }

    /* COMMENT SECTION */
    .comment-box { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
    .comment { background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }
    .comment b { color: var(--primary); display: block; margin-bottom: 4px; }

    #logoutConfirm {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; 
        display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

  <div id="loading">
    <img src="logo.png" style="width: 80px; animation: bounce 2s infinite;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
  </div>

  <div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px;">Syncing Cloud...</p>
  </div>

  <div id="logoutConfirm">
      <div style="background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px;">
          <h3 style="margin-top:0;">Are you sure?</h3>
          <p style="color: var(--text-muted);">Logging out of PIXS...</p>
          <button class="primary-btn" onclick="confirmLogout(true)" style="background: #ef4444; margin-bottom: 10px;">Yes, Logout</button>
          <button class="secondary-btn" style="width:100%" onclick="confirmLogout(false)">Just Joking</button>
      </div>
  </div>

  <div id="auth" class="screen">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px;">
      <div class="auth-container">
        <h2 style="font-weight: 900;">Welcome to PIXS</h2>
        <button class="auth-choice-btn" onclick="login('guest')">
          <i data-lucide="user"></i> Guest Access
        </button>
        <button class="auth-choice-btn" onclick="document.getElementById('adminInputArea').style.display='block'">
          <i data-lucide="shield-check"></i> Administrator
        </button>
        <div id="adminInputArea" style="display: none; width: 100%;">
          <input type="password" id="accessKey" placeholder="Admin Key">
          <button class="primary-btn" onclick="checkAuth()">Authorize</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="screen">
    <header class="home-header">
      <div class="header-top">
        <img src="logo.png" style="width:40px; cursor:pointer;" onclick="logoutTrigger()">
        <div class="search-box">
          <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search title, tag, or caption..." onkeyup="smartSearch(this.value)">
        </div>
        <button id="searchBackBtn" class="secondary-btn" style="display:none;" onclick="clearSearch()"><i data-lucide="arrow-left"></i></button>
      </div>
      <div class="collections-bar" id="collectionsBar">
          <span class="chip active" onclick="filterByCollection('All')">All</span>
          <span class="chip" onclick="filterByCollection('Nature')">Nature</span>
          <span class="chip" onclick="filterByCollection('Minimal')">Minimal</span>
          <span class="chip" onclick="filterByCollection('Abstract')">Abstract</span>
          <span class="chip" onclick="filterByCollection('Tech')">Tech</span>
          <span class="chip" onclick="filterByCollection('Architecture')">Architecture</span>
      </div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none;">
      <button class="primary-btn" style="width:60px; height:60px; border-radius:50%;" onclick="openUpload()"><i data-lucide="plus"></i></button>
    </div>
  </div>

  <div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:var(--card-bg); padding:12px; border-radius:50%; box-shadow: var(--shadow);" onclick="closeModal('detailsModal')">
      <i data-lucide="x"></i>
    </button>
    <div class="split-container">
      <div class="view-left">
          <img id="detImg" src="">
          <div style="position:absolute; bottom:20px; left:20px; display:flex; gap:10px;">
              <button class="secondary-btn" onclick="downloadFile('png')"><i data-lucide="image"></i> PNG</button>
              <button class="secondary-btn" onclick="downloadFile('pdf')"><i data-lucide="file-text"></i> PDF</button>
          </div>
      </div>
      <div class="view-right">
        <h2 id="detTitle" style="font-weight:900; margin:0;"></h2>
        <p id="detCaption" style="color:var(--text-muted);"></p>
        <div id="detTags" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
        
        <div style="display:flex; gap:15px; align-items:center; margin:20px 0;">
            <button onclick="handleLike()" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:5px; color:var(--text);">
                <i id="likeIcon" data-lucide="heart"></i> <span id="detLikeCount">0</span>
            </button>
            <a id="detSource" href="#" target="_blank" class="secondary-btn" style="text-decoration:none;">Visit Original</a>
        </div>

        <div class="comment-section">
            <h4>Comments</h4>
            <div id="commentList"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <input type="text" id="commentInput" placeholder="Add a comment..." style="margin:0;">
                <button class="primary-btn" style="width: auto; padding: 0 20px;" onclick="addComment()"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div id="adminTools" style="display:none; margin-top:30px; padding-top:20px; border-top:1px solid var(--border);">
            <button onclick="deleteAsset()" style="color:#ef4444; background:none; border:none; cursor:pointer; font-weight:600;">Delete Permanently</button>
        </div>
      </div>
    </div>
  </div>

  <div id="uploadModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:30px; overflow-y:auto;">
    <div style="max-width:500px; margin:0 auto;">
        <div id="upPreview" style="width:100%; height:200px; background:var(--border); border-radius:20px; margin-bottom:20px; overflow:hidden; display:flex; align-items:center; justify-content:center;">
            <p style="color:var(--text-muted);">Preview Area</p>
        </div>
        <h3>Post New Asset</h3>
        <input type="text" id="upName" placeholder="Title">
        <textarea id="upLink" placeholder="Image URLs (Unlimited - One per line)" onchange="updateUpPreview()"></textarea>
        <input type="text" id="upSource" placeholder="Original Website URL">
        <textarea id="upCaption" placeholder="Caption"></textarea>
        <input type="text" id="upTags" placeholder="Taglines (comma separated)">
        <select id="upCollection">
            <option>Nature</option><option>Architecture</option><option>Minimal</option><option>Abstract</option><option>Tech</option>
        </select>
        <button class="primary-btn" onclick="postAsset()">Post to Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
  </div>

  <script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentUserRole = null;
    let activeAssetIdx = null;

    window.onload = async () => {
      currentUserRole = localStorage.getItem('pixs_role');
      if (currentUserRole) { showApp(); await syncFromBin(); } else { showAuth(); }
      setTimeout(() => document.getElementById('loading').classList.add('fade-out'), 1000);
      lucide.createIcons();
    };

    function showAuth() { document.getElementById('auth').style.display = 'block'; }
    function showApp() { 
        document.getElementById('app').style.display = 'block';
        if(currentUserRole === 'admin') document.getElementById('adminFab').style.display = 'flex';
    }

    function checkAuth() {
      if (document.getElementById('accessKey').value === ADMIN_PASS) login('admin');
      else alert("Access Denied");
    }

    function login(role) {
      localStorage.setItem('pixs_role', role);
      location.reload();
    }

    /* LOGOUT SYSTEM */
    function logoutTrigger() { document.getElementById('logoutConfirm').style.display = 'flex'; }
    function confirmLogout(yes) {
        if(yes) { localStorage.removeItem('pixs_role'); location.reload(); }
        else { document.getElementById('logoutConfirm').style.display = 'none'; }
    }

    /* DATA SYNC */
    async function syncFromBin() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
      const data = await res.json();
      allAssets = data.record.assets || [];
      renderGrid(allAssets);
    }

    async function updateBin() {
      document.getElementById('saving').style.display = 'flex';
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
        body: JSON.stringify({ assets: allAssets })
      });
      document.getElementById('saving').style.display = 'none';
      renderGrid(allAssets);
    }

    function renderGrid(assets) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      assets.forEach((asset, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${asset.urls ? asset.urls[0] : asset.url}" loading="lazy">
          <div class="card-info">
            <span style="font-weight:700;">${asset.name}</span>
            <span style="font-size:12px; opacity:0.6;"><i data-lucide="heart" size="12"></i> ${asset.likes || 0}</span>
          </div>`;
        card.onclick = () => openDetails(asset, i);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    /* SMART SEARCH & COLLECTIONS */
    function smartSearch(val) {
        const query = val.toLowerCase();
        if(query.length > 0) document.getElementById('searchBackBtn').style.display = 'block';
        const filtered = allAssets.filter(a => 
            a.name.toLowerCase().includes(query) || 
            (a.caption || "").toLowerCase().includes(query) || 
            (a.collection || "").toLowerCase().includes(query) ||
            (a.tags && a.tags.some(t => t.toLowerCase().includes(query)))
        );
        renderGrid(filtered);
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchBackBtn').style.display = 'none';
        renderGrid(allAssets);
    }

    function filterByCollection(tag) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        if(tag === 'All') renderGrid(allAssets);
        else renderGrid(allAssets.filter(a => a.collection === tag));
    }

    /* DETAILS & ACTIONS */
    function openDetails(asset, i) {
      activeAssetIdx = allAssets.indexOf(asset);
      document.getElementById('detImg').src = asset.urls ? asset.urls[0] : asset.url;
      document.getElementById('detTitle').innerText = asset.name;
      document.getElementById('detCaption').innerText = asset.caption || "";
      document.getElementById('detLikeCount').innerText = asset.likes || 0;
      document.getElementById('detSource').href = asset.sourceSite || "#";
      
      const tagBox = document.getElementById('detTags');
      tagBox.innerHTML = asset.collection ? `<span class="chip active">${asset.collection}</span>` : '';
      if(asset.tags) asset.tags.forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
      
      renderComments();
      document.getElementById('detailsModal').style.display = 'flex';
      document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'block' : 'none';
      lucide.createIcons();
    }

    function handleLike() {
        allAssets[activeAssetIdx].likes = (allAssets[activeAssetIdx].likes || 0) + 1;
        document.getElementById('detLikeCount').innerText = allAssets[activeAssetIdx].likes;
        updateBin();
    }

    function renderComments() {
        const list = document.getElementById('commentList');
        const comments = allAssets[activeAssetIdx].comments || [];
        list.innerHTML = comments.length ? '' : '<p style="font-size:12px; opacity:0.5;">No comments yet.</p>';
        comments.forEach(c => {
            list.innerHTML += `<div class="comment"><b>${c.user}</b> ${c.text}</div>`;
        });
    }

    function addComment() {
        const txt = document.getElementById('commentInput').value;
        if(!txt) return;
        if(!allAssets[activeAssetIdx].comments) allAssets[activeAssetIdx].comments = [];
        allAssets[activeAssetIdx].comments.push({ user: currentUserRole.toUpperCase(), text: txt });
        document.getElementById('commentInput').value = '';
        renderComments();
        updateBin();
    }

    function downloadFile(type) {
        const img = document.getElementById('detImg').src;
        if(type === 'png') {
            const link = document.createElement('a');
            link.href = img; link.download = 'pixs_asset.png'; link.click();
        } else {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.text(document.getElementById('detTitle').innerText, 10, 10);
            pdf.addImage(img, 'JPEG', 10, 20, 180, 120);
            pdf.save('pixs_asset.pdf');
        }
    }

    /* ASSET MANAGEMENT */
    function updateUpPreview() {
        const val = document.getElementById('upLink').value.split('\n')[0];
        if(val) document.getElementById('upPreview').innerHTML = `<img src="${val}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    async function postAsset() {
        const asset = {
            name: document.getElementById('upName').value,
            urls: document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== ""),
            caption: document.getElementById('upCaption').value,
            sourceSite: document.getElementById('upSource').value,
            collection: document.getElementById('upCollection').value,
            tags: document.getElementById('upTags').value.split(',').map(t => t.trim()),
            date: Date.now(),
            likes: 0,
            comments: []
        };
        allAssets.unshift(asset);
        await updateBin();
        closeModal('uploadModal');
    }

    function deleteAsset() {
        if(confirm("Permanently delete this asset?")) {
            allAssets.splice(activeAssetIdx, 1);
            updateBin();
            closeModal('detailsModal');
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openUpload() { document.getElementById('uploadModal').style.display = 'block'; }
    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }
  </script>
</body>
</html>
