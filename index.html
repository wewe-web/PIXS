<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXS | Premium Digital Asset Management</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --primary-glow: rgba(47, 109, 246, 0.3);
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 32px;
            --radius-md: 18px;
            --shadow: 0 20px 40px rgba(0,0,0,0.06);
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.dark-mode {
            --bg: #0b0f1a;
            --glass: rgba(15, 23, 42, 0.8);
            --card-bg: #161e31;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
            line-height: 1.5;
        }

        /* --- UI Components --- */
        .screen { display: none; min-height: 100vh; position: relative; }
        
        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10000;
        }

        .loader-ring {
            width: 50px; height: 50px; border: 3px solid var(--border);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .theme-btn {
            position: fixed; top: 20px; left: 20px;
            width: 45px; height: 45px; border-radius: 12px;
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(10px); cursor: pointer; color: var(--text);
            z-index: 1001; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }

        /* --- Header & Navigation --- */
        .home-header {
            padding: 40px 20px 20px; text-align: center;
            background: linear-gradient(to bottom, var(--bg), transparent);
        }

        .search-container {
            position: sticky; top: 10px; z-index: 900;
            margin: 0 auto 20px; width: 90%; max-width: 500px;
        }

        .search-box {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); padding: 12px 20px;
            border-radius: 20px; display: flex; align-items: center;
            box-shadow: var(--shadow); transition: var(--transition);
        }

        .search-box:focus-within { border-color: var(--primary); transform: translateY(-2px); }
        .search-box input {
            border: none; background: none; width: 100%; margin-left: 12px;
            outline: none; color: var(--text); font-size: 16px;
        }

        .collections-nav {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px;
            scrollbar-width: none; mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        .collections-nav::-webkit-scrollbar { display: none; }

        .category-chip {
            padding: 8px 20px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 100px; font-size: 14px; font-weight: 600; white-space: nowrap;
            cursor: pointer; transition: var(--transition);
        }
        .category-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 8px 20px var(--primary-glow); }

        /* --- Masonry Grid --- */
        .grid-container { padding: 20px; max-width: 1600px; margin: 0 auto; }
        .grid { columns: 2; column-gap: 16px; }
        @media (min-width: 768px) { .grid { columns: 3; } }
        @media (min-width: 1200px) { .grid { columns: 5; } }

        .card {
            break-inside: avoid; margin-bottom: 20px; border-radius: var(--radius-md);
            background: var(--card-bg); overflow: hidden; position: relative;
            cursor: pointer; transition: var(--transition); border: 1px solid var(--border);
        }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .card img { width: 100%; display: block; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }

        .card-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 15px 10px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white; opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .stack-indicator {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; color: white;
        }

        /* --- Modals & Overlays --- */
        .full-modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto; flex-direction: column;
        }

        .modal-header {
            position: sticky; top: 0; padding: 20px; z-index: 2100;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
        }

        .close-circle {
            width: 45px; height: 45px; border-radius: 50%; background: var(--card-bg);
            border: 1px solid var(--border); display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: var(--shadow);
        }

        /* --- Detail View Layout --- */
        .detail-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .media-viewer {
            flex: 1.2; background: #000; position: relative;
            display: flex; align-items: center; justify-content: center; min-height: 400px;
        }
        .media-viewer img { max-width: 100%; max-height: 90vh; object-fit: contain; }
        
        .content-panel {
            flex: 1; padding: 40px 30px; background: var(--card-bg);
            border-radius: 40px 40px 0 0; margin-top: -40px; position: relative;
            border-top: 1px solid var(--border);
        }

        .asset-title { font-size: 32px; font-weight: 800; margin: 0 0 10px; letter-spacing: -1px; }
        .asset-desc { color: var(--text-muted); font-size: 16px; margin-bottom: 30px; }

        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn {
            padding: 16px; border-radius: 16px; border: none; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: var(--transition); font-size: 15px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; background: var(--primary);
            border-radius: 20px; color: white; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 15px 30px var(--primary-glow); z-index: 1000;
            transition: var(--transition);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* --- Forms --- */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
        input, textarea, select {
            width: 100%; padding: 16px; border-radius: 14px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); font-family: inherit;
            font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }

        /* --- Animations --- */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideIn 0.5s ease forwards; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="loading">
    <img src="logo.png" width="80" class="animate-in">
    <p style="margin-top: 20px; font-weight: 400; color: var(--text-muted);">Synchronizing...</p>
</div>

<button class="theme-btn" onclick="UI.toggleTheme()">
    <i id="themeIcon" data-lucide="moon"></i>
</button>

<div id="authScreen" class="screen" style="display: flex; align-items: center; justify-content: center;">
    <div style="width: 90%; max-width: 400px; text-align: center;" class="animate-in">
        <img src="logo.png" width="80" style="margin-bottom: 30px;">
        <h1 style="font-weight: 800; margin-bottom: 10px;">Security Check</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Please enter your vault access key.</p>
        <div class="form-group">
            <input type="password" id="vaultKey" placeholder="••••••••" style="text-align: center; letter-spacing: 5px;">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="Auth.validate()">Unlock Gallery</button>
    </div>
</div>

<div id="appScreen" class="screen">
    <header class="home-header">
        <img src="logo.png" width="60" style="margin-bottom: 20px;">
        <h2 style="font-weight: 800; margin: 0;">Vault Explorer</h2>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i data-lucide="search" size="20" style="color: var(--text-muted);"></i>
            <input type="text" id="globalSearch" placeholder="Search assets, tags, or colors..." oninput="App.search(this.value)">
        </div>
    </div>

    <nav class="collections-nav" id="categoryBar"></nav>

    <main class="grid-container">
        <div id="mainGrid" class="grid">
            </div>
    </main>

    <div class="fab" onclick="UI.openModal('uploadModal')">
        <i data-lucide="plus" size="30"></i>
    </div>
</div>

<div id="detailModal" class="full-modal">
    <div class="modal-header">
        <div class="close-circle" onclick="UI.closeModal('detailModal')"><i data-lucide="chevron-left"></i></div>
        <div style="display: flex; gap: 10px;">
            <div class="close-circle" onclick="App.editCurrent()"><i data-lucide="edit-3" size="18"></i></div>
            <div class="close-circle" onclick="App.deleteCurrent()" style="color: #ef4444;"><i data-lucide="trash-2" size="18"></i></div>
        </div>
    </div>
    
    <div class="detail-layout">
        <div class="media-viewer">
            <button class="theme-btn" style="left: auto; right: 20px; top: 50%; transform: translateY(-50%);" onclick="App.nextSlide()"><i data-lucide="chevron-right"></i></button>
            <button class="theme-btn" style="left: 20px; top: 50%; transform: translateY(-50%);" onclick="App.prevSlide()"><i data-lucide="chevron-left"></i></button>
            <img id="viewImg" src="">
            <div id="slideCounter" style="position: absolute; bottom: 20px; background: rgba(0,0,0,0.5); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px;"></div>
        </div>
        <div class="content-panel" id="detailPanel">
            <h1 id="viewTitle" class="asset-title"></h1>
            <p id="viewDesc" class="asset-desc"></p>
            <div id="viewTags" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            
            <div class="action-bar">
                <button class="btn btn-primary" onclick="App.download('png')"><i data-lucide="download"></i> PNG</button>
                <button class="btn btn-outline" onclick="App.download('pdf')"><i data-lucide="file-text"></i> PDF</button>
            </div>
            <button class="btn btn-outline" style="width: 100%; margin-top: 15px;" id="sourceBtn">
                <i data-lucide="external-link"></i> Visit Source
            </button>
        </div>
    </div>
</div>

<div id="uploadModal" class="full-modal">
    <div class="modal-header">
        <div class="close-circle" onclick="UI.closeModal('uploadModal')"><i data-lucide="x"></i></div>
        <h3 id="formTitle" style="margin: 0; font-weight: 800;">Add New Asset</h3>
        <div style="width: 45px;"></div>
    </div>

    <div style="max-width: 600px; margin: 0 auto; padding: 20px 30px;">
        <div class="form-group">
            <label>Asset Identity</label>
            <input type="text" id="fName" placeholder="e.g., Abstract Neon Composition">
        </div>
        <div class="form-group">
            <label>Asset Links (URLs separated by commas)</label>
            <textarea id="fUrls" rows="4" placeholder="https://image1.com, https://image2.com..."></textarea>
        </div>
        <div class="form-group">
            <label>Description & Notes</label>
            <textarea id="fDesc" rows="3" placeholder="Internal notes or context..."></textarea>
        </div>
        <div class="form-group">
            <label>Source / Reference Website</label>
            <input type="text" id="fSource" placeholder="https://pinterest.com/...">
        </div>
        <div class="form-group">
            <label>Tags & Collections</label>
            <div id="fTags" style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding: 15px; background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border); max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <button class="btn btn-primary" style="width: 100%; padding: 20px;" onclick="App.save()">
            <i data-lucide="cloud-upload"></i> Synchronize to PIXS
        </button>
    </div>
</div>

<script>
    /* --- Configuration --- */
    const CONFIG = {
        BIN_ID: "69c90b42ed015c742bc9240a",
        API_KEY: "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86",
        AUTH: "qwerty_1227_pics_xioleng",
        CATEGORIES: ["All", "Minimal", "Glassmorphism", "3D", "Abstract", "Night", "Typography", "Branding", "UI Kits", "Wallpapers", "Nature", "Aesthetic"]
    };

    /* --- Core State --- */
    let State = {
        assets: [],
        filtered: [],
        current: null,
        currentIdx: 0,
        editTargetId: null,
        selectedTags: []
    };

    /* --- Auth Module --- */
    const Auth = {
        check: () => {
            const session = localStorage.getItem('pixs_vault_open');
            if(session === 'true') {
                UI.showScreen('appScreen');
                App.init();
            } else {
                UI.showScreen('authScreen');
            }
        },
        validate: () => {
            const val = document.getElementById('vaultKey').value;
            if(val === CONFIG.AUTH) {
                localStorage.setItem('pixs_vault_open', 'true');
                location.reload();
            } else {
                alert("Access Denied: Invalid Key");
            }
        }
    };

    /* --- UI Engine --- */
    const UI = {
        init: () => {
            lucide.createIcons();
            if(localStorage.getItem('pixs_theme') === 'dark') UI.toggleTheme(true);
            UI.renderCategories();
        },
        showScreen: (id) => {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        },
        toggleTheme: (init = false) => {
            const body = document.body;
            const isDark = init ? localStorage.getItem('pixs_theme') === 'dark' : body.classList.toggle('dark-mode');
            if(init && isDark) body.classList.add('dark-mode');
            
            localStorage.setItem('pixs_theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', body.classList.contains('dark-mode') ? 'sun' : 'moon');
            lucide.createIcons();
        },
        renderCategories: () => {
            const bar = document.getElementById('categoryBar');
            bar.innerHTML = CONFIG.CATEGORIES.map(cat => `
                <div class="category-chip ${cat === 'All' ? 'active' : ''}" onclick="App.filterByCategory('${cat}', this)">
                    ${cat}
                </div>
            `).join('');
        },
        openModal: (id) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            gsap.fromTo(el, { y: '100%' }, { y: 0, duration: 0.6, ease: "power4.out" });
        },
        closeModal: (id) => {
            const el = document.getElementById(id);
            gsap.to(el, { y: '100%', duration: 0.5, ease: "power4.in", onComplete: () => el.style.display = 'none' });
        }
    };

    /* --- App Logic --- */
    const App = {
        init: async () => {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
                    headers: { "X-Master-Key": CONFIG.API_KEY }
                });
                const data = await res.json();
                State.assets = data.record.assets || [];
                App.renderGrid(State.assets);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error("Cloud Sync Failed", err);
                document.getElementById('loading').innerHTML = `<p>Sync Error. Check Connection.</p>`;
            }
        },

        renderGrid: (data) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map((item, idx) => `
                <div class="card animate-in" onclick="App.viewDetail(${idx})" style="animation-delay: ${idx * 0.05}s">
                    ${item.urls.length > 1 ? `<div class="stack-indicator">${item.urls.length} ASSETS</div>` : ''}
                    <img src="${item.urls[0]}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x600?text=Private+Link'">
                    <div class="card-info">
                        <div style="font-weight: 800; font-size: 14px;">${item.name}</div>
                    </div>
                </div>
            `).join('');
        },

        filterByCategory: (cat, el) => {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === "All" ? State.assets : State.assets.filter(a => a.tags.includes(cat));
            App.renderGrid(filtered);
        },

        search: (term) => {
            const t = term.toLowerCase();
            const results = State.assets.filter(a => 
                a.name.toLowerCase().includes(t) || 
                a.tags.some(tag => tag.toLowerCase().includes(t))
            );
            App.renderGrid(results);
        },

        viewDetail: (idx) => {
            State.current = State.assets[idx];
            State.currentIdx = 0;
            State.editTargetId = idx;
            
            const item = State.current;
            document.getElementById('viewTitle').innerText = item.name;
            document.getElementById('viewDesc').innerText = item.desc || "No internal description provided.";
            document.getElementById('viewImg').src = item.urls[0];
            document.getElementById('slideCounter').innerText = `1 / ${item.urls.length}`;
            
            document.getElementById('viewTags').innerHTML = item.tags.map(t => `<span class="category-chip">${t}</span>`).join('');
            document.getElementById('sourceBtn').onclick = () => window.open(item.source || item.urls[0], '_blank');

            UI.openModal('detailModal');
            
            // Color Extraction for UI flavor
            const img = document.getElementById('viewImg');
            img.onload = () => {
                try {
                    const ct = new ColorThief();
                    const color = ct.getColor(img);
                    document.getElementById('detailPanel').style.borderTop = `6px solid rgb(${color.join(',')})`;
                } catch(e) {}
            };
        },

        nextSlide: () => {
            State.currentIdx = (State.currentIdx + 1) % State.current.urls.length;
            App.updateSlider();
        },

        prevSlide: () => {
            State.currentIdx = (State.currentIdx - 1 + State.current.urls.length) % State.current.urls.length;
            App.updateSlider();
        },

        updateSlider: () => {
            document.getElementById('viewImg').src = State.current.urls[State.currentIdx];
            document.getElementById('slideCounter').innerText = `${State.currentIdx + 1} / ${State.current.urls.length}`;
        },

        save: async () => {
            const name = document.getElementById('fName').value;
            const urlsRaw = document.getElementById('fUrls').value;
            if(!name || !urlsRaw) return alert("Required fields missing");

            const urls = urlsRaw.split(',').map(u => u.trim()).filter(u => u !== "");
            const asset = {
                name,
                urls,
                desc: document.getElementById('fDesc').value,
                source: document.getElementById('fSource').value,
                tags: State.selectedTags,
                timestamp: Date.now()
            };

            document.getElementById('loading').style.display = 'flex';
            
            if(State.editTargetId !== null) {
                State.assets[State.editTargetId] = asset;
            } else {
                State.assets.unshift(asset);
            }

            try {
                await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": CONFIG.API_KEY },
                    body: JSON.stringify({ assets: State.assets })
                });
                location.reload();
            } catch (err) {
                alert("Save failed. Try again.");
                document.getElementById('loading').style.display = 'none';
            }
        },

        deleteCurrent: async () => {
            if(!confirm("Permanently remove this asset from PIXS?")) return;
            State.assets.splice(State.editTargetId, 1);
            App.save();
        },

        editCurrent: () => {
            const item = State.current;
            document.getElementById('fName').value = item.name;
            document.getElementById('fUrls').value = item.urls.join(', ');
            document.getElementById('fDesc').value = item.desc;
            document.getElementById('fSource').value = item.source;
            State.selectedTags = [...item.tags];
            
            UI.closeModal('detailModal');
            UI.openModal('uploadModal');
            App.renderFormTags();
        },

        renderFormTags: () => {
            const container = document.getElementById('fTags');
            container.innerHTML = CONFIG.CATEGORIES.filter(c => c !== "All").map(cat => `
                <div class="category-chip ${State.selectedTags.includes(cat) ? 'active' : ''}" 
                     onclick="App.toggleFormTag('${cat}', this)">
                    ${cat}
                </div>
            `).join('');
        },

        toggleFormTag: (cat, el) => {
            if(State.selectedTags.includes(cat)) {
                State.selectedTags = State.selectedTags.filter(t => t !== cat);
                el.classList.remove('active');
            } else {
                State.selectedTags.push(cat);
                el.classList.add('active');
            }
        },

        download: async (type) => {
            const url = State.current.urls[State.currentIdx];
            if(type === 'png') {
                const res = await fetch(url);
                const blob = await res.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${State.current.name}.png`;
                link.click();
            } else {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text(State.current.name, 10, 10);
                doc.addImage(url, 'JPEG', 10, 20, 180, 0);
                doc.save(`${State.current.name}.pdf`);
            }
        }
    };

    // Global Initialization
    window.onload = () => {
        UI.init();
        Auth.check();
        App.renderFormTags();
    };
</script>
