<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Auth</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #loading.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }
        #loading img { animation: pulse 1.5s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        .saving-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white; 
        }

        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        /* --- AUTH SCREEN STYLES --- */
        .auth-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;
        }
        .auth-choice-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text); cursor: pointer;
            margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px;
            font-weight: 700; font-size: 16px;
        }
        .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }
        .auth-choice-btn i { color: var(--primary); }

        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 0 10px 0; background: var(--glass); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 600px; margin-bottom: 10px; }
        .main-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; cursor: pointer;}

        .search-box {
            flex: 1; background: var(--border);
            display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        /* HIDDEN UNLESS SEARCHING */
        #sortGridContainer { display: none; }
        .sort-select { 
            background: var(--card-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; outline: none;
        }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 600; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }
        .card img { width: 100%; display: block; }
        
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%);
            opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; color: white;
        }
        .card:hover .card-overlay { opacity: 1; }
        .overlay-title { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
        .overlay-likes { display: flex; align-items: center; gap: 5px; font-size: 12px; opacity: 0.9; }

        /* LIKE ANIMATION */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .heart-active { animation: heartPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #detailsModal, #uploadModal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto;
        }
        
        .split-container { display: flex; flex-direction: column; min-height: 100%; width: 100%; }
        .view-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; min-height: 400px; }
        .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .view-right { flex: 0.8; padding: 40px; background: var(--card-bg); overflow-y: auto; }

        /* COMMENTS SYSTEM */
        .comments-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        .comment-item { margin-bottom: 20px; padding-left: 10px; border-left: 2px solid var(--border); }
        .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .comment-author { font-weight: 800; font-size: 13px; color: var(--primary); }
        .comment-text { font-size: 14px; line-height: 1.5; color: var(--text); }
        .comment-actions { font-size: 11px; margin-top: 5px; color: var(--text-muted); cursor: pointer; font-weight: 700; }
        .reply-item { margin-left: 30px; margin-top: 15px; border-left: 2px solid var(--primary); padding-left: 15px; opacity: 0.9; }

        .comment-input-area { display: flex; gap: 10px; margin-top: 20px; background: var(--bg); padding: 10px; border-radius: 15px; }
        .comment-input-area input { margin-bottom: 0; background: transparent; border: none; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); }
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}

        @media (min-width: 1000px) {
            .split-container { flex-direction: row; }
            .view-right { height: 100vh; position: sticky; top: 0; }
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px; font-weight: 600;">Updating Cloud...</p>
</div>

<div id="auth" class="screen">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; text-align: center;">
        <div class="auth-container">
            <img src="logo.png" style="width: 60px; margin-bottom: 10px;">
            <h2 style="font-weight: 900;">Welcome to PIXS</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Select your access level</p>
            <button class="auth-choice-btn" onclick="login('guest')"><i data-lucide="user"></i> Guest Access</button>
            <button class="auth-choice-btn" onclick="showAdminPrompt()"><i data-lucide="shield-check"></i> Administrator</button>
            <div id="adminInputArea" style="display: none; width: 100%; margin-top: 10px;">
                <input type="password" id="accessKey" placeholder="Enter Admin Password">
                <button class="primary-btn" onclick="checkAuth()">Login as Admin</button>
            </div>
        </div>
    </div>
</div>

<div id="app" class="screen">
    <header class="home-header">
        <div class="header-top">
            <img src="logo.png" class="main-logo" onclick="logout()">
            <div class="search-box">
                <i data-lucide="search" size="18"></i>
                <input type="text" id="searchInput" placeholder="Search PIXS..." oninput="handleSearch(this.value)">
            </div>
            <div id="sortGridContainer">
                <select class="sort-select" id="sortGrid" onchange="applySort()">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="likes">Most Liked</option>
                </select>
            </div>
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    
    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none;">
        <div style="background: var(--primary); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer;" onclick="openUpload()"><i data-lucide="plus" size="32"></i></div>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:#fff; padding:12px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div class="view-left">
            <img id="detImg" src="">
        </div>
        <div class="view-right">
            <div style="display:flex; justify-content:space-between;">
                <h2 id="detTitle" style="font-weight:900; font-size:32px; margin:0;"></h2>
                <div onclick="handleLike()" style="cursor:pointer; text-align:center;">
                    <i data-lucide="heart" id="heartIcon" style="width:30px; height:30px;"></i>
                    <div id="detLikeCount" style="font-size:12px; font-weight:800;">0</div>
                </div>
            </div>
            <p id="detCaption" style="color:var(--text-muted); margin:20px 0;"></p>
            
            <div id="detTags" style="display:flex; gap:8px; margin-bottom:30px; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="visitBtn" onclick="visitOriginal()">Visit Original Website</button>

            <div class="comments-section">
                <h3 style="font-weight:900;">Comments</h3>
                <div id="commentsList"></div>
                <div class="comment-input-area" id="mainCommentArea">
                    <input type="text" id="commentMsg" placeholder="Write a comment...">
                    <button onclick="postComment()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">Post</button>
                </div>
            </div>

            <div id="adminTools" style="margin-top:40px; display:none; gap:10px;">
                <button class="primary-btn" style="background:var(--border); color:var(--text);" onclick="editCurrent()">Edit</button>
                <button class="primary-btn" style="background:#ef4444;" onclick="deleteCurrent()">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal">
    <div style="max-width:550px; margin:0 auto; padding:60px 25px;">
        <h2 id="modalTitle" style="text-align:center; font-weight:900;">Asset Entry</h2>
        <input type="text" id="upName" placeholder="Title">
        <textarea id="upLink" placeholder="Image URL"></textarea>
        <textarea id="upCaption" placeholder="Caption"></textarea>
        <input type="text" id="upSource" placeholder="Source Website">
        <div id="modalTags" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px;"></div>
        <button class="primary-btn" onclick="postAsset()">Post to PIXS Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; border:none; background:none; color:var(--text-muted); margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentViewAsset = null;
    let currentUserRole = null;
    let activeReplyTo = null;

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') document.body.classList.add('dark-mode');
        
        currentUserRole = localStorage.getItem('pixs_role');
        if(currentUserRole) {
            showApp();
            await sync();
        } else {
            showAuth();
        }
        
        setTimeout(() => document.getElementById('loading').classList.add('fade-out'), 1000);
    };

    function showAuth() {
        document.getElementById('auth').style.display = 'block';
        document.getElementById('app').style.display = 'none';
        document.title = "PIXS | Auth";
    }

    function showApp() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.title = "PIXS | Discover the Extraordinary";
        if(currentUserRole === 'admin') document.getElementById('adminFab').style.display = 'flex';
    }

    function login(role) {
        localStorage.setItem('pixs_role', role);
        currentUserRole = role;
        showApp();
        sync();
    }

    function logout() {
        if(confirm("Logout from PIXS?")) {
            localStorage.removeItem('pixs_role');
            location.reload();
        }
    }

    function showAdminPrompt() { document.getElementById('adminInputArea').style.display = 'block'; }

    function checkAuth() {
        if(document.getElementById('accessKey').value === ADMIN_PASS) login('admin');
        else alert("Incorrect Password");
    }

    async function sync() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
    }

    async function updateBin(silent = false) {
        if(!silent) document.getElementById('saving').style.display = 'flex';
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        document.getElementById('saving').style.display = 'none';
    }

    function handleSearch(val) {
        const sortContainer = document.getElementById('sortGridContainer');
        sortContainer.style.display = val.length > 0 ? 'block' : 'none';
        const filtered = allAssets.filter(a => a.name.toLowerCase().includes(val.toLowerCase()));
        renderGrid(filtered);
    }

    function applySort() {
        const type = document.getElementById('sortGrid').value;
        if(type === 'likes') allAssets.sort((a,b) => (b.likes || 0) - (a.likes || 0));
        if(type === 'newest') allAssets.sort((a,b) => b.date - a.date);
        if(type === 'oldest') allAssets.sort((a,b) => a.date - b.date);
        renderGrid(allAssets);
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach(asset => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${asset.url}">
                <div class="card-overlay">
                    <div class="overlay-title">${asset.name}</div>
                    <div class="overlay-likes"><i data-lucide="heart" size="12" style="fill:white"></i> ${asset.likes || 0}</div>
                </div>
            `;
            card.onclick = () => openDetails(asset);
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    function openDetails(asset) {
        currentViewAsset = asset;
        document.title = `PIXS | ${asset.name}`;
        document.getElementById('detImg').src = asset.url;
        document.getElementById('detTitle').innerText = asset.name;
        document.getElementById('detCaption').innerText = asset.caption || "";
        document.getElementById('detLikeCount').innerText = asset.likes || 0;
        
        document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
        
        updateLikeUI();
        renderComments();
        document.getElementById('detailsModal').style.display = 'flex';
        lucide.createIcons();
    }

    function updateLikeUI() {
        const liked = JSON.parse(localStorage.getItem('pixs_liked') || "[]");
        const heart = document.getElementById('heartIcon');
        if(liked.includes(currentViewAsset.date)) {
            heart.style.fill = "#ef4444"; heart.style.color = "#ef4444";
        } else {
            heart.style.fill = "none"; heart.style.color = "var(--text-muted)";
        }
    }

    async function handleLike() {
        const liked = JSON.parse(localStorage.getItem('pixs_liked') || "[]");
        if(liked.includes(currentViewAsset.date)) return;

        liked.push(currentViewAsset.date);
        localStorage.setItem('pixs_liked', JSON.stringify(liked));
        
        currentViewAsset.likes = (currentViewAsset.likes || 0) + 1;
        document.getElementById('detLikeCount').innerText = currentViewAsset.likes;
        
        const heart = document.getElementById('heartIcon');
        heart.classList.add('heart-active');
        setTimeout(() => heart.classList.remove('heart-active'), 500);
        
        updateLikeUI();
        await updateBin(true);
    }

    function renderComments() {
        const list = document.getElementById('commentsList');
        list.innerHTML = '';
        const comments = currentViewAsset.comments || [];
        
        comments.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <div class="comment-header">
                    <span class="comment-author">${c.role === 'admin' ? '🛡️ Admin' : '👤 Guest'}</span>
                    <span style="font-size:10px; opacity:0.5;">${new Date(c.time).toLocaleDateString()}</span>
                </div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-actions" onclick="setActiveReply(${idx})">Reply</div>
                <div id="replies-${idx}"></div>
            `;
            
            const replyContainer = div.querySelector(`#replies-${idx}`);
            (c.replies || []).forEach(r => {
                replyContainer.innerHTML += `
                    <div class="reply-item">
                        <div class="comment-author" style="font-size:11px;">${r.role === 'admin' ? '🛡️ Admin' : '👤 Guest'}</div>
                        <div class="comment-text" style="font-size:13px;">${r.text}</div>
                    </div>
                `;
            });
            list.appendChild(div);
        });
    }

    function setActiveReply(idx) {
        activeReplyTo = idx;
        document.getElementById('commentMsg').placeholder = `Replying to comment #${idx + 1}...`;
        document.getElementById('commentMsg').focus();
    }

    async function postComment() {
        const text = document.getElementById('commentMsg').value;
        if(!text) return;

        if(!currentViewAsset.comments) currentViewAsset.comments = [];

        const newComment = {
            text: text,
            role: currentUserRole,
            time: Date.now(),
            replies: []
        };

        if(activeReplyTo !== null) {
            currentViewAsset.comments[activeReplyTo].replies.push(newComment);
            activeReplyTo = null;
            document.getElementById('commentMsg').placeholder = "Write a comment...";
        } else {
            currentViewAsset.comments.push(newComment);
        }

        document.getElementById('commentMsg').value = '';
        renderComments();
        await updateBin(true);
    }

    function closeModal(id) { 
        document.getElementById(id).style.display = 'none'; 
        document.title = "PIXS | Discover the Extraordinary";
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('pixs_dark', isDark);
        document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    function openUpload() {
        document.getElementById('uploadModal').style.display = 'block';
    }

    async function postAsset() {
        const asset = {
            name: document.getElementById('upName').value,
            url: document.getElementById('upLink').value,
            caption: document.getElementById('upCaption').value,
            sourceSite: document.getElementById('upSource').value,
            date: Date.now(),
            likes: 0,
            comments: [],
            tags: []
        };
        allAssets.push(asset);
        await updateBin();
        closeModal('uploadModal');
        renderGrid(allAssets);
    }

    function visitOriginal() { window.open(currentViewAsset.sourceSite || currentViewAsset.url, '_blank'); }

</script>
</body>
</html>
