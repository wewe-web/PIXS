<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Auth</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background 0.5s ease;
        }

        /* Loading screen */
        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #loading.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }
        #loading img { animation: pulse 1.5s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        /* Saving overlay */
        .saving-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white; 
        }

        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        /* --- AUTH SCREEN STYLES --- */
        .auth-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center; max-width: 400px; margin: 0 auto;
        }
        .auth-choice-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text); cursor: pointer;
            margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px;
            font-weight: 700; font-size: 16px;
        }
        .auth-choice-btn:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }
        .auth-choice-btn i { color: var(--primary); }

        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 0 10px 0; background: var(--glass); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        
        .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 600px; margin-bottom: 10px; }
        .main-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; cursor: pointer;}

        .search-box {
            flex: 1; background: var(--border);
            display: flex; align-items: center; padding: 8px 16px; border-radius: 30px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .sort-select { 
            background: var(--card-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; outline: none;
        }

        .collections-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 10px 20px; display: flex; gap: 8px; scrollbar-width: none; }
        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); flex-shrink: 0; font-weight: 600; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); position: relative; }
        .card img { width: 100%; display: block; }
        .card .stack-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; backdrop-filter: blur(5px); z-index: 5;}

        /* HOVER OVERLAY */
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%);
            opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; color: white;
        }
        .card:hover .card-overlay { opacity: 1; }
        .overlay-title { font-weight: 800; font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .overlay-likes { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; opacity: 0.9; }

        #detailsModal, #uploadModal, #notificationModal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto;
        }

        /* Drop zone */
        #dropZone {
            position: fixed; inset: 0; background: rgba(47, 109, 246, 0.2);
            backdrop-filter: blur(10px); z-index: 6000; display: none;
            border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;
            align-items: center; justify-content: center; pointer-events: none;
        }

        .split-container { display: flex; flex-direction: column; min-height: 100%; width: 100%; }
        .view-left { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 350px; position: relative; }
        .view-left img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 10; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }
        .img-counter { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; backdrop-filter: blur(10px); }

        .view-right { flex: 1; padding: 35px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 5;}
        
        /* Upload preview */
        .preview-area {
            width: 100%; height: 200px; border-radius: 20px; border: 2px dashed var(--border);
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: var(--bg); position: relative; cursor: pointer;
        }
        .preview-area:hover { border-color: var(--primary); background: rgba(47, 109, 246, 0.05); }
        .preview-area img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit;}

        .tag-creator { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag-creator input { margin-bottom: 0; flex: 1; }
        .tag-creator button { width: auto; padding: 0 20px; margin-bottom: 0; }

        /* Dummy notification modal */
        #notificationModal { display: none; justify-content: center; align-items: center; }
        #notificationModal .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); text-align: center; }
        #notificationModal .modal-content h2 { margin-bottom: 15px; }
        #notificationModal .modal-content button { margin-top: 10px; }

        @media (min-width: 900px) {
            .split-container { flex-direction: row; }
            .view-right { flex: 0.5; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .view-left { flex: 1.5; }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Extra styling for added dummy cards */
        .dummy-card { background: #e0e7ff; border: 1px dashed #6366f1; display: flex; justify-content: center; align-items: center; height: 150px; color: #1e3a8a; font-weight: 700; border-radius: var(--radius); margin-bottom: 16px; }
    </style>
</head>
<body>

<!-- THEME TOGGLE BUTTON -->
<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<!-- LOADING SCREEN -->
<div id="loading">
    <img src="logo.png" style="width: 80px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">PIXS CORE</p>
</div>

<!-- DROP ZONE -->
<div id="dropZone">
    <div style="text-align: center; color: var(--primary);">
        <i data-lucide="upload-cloud" size="60"></i>
        <h2 style="font-weight: 800;">Drop to Post to PIXS</h2>
    </div>
</div>

<!-- SAVING OVERLAY -->
<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px; font-weight: 600;">Updating Cloud...</p>
</div>

<!-- AUTH SCREEN -->
<div id="auth" class="screen">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05);">
        <div class="auth-container">
            <img src="logo.png" style="width: 60px; margin-bottom: 10px;">
            <h2 style="font-weight: 900; margin-bottom: 5px;">Welcome to PIXS</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 14px;">Select your access level to continue</p>
            
            <button class="auth-choice-btn" onclick="loginGuest()">
                <i data-lucide="user"></i>
                <div style="text-align: left;">
                    <div style="font-size: 16px;">Guest Access</div>
                    <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">View, Like & Discover</div>
                </div>
            </button>

            <button class="auth-choice-btn" onclick="showAdminPrompt()">
                <i data-lucide="shield-check"></i>
                <div style="text-align: left;">
                    <div style="font-size: 16px;">Administrator</div>
                    <div style="font-size: 11px; font-weight: 400; color: var(--text-muted);">Full Management Access</div>
                </div>
            </button>

            <div id="adminInputArea" style="display: none; width: 100%; margin-top: 10px;">
                <input type="password" id="accessKey" placeholder="Enter Admin Password">
                <button class="primary-btn" onclick="checkAuth()">Login as Admin</button>
                <button onclick="document.getElementById('adminInputArea').style.display='none'" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px;">Back</button>
            </div>
        </div>
    </div>
</div>

<!-- APP SCREEN -->
<div id="app" class="screen">
    <header class="home-header">
        <div class="header-top">
            <img src="logo.png" class="main-logo" onclick="logout()">
            <div class="search-box">
                <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Search title, tags, or caption...">
            </div>
            <select class="sort-select" id="sortGrid" onchange="applySort()">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="name">Name A-Z</option>
                <option value="likes">Most Liked</option>
            </select>
        </div>
        <div class="collections-wrapper" id="homeCollections"></div>
    </header>

    <div id="grid" class="grid"></div>
    
    <div id="adminFab" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; display: none;">
        <div style="background: var(--primary); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: 0 10px 25px rgba(47, 109, 246,0.3);" onclick="openUpload()">
            <i data-lucide="plus" size="28"></i>
        </div>
    </div>
</div>

<!-- NOTIFICATION MODAL -->
<div id="notificationModal">
    <div class="modal-content">
        <h2>New Notification!</h2>
        <p>This is a dummy notification for testing purposes. More features coming soon!</p>
        <button class="primary-btn" onclick="closeNotification()">Close</button>
    </div>
</div>

<script>
    // -------------------- Theme Toggle --------------------
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const icon = document.getElementById('themeIcon');
        if(document.body.classList.contains('dark-mode')) icon.dataset.lucide='sun';
        else icon.dataset.lucide='moon';
        lucide.createIcons();
    }

    // -------------------- Auth --------------------
    function loginGuest() { showScreen('app'); }
    function showAdminPrompt() { document.getElementById('adminInputArea').style.display='block'; }
    function checkAuth() {
        const key = document.getElementById('accessKey').value;
        if(key==='admin123'){ document.getElementById('adminFab').style.display='flex'; showScreen('app'); }
        else alert('Incorrect key');
    }
    function logout() { showScreen('auth'); }

    function showScreen(screenId){
        document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
        document.getElementById(screenId).style.display='flex';
    }

    // -------------------- Notifications --------------------
    function showNotification(){
        document.getElementById('notificationModal').style.display='flex';
    }
    function closeNotification(){
        document.getElementById('notificationModal').style.display='none';
    }

    // -------------------- Dummy Grid --------------------
    function populateGrid(){
        const grid = document.getElementById('grid');
        for(let i=1;i<=20;i++){
            const card = document.createElement('div');
            card.className='dummy-card';
            card.innerText='Card '+i;
            grid.appendChild(card);
        }
    }

    // -------------------- Extra Helpers --------------------
    function openUpload(){
        alert('Upload modal will open here!');
    }
    function applySort(){
        alert('Sort function triggered');
    }

    window.addEventListener('load',()=>{
        setTimeout(()=>{
            document.getElementById('loading').classList.add('fade-out'); 
            showScreen('auth');
            populateGrid();
        },1000);
        lucide.createIcons();
    });
</script>

</body>
</html>
