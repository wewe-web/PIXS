<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXS | Discover the Extraordinary</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    :root {
      --primary: #2f6df6;
      --bg: #f8fafc;
      --glass: rgba(255, 255, 255, 0.95);
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --glass: rgba(15, 23, 42, 0.9);
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* --- ADDED OVER-THE-TOP ANIMATIONS --- */
    @keyframes screenReveal { from { opacity: 0; transform: scale(1.1); filter: blur(10px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(30px) rotateX(-10deg); } to { opacity: 1; transform: translateY(0) rotateX(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .screen { display: none; min-height: 100vh; animation: screenReveal 0.8s var(--transition); }
    .card { animation: cardIn 0.6s var(--transition) backwards; transition: var(--transition); }
    .card:hover { transform: translateY(-10px) scale(1.02); z-index: 10; }
    
    .chip { padding: 8px 16px; border-radius: 20px; background: var(--border); font-size: 12px; cursor: pointer; transition: var(--transition); white-space: nowrap; }
    .chip.active { background: var(--primary); color: white; transform: scale(1.1); }
    .chip:hover { background: var(--primary); color: white; }

    #loading {
      position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 9999; transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
    }
    #loading.fade-out { opacity: 0; transform: translateY(-100%); pointer-events: none; }

    /* --- MULTI-IMAGE SLIDER --- */
    .slider-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; overflow: hidden; }
    .slider-wrapper { display: flex; transition: transform 0.5s var(--transition); width: 100%; height: 100%; }
    .slider-item { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .slider-btn { position: absolute; background: rgba(255,255,255,0.2); border: none; color: white; padding: 15px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(5px); z-index: 10; transition: 0.3s; }
    .slider-btn:hover { background: var(--primary); transform: scale(1.2); }
    .prev-btn { left: 20px; }
    .next-btn { right: 20px; }

    /* --- NESTED COMMENTS --- */
    .comment-thread { margin-left: 20px; border-left: 2px solid var(--border); padding-left: 15px; margin-top: 10px; }
    .comment-actions { display: flex; gap: 15px; font-size: 11px; margin-top: 5px; opacity: 0.7; }
    .comment-actions span { cursor: pointer; font-weight: 700; }
    .comment-actions span:hover { color: var(--primary); }

    /* --- FAB --- */
    .fab-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; box-shadow: 0 15px 30px rgba(47, 109, 246, 0.4); display: none; align-items: center; justify-content: center; transition: var(--transition); z-index: 999; }
    .fab-btn:hover { transform: scale(1.1) rotate(90deg); }

    /* REUSE EXISTING STYLES FROM ORIGINAL CODE */
    .saving-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(8px); color: white; }
    .theme-btn { position: absolute; top: 15px; left: 20px; background: none; border: none; cursor: pointer; color: var(--text); z-index: 101; transition: var(--transition); }
    .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto; }
    .auth-choice-btn { width: 100%; padding: 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; margin-bottom: 15px; transition: var(--transition); display: flex; align-items: center; gap: 15px; font-weight: 700; }
    .home-header { display: flex; flex-direction: column; align-items: center; padding: 15px 0; background: var(--glass); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
    .header-top { display: flex; align-items: center; gap: 15px; width: 90%; max-width: 800px; }
    .search-box { flex: 1; background: var(--border); display: flex; align-items: center; padding: 10px 18px; border-radius: 30px; }
    .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }
    .collections-bar { display: flex; gap: 10px; overflow-x: auto; width: 90%; max-width: 800px; padding: 10px 0; scrollbar-width: none; }
    .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 800px) { .grid { columns: 2; } }
    .card { break-inside: avoid; margin-bottom: 16px; border-radius: 24px; overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; position: relative; }
    .card img { width: 100%; display: block; }
    .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    #detailsModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; animation: slideInRight 0.5s var(--transition); }
    .split-container { display: flex; flex-direction: column; min-height: 100vh; }
    .view-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
    .view-right { flex: 0.8; padding: 30px; background: var(--card-bg); }
    @media (min-width: 1000px) { .split-container { flex-direction: row; } .view-right { height: 100vh; overflow-y: auto; border-left: 1px solid var(--border); } }
    .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .secondary-btn { background: var(--border); color: var(--text); border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    input, textarea, select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }
    .comment { background: var(--bg); padding: 15px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
    .comment:hover { transform: scale(1.02); }
    .comment b { color: var(--primary); display: block; margin-bottom: 4px; }
    #logoutConfirm { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
  </style>
</head>

<body>
  <button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

  <div id="loading">
    <img src="logo.png" style="width: 100px; animation: bounce 2s infinite;">
    <p style="margin-top: 15px; font-weight: 900; color: var(--primary); letter-spacing: 5px; font-size: 20px;">PIXS CORE</p>
  </div>

  <div id="saving" class="saving-overlay">
    <div style="border: 4px solid #fff; border-radius: 50%; border-top-color: var(--primary); width: 40px; height: 40px; animation: spin 0.8s linear infinite;"></div>
    <p id="savingText" style="margin-top: 15px; font-weight: 800;">SYNCING CLOUD...</p>
  </div>

  <div id="logoutConfirm">
      <div style="background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px;">
          <h3 style="margin-top:0;">Are you sure?</h3>
          <p style="color: var(--text-muted);">Logging out of PIXS...</p>
          <button class="primary-btn" onclick="confirmLogout(true)" style="background: #ef4444; margin-bottom: 10px;">Yes, Logout</button>
          <button class="secondary-btn" style="width:100%" onclick="confirmLogout(false)">Just Joking</button>
      </div>
  </div>

  <div id="auth" class="screen">
    <div style="height: 40vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px;">
      <div class="auth-container">
        <h2 style="font-weight: 900; font-size: 32px;">Welcome to PIXS</h2>
        <button class="auth-choice-btn" onclick="login('guest')">
          <i data-lucide="user"></i> Guest Access
        </button>
        <button class="auth-choice-btn" onclick="document.getElementById('adminInputArea').style.display='block'">
          <i data-lucide="shield-check"></i> Administrator
        </button>
        <div id="adminInputArea" style="display: none; width: 100%; animation: slideInRight 0.4s ease;">
          <input type="password" id="accessKey" placeholder="Admin Key">
          <button class="primary-btn" onclick="checkAuth()">Authorize</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="screen">
    <header class="home-header">
      <div class="header-top">
        <img src="logo.png" style="width:40px; cursor:pointer;" onclick="logoutTrigger()">
        <div class="search-box">
          <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" placeholder="Search title, tag, or caption..." onkeyup="smartSearch(this.value)">
        </div>
        <button id="searchBackBtn" class="secondary-btn" style="display:none;" onclick="clearSearch()"><i data-lucide="arrow-left"></i></button>
      </div>
      <div class="collections-bar" id="collectionsBar">
          <span class="chip active" onclick="filterByCollection('All')">All</span>
          </div>
    </header>

    <div id="grid" class="grid"></div>

    <button id="adminFab" class="fab-btn" onclick="openUpload()">
        <i data-lucide="plus" size="32"></i>
    </button>
  </div>

  <div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:100; border:none; background:var(--card-bg); padding:12px; border-radius:50%; box-shadow: var(--shadow); cursor:pointer;" onclick="closeModal('detailsModal')">
      <i data-lucide="x"></i>
    </button>
    <div class="split-container">
      <div class="view-left">
          <div class="slider-container">
            <button class="slider-btn prev-btn" onclick="moveSlider(-1)"><i data-lucide="chevron-left"></i></button>
            <div class="slider-wrapper" id="sliderWrapper"></div>
            <button class="slider-btn next-btn" onclick="moveSlider(1)"><i data-lucide="chevron-right"></i></button>
          </div>
          <div style="position:absolute; bottom:20px; left:20px; display:flex; gap:10px; z-index:20;">
              <button class="secondary-btn" onclick="downloadFile('png')"><i data-lucide="image"></i> PNG</button>
              <button class="secondary-btn" onclick="downloadFile('pdf')"><i data-lucide="file-text"></i> PDF</button>
          </div>
      </div>
      <div class="view-right">
        <div id="editTitleArea" style="display:none; margin-bottom:15px;">
            <input type="text" id="editName" placeholder="Title">
            <textarea id="editCaption" placeholder="Caption"></textarea>
            <button class="primary-btn" onclick="saveEdits()">Save Changes</button>
        </div>
        <h2 id="detTitle" style="font-weight:900; margin:0; font-size: 28px;"></h2>
        <p id="detCaption" style="color:var(--text-muted); line-height: 1.6;"></p>
        <div id="detTags" style="display:flex; gap:8px; flex-wrap:wrap; margin:15px 0;"></div>
        
        <div style="display:flex; gap:15px; align-items:center; margin:20px 0;">
            <button onclick="handleLike()" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--text); font-weight:800;">
                <i id="likeIcon" data-lucide="heart" fill="none"></i> <span id="detLikeCount">0</span>
            </button>
            <a id="detSource" href="#" target="_blank" class="secondary-btn" style="text-decoration:none;">Visit Original</a>
        </div>

        <div class="comment-section">
            <h4 style="font-weight:900; display:flex; align-items:center; gap:10px;">Comments <i data-lucide="message-circle" size="18"></i></h4>
            <div id="commentList"></div>
            <div style="display:flex; gap:10px; margin-top:15px; position: sticky; bottom: 0; background: var(--card-bg); padding: 10px 0;">
                <input type="text" id="commentInput" placeholder="Add a comment..." style="margin:0;">
                <button class="primary-btn" style="width: auto; padding: 0 20px;" onclick="addComment()"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div id="adminTools" style="display:none; margin-top:30px; padding-top:20px; border-top:1px solid var(--border);">
            <div style="display:flex; gap:20px;">
                <button onclick="toggleEditMode()" style="color:var(--primary); background:none; border:none; cursor:pointer; font-weight:700;">Edit Post</button>
                <button onclick="deleteAsset()" style="color:#ef4444; background:none; border:none; cursor:pointer; font-weight:700;">Delete Post</button>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div id="uploadModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:30px; overflow-y:auto; animation: screenReveal 0.5s ease;">
    <div style="max-width:500px; margin:0 auto; padding-bottom:100px;">
        <div id="upPreview" style="width:100%; height:250px; background:var(--border); border-radius:20px; margin-bottom:20px; overflow:hidden; display:flex; align-items:center; justify-content:center;">
            <p style="color:var(--text-muted);">Preview (First Link)</p>
        </div>
        <h2 style="font-weight: 900;">Post New Asset</h2>
        <input type="text" id="upName" placeholder="Asset Title">
        <textarea id="upLink" placeholder="Image URLs (Paste links, one per line)" onchange="updateUpPreview()" style="height:120px;"></textarea>
        <input type="text" id="upSource" placeholder="Original Website (e.g. Pinterest, Dribbble)">
        <textarea id="upCaption" placeholder="Write a description..."></textarea>
        <input type="text" id="upTags" placeholder="Custom Taglines (comma separated)">
        <p style="font-size:12px; font-weight:800; margin-bottom:5px;">Select Collection</p>
        <select id="upCollection"></select>
        <button class="primary-btn" onclick="postAsset()">Post to PIXS Cloud</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; margin-top:15px; cursor:pointer; font-weight:700;">Cancel</button>
    </div>
  </div>

  <script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const ADMIN_PASS = "iamtheadminofpixs_1227";

    let allAssets = [];
    let currentUserRole = null;
    let activeAssetIdx = null;
    let currentSlide = 0;
    
    // 50 COLLECTIONS
    const COLLECTIONS = ["Nature", "Minimal", "Abstract", "Tech", "Architecture", "Memes", "Educational", "Vintage", "UI Design", "3D Art", "Photography", "Cyberpunk", "Street Art", "Space", "Animals", "Gaming", "Branding", "Typography", "Illustrations", "Interior", "Fashion", "Cars", "Music", "Cinema", "Coding", "Marketing", "Crypto", "Health", "Food", "Travel", "Quotes", "Sketches", "Patterns", "Logos", "Mobile", "Web", "Icons", "Motion", "Anime", "Product", "Aesthetic", "Retrowave", "Surreal", "Vector", "Flat Design", "Dark", "Light", "Gradient", "Glassmorphism", "Neumorphism"];

    window.onload = async () => {
      currentUserRole = localStorage.getItem('pixs_role');
      initCollections();
      if (currentUserRole) { showApp(); await syncFromBin(); } else { showAuth(); }
      setTimeout(() => document.getElementById('loading').classList.add('fade-out'), 1500);
      lucide.createIcons();
    };

    function initCollections() {
        const bar = document.getElementById('collectionsBar');
        const select = document.getElementById('upCollection');
        COLLECTIONS.sort().forEach(c => {
            bar.innerHTML += `<span class="chip" onclick="filterByCollection('${c}')">${c}</span>`;
            select.innerHTML += `<option>${c}</option>`;
        });
    }

    function showAuth() { document.getElementById('auth').style.display = 'block'; }
    function showApp() { 
        document.getElementById('app').style.display = 'block';
        if(currentUserRole === 'admin') document.getElementById('adminFab').style.display = 'flex';
    }

    function checkAuth() {
      if (document.getElementById('accessKey').value === ADMIN_PASS) login('admin');
      else alert("Access Denied");
    }

    function login(role) {
      localStorage.setItem('pixs_role', role);
      location.reload();
    }

    function logoutTrigger() { document.getElementById('logoutConfirm').style.display = 'flex'; }
    function confirmLogout(yes) {
        if(yes) { localStorage.removeItem('pixs_role'); location.reload(); }
        else { document.getElementById('logoutConfirm').style.display = 'none'; }
    }

    /* DATA SYNC */
    async function syncFromBin() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
      const data = await res.json();
      allAssets = data.record.assets || [];
      renderGrid(allAssets);
    }

    async function updateBin() {
      document.getElementById('saving').style.display = 'flex';
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
        body: JSON.stringify({ assets: allAssets })
      });
      document.getElementById('saving').style.display = 'none';
      renderGrid(allAssets);
    }

    function renderGrid(assets) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      assets.forEach((asset, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${(asset.urls && asset.urls.length > 0) ? asset.urls[0] : (asset.url || '')}" loading="lazy">
          <div class="card-info">
            <span style="font-weight:800; font-size:14px;">${asset.name}</span>
            <span style="font-size:12px; opacity:0.6; font-weight:700;"><i data-lucide="heart" size="12"></i> ${asset.likes || 0}</span>
          </div>`;
        card.onclick = () => openDetails(asset, i);
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    /* SLIDER LOGIC */
    function openDetails(asset, i) {
      activeAssetIdx = allAssets.indexOf(asset);
      currentSlide = 0;
      const wrapper = document.getElementById('sliderWrapper');
      wrapper.innerHTML = '';
      
      const urls = asset.urls || [asset.url];
      urls.forEach(u => {
        wrapper.innerHTML += `<div class="slider-item"><img src="${u}" style="max-width:100%; max-height:85vh; object-fit:contain;"></div>`;
      });
      
      updateSliderView();
      document.getElementById('detTitle').innerText = asset.name;
      document.getElementById('detCaption').innerText = asset.caption || "";
      document.getElementById('detLikeCount').innerText = asset.likes || 0;
      document.getElementById('detSource').href = asset.sourceSite || "#";
      
      const tagBox = document.getElementById('detTags');
      tagBox.innerHTML = asset.collection ? `<span class="chip active">${asset.collection}</span>` : '';
      if(asset.tags) asset.tags.forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
      
      renderComments();
      document.getElementById('detailsModal').style.display = 'flex';
      document.getElementById('adminTools').style.display = currentUserRole === 'admin' ? 'block' : 'none';
      lucide.createIcons();
    }

    function moveSlider(dir) {
        const urls = allAssets[activeAssetIdx].urls || [allAssets[activeAssetIdx].url];
        currentSlide = (currentSlide + dir + urls.length) % urls.length;
        updateSliderView();
    }

    function updateSliderView() {
        document.getElementById('sliderWrapper').style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    /* NESTED COMMENTS & LIKES */
    function renderComments() {
        const list = document.getElementById('commentList');
        const comments = allAssets[activeAssetIdx].comments || [];
        list.innerHTML = '';
        comments.forEach((c, idx) => {
            list.innerHTML += createCommentHTML(c, idx, false);
        });
        lucide.createIcons();
    }

    function createCommentHTML(c, idx, isReply) {
        let likes = c.likes || 0;
        let adminBtn = currentUserRole === 'admin' ? `<span onclick="deleteComment(${idx})">Delete</span> <span onclick="editComment(${idx})">Edit</span>` : '';
        let replyBtn = `<span onclick="replyTo(${idx})">Reply</span>`;
        
        let repliesHTML = '';
        if(c.replies) {
            c.replies.forEach((r, rIdx) => {
                repliesHTML += `<div class="comment-thread">${createCommentHTML(r, `${idx}_${rIdx}`, true)}</div>`;
            });
        }

        return `
            <div class="comment" id="com_${idx}">
                <b>${c.user}</b> ${c.text}
                <div class="comment-actions">
                    <span onclick="likeComment('${idx}')"><i data-lucide="heart" size="10"></i> ${likes}</span>
                    ${replyBtn}
                    ${adminBtn}
                </div>
                ${repliesHTML}
            </div>
        `;
    }

    function addComment() {
        const txt = document.getElementById('commentInput').value;
        if(!txt) return;
        if(!allAssets[activeAssetIdx].comments) allAssets[activeAssetIdx].comments = [];
        allAssets[activeAssetIdx].comments.push({ 
            user: currentUserRole.toUpperCase(), 
            text: txt, 
            likes: 0, 
            replies: [] 
        });
        document.getElementById('commentInput').value = '';
        renderComments();
        updateBin();
    }

    function handleLike() {
        // Unique Like Logic (Session based)
        const likedKey = `liked_${activeAssetIdx}`;
        if(localStorage.getItem(likedKey)) return alert("Already liked!");
        
        allAssets[activeAssetIdx].likes = (allAssets[activeAssetIdx].likes || 0) + 1;
        document.getElementById('detLikeCount').innerText = allAssets[activeAssetIdx].likes;
        document.getElementById('likeIcon').setAttribute('fill', '#ef4444');
        localStorage.setItem(likedKey, 'true');
        updateBin();
    }

    /* ADMIN ACTIONS */
    function toggleEditMode() {
        const area = document.getElementById('editTitleArea');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
        document.getElementById('editName').value = allAssets[activeAssetIdx].name;
        document.getElementById('editCaption').value = allAssets[activeAssetIdx].caption || "";
    }

    async function saveEdits() {
        allAssets[activeAssetIdx].name = document.getElementById('editName').value;
        allAssets[activeAssetIdx].caption = document.getElementById('editCaption').value;
        await updateBin();
        openDetails(allAssets[activeAssetIdx], activeAssetIdx);
        toggleEditMode();
    }

    async function deleteComment(idx) {
        if(confirm("Delete this comment?")) {
            allAssets[activeAssetIdx].comments.splice(idx, 1);
            await updateBin();
            renderComments();
        }
    }

    /* CORE UTILS - DON'T TOUCH ORIGINAL LOGIC */
    function updateUpPreview() {
        const val = document.getElementById('upLink').value.split('\n')[0];
        if(val) document.getElementById('upPreview').innerHTML = `<img src="${val}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    async function postAsset() {
        const asset = {
            name: document.getElementById('upName').value,
            urls: document.getElementById('upLink').value.split('\n').filter(l => l.trim() !== ""),
            caption: document.getElementById('upCaption').value,
            sourceSite: document.getElementById('upSource').value,
            collection: document.getElementById('upCollection').value,
            tags: document.getElementById('upTags').value.split(',').map(t => t.trim()),
            date: Date.now(),
            likes: 0,
            comments: []
        };
        allAssets.unshift(asset);
        await updateBin();
        closeModal('uploadModal');
    }

    function deleteAsset() {
        if(confirm("Permanently delete this asset?")) {
            allAssets.splice(activeAssetIdx, 1);
            updateBin();
            closeModal('detailsModal');
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openUpload() { document.getElementById('uploadModal').style.display = 'block'; }
    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }
    
    // Original search/filter logic kept unchanged
    function smartSearch(val) {
        const query = val.toLowerCase();
        if(query.length > 0) document.getElementById('searchBackBtn').style.display = 'block';
        const filtered = allAssets.filter(a => a.name.toLowerCase().includes(query) || (a.caption || "").toLowerCase().includes(query));
        renderGrid(filtered);
    }

    function filterByCollection(tag) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if(tag === 'All') renderGrid(allAssets);
        else renderGrid(allAssets.filter(a => a.collection === tag));
    }
  </script>
</body>
</html>
