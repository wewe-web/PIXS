<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 🌙 DARK MODE VARIABLES */
        body.dark-mode {
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .screen { display: none; min-height: 100vh; animation: screenReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenReveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #loading, .saving-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .saving-overlay { background: rgba(0,0,0,0.7); display: none; z-index: 5000; backdrop-filter: blur(8px); color: white; }

        /* 🌓 THEME TOGGLE */
        .theme-btn {
            position: absolute; top: 15px; left: 20px;
            background: none; border: none; cursor: pointer; color: var(--text);
            z-index: 101; transition: var(--transition);
        }

        /* 🏠 PREMIUM HEADER */
        .home-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 0 6px 0;
            background: var(--glass); position: sticky;
            top: 0; z-index: 100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .main-logo { width: 32px; height: 32px; margin-bottom: 8px; }
        
        .search-box {
            width: 90%; max-width: 500px; background: var(--border);
            display: flex; align-items: center; padding: 10px 18px; border-radius: 30px; margin-bottom: 8px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .search-box input { border: none; background: none; width: 100%; margin-left: 10px; outline: none; color: var(--text); }

        .chip { padding: 6px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text); cursor: pointer; transition: var(--transition); }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 🖼️ GRID */
        .grid { columns: 4; column-gap: 16px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; display: block; }

        /* ⚡ DROP ZONE */
        #dropZone {
            position: fixed; inset: 0; background: rgba(47, 109, 246, 0.2);
            backdrop-filter: blur(10px); z-index: 6000; display: none;
            border: 4px dashed var(--primary); margin: 20px; border-radius: 40px;
            align-items: center; justify-content: center; pointer-events: none;
        }

        /* 🪄 DYNAMIC DETAILS */
        #detailsModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; animation: fullSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-right { flex: 0.8; padding: 30px; background: var(--card-bg); color: var(--text); border-radius: 40px 40px 0 0; margin-top: -40px; transition: border-top 0.8s ease; }

        .primary-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); margin-bottom: 10px;}
        input, textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px;}

        @media (min-width: 800px) {
            .view-right { flex: 0.6; margin-top: 0; border-radius: 0; border-left: 1px solid var(--border); }
            .split-container { display: flex; height: 100%; }
        }
        
        @keyframes fullSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fullSlideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()"><i id="themeIcon" data-lucide="moon"></i></button>

<div id="loading">
    <img src="logo.png" style="width: 60px;">
    <p style="margin-top: 15px; font-weight: 700; color: var(--primary);">PIXS EVOLVED</p>
</div>

<div id="dropZone">
    <div style="text-align: center; color: var(--primary);">
        <i data-lucide="upload-cloud" size="60"></i>
        <h2 style="font-weight: 800;">Drop to Post to PIXS</h2>
    </div>
</div>

<div id="saving" class="saving-overlay">
    <div style="border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; width: 30px; height: 30px; animation: spin 0.8s linear infinite;"></div>
    <p style="margin-top: 15px; font-weight: 600;">Updating Cloud...</p>
</div>

<div id="auth" class="screen" style="background: var(--bg);">
    <div style="height: 45vh; background: url('headerauth.png') center/cover;"></div>
    <div style="padding: 40px; background: var(--card-bg); border-radius: 40px 40px 0 0; margin-top: -40px; text-align: center;">
        <h2 style="font-weight: 800;">Access PIXS</h2>
        <input type="password" id="accessKey" placeholder="Private Key">
        <button class="primary-btn" onclick="checkAuth()">Login</button>
    </div>
</div>

<div id="app" class="screen">
    <header class="home-header">
        <img src="logo.png" class="main-logo">
        <div class="search-box">
            <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
            <input type="text" id="searchInput" placeholder="Search premium assets...">
        </div>
        <div class="collections-wrapper" id="homeCollections" style="display:flex; gap:10px; overflow-x:auto; width:90%; padding:10px 0; scrollbar-width:none;"></div>
    </header>

    <div id="grid" class="grid"></div>
    <div style="position: fixed; bottom: 30px; right: 30px; display:flex; gap:15px;">
        <div style="background: var(--primary); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; cursor:pointer; box-shadow: var(--shadow);" onclick="openUpload()"><i data-lucide="plus"></i></div>
    </div>
</div>

<div id="detailsModal">
    <button style="position:absolute; top:20px; right:20px; z-index:10; border:none; background:rgba(0,0,0,0.5); color:white; padding:10px; border-radius:50%; cursor:pointer;" onclick="closeModal('detailsModal')"><i data-lucide="x"></i></button>
    <div class="split-container">
        <div style="flex:1.4; background:#000; display:flex; align-items:center; justify-content:center;">
            <img id="detImg" src="" style="max-width:100%; max-height:100%;">
        </div>
        <div class="view-right" id="detPanel">
            <h2 id="detTitle" style="font-weight:900; font-size:32px; margin-bottom:10px;"></h2>
            <p id="detCaption" style="color: var(--text-muted);"></p>
            <div id="detTags" style="display:flex; gap:8px; margin: 20px 0; flex-wrap:wrap;"></div>
            
            <button class="primary-btn" id="dynamicBtn" onclick="visitOriginal()">Visit Original</button>
            <div style="display:flex; gap:10px;">
                <button class="primary-btn" style="background:#10b981;" onclick="downloadPNG()">PNG</button>
                <button class="primary-btn" style="background:#ef4444;" onclick="downloadPDF()">PDF</button>
            </div>
            
            <div style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px; display:flex; gap:10px;">
                <button onclick="editCurrentAsset()" style="flex:1; background:none; border:1px solid var(--border); color:var(--text); padding:10px; border-radius:12px; cursor:pointer;">Edit</button>
                <button onclick="deleteCurrentAsset()" style="flex:1; background:none; border:1px solid #ef4444; color:#ef4444; padding:10px; border-radius:12px; cursor:pointer;">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="uploadModal" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; padding:40px; overflow-y:auto;">
    <div style="max-width:500px; margin:0 auto;">
        <h2 id="modalTitle" style="text-align:center; font-weight:900;">Upload</h2>
        <input type="text" id="upName" placeholder="Asset Title">
        <input type="text" id="upLink" placeholder="Image URL">
        <textarea id="upCaption" placeholder="Description"></textarea>
        <div id="modalTags" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:20px; background:var(--card-bg); padding:10px; border-radius:15px; border:1px solid var(--border);"></div>
        <button class="primary-btn" onclick="postAsset()">Save to PIXS</button>
        <button onclick="closeModal('uploadModal')" style="width:100%; background:none; border:none; color:var(--text-muted); cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const BIN_ID = "69c90b42ed015c742bc9240a";
    const API_KEY = "$2a$10$sNCC8H0eDz90JN9ha9ORGe4mbISKfuRKzcvb71lDyLSwx8omK0d86";
    const AUTH_KEY = "qwerty_1227_pics_xioleng";

    let allAssets = [];
    let selectedTags = [];
    let editIndex = null;
    const colorThief = new ColorThief();

    const collectionList = ["Nature", "Minimal", "Abstract", "Wallpapers", "Technology", "Space", "Art", "Cyberpunk", "Vintage"];

    window.onload = async () => {
        lucide.createIcons();
        if(localStorage.getItem('pixs_dark') === 'true') toggleTheme(true);
        if(localStorage.getItem('pixs_signed_in') === 'true') {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            await syncFromBin();
        }
        document.getElementById('loading').style.display = 'none';
        renderHomeCollections();
        setupDragAndDrop();
    };

    // 🌓 THEME LOGIC
    function toggleTheme(init = false) {
        const isDark = document.body.classList.toggle('dark-mode');
        if(!init) localStorage.setItem('pixs_dark', isDark);
        const icon = document.getElementById('themeIcon');
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    // 🪄 DYNAMIC BRANDING LOGIC
    async function openDetails(data, index) {
        editIndex = index;
        document.getElementById('detTitle').innerText = data.name;
        document.getElementById('detCaption').innerText = data.caption || "";
        const img = document.getElementById('detImg');
        img.crossOrigin = "Anonymous";
        img.src = data.url;

        // Extract color once loaded
        img.onload = () => {
            try {
                const color = colorThief.getColor(img);
                const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                document.getElementById('detPanel').style.borderTop = `8px solid ${rgb}`;
                document.getElementById('dynamicBtn').style.background = rgb;
            } catch (e) { console.log("Color extraction failed - likely CORS"); }
        };

        const tagBox = document.getElementById('detTags');
        tagBox.innerHTML = '';
        (data.tags || []).forEach(t => tagBox.innerHTML += `<span class="chip">${t}</span>`);
        
        document.getElementById('detailsModal').style.display = 'block';
        lucide.createIcons();
    }

    // ⚡ DRAG & DROP LOGIC
    function setupDragAndDrop() {
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('dropZone').style.display = 'flex';
        });
        window.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) document.getElementById('dropZone').style.display = 'none';
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('dropZone').style.display = 'none';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    openUpload();
                    document.getElementById('upLink').value = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // (Basic Logic functions - same as before but updated for new UI IDs)
    function checkAuth() {
        if(document.getElementById('accessKey').value === AUTH_KEY) {
            localStorage.setItem('pixs_signed_in', 'true');
            location.reload();
        }
    }

    async function syncFromBin() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY }});
        const data = await res.json();
        allAssets = data.record.assets || [];
        renderGrid(allAssets);
    }

    function renderGrid(assets) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        assets.forEach((asset, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${asset.url}" loading="lazy">`;
            card.onclick = () => openDetails(asset, allAssets.indexOf(asset));
            grid.appendChild(card);
        });
    }

    function renderHomeCollections() {
        const wrapper = document.getElementById('homeCollections');
        collectionList.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = cat;
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                renderGrid(allAssets.filter(a => a.tags?.includes(cat)));
            };
            wrapper.appendChild(chip);
        });
    }

    function openUpload() {
        document.getElementById('uploadModal').style.display = 'block';
        renderModalTags();
    }

    function renderModalTags() {
        const container = document.getElementById('modalTags');
        container.innerHTML = '';
        collectionList.forEach(cat => {
            const tag = document.createElement('div');
            tag.className = `chip ${selectedTags.includes(cat) ? 'active' : ''}`;
            tag.innerText = cat;
            tag.onclick = () => {
                tag.classList.toggle('active');
                selectedTags.includes(cat) ? selectedTags = selectedTags.filter(t => t !== cat) : selectedTags.push(cat);
            };
            container.appendChild(tag);
        });
    }

    async function postAsset() {
        document.getElementById('saving').style.display = 'flex';
        const asset = {
            name: document.getElementById('upName').value,
            url: document.getElementById('upLink').value,
            caption: document.getElementById('upCaption').value,
            tags: [...selectedTags]
        };
        if(editIndex !== null) allAssets[editIndex] = asset;
        else allAssets.push(asset);
        
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
            body: JSON.stringify({ assets: allAssets })
        });
        location.reload();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; editIndex = null; selectedTags = []; }
    function visitOriginal() { window.open(document.getElementById('detImg').src, '_blank'); }
</script>
</body>
</html>
