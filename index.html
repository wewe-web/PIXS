<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXS | Premium Assets</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2f6df6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.5s ease; overflow-x: hidden;
        }

        /* --- AESTHETIC TRANSITIONS --- */
        .screen { 
            display: none; 
            opacity: 0; 
            transform: translateY(20px) scale(0.98);
            transition: var(--transition);
            min-height: 100vh;
        }

        .screen.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0) scale(1);
        }

        /* --- LOADING --- */
        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; transition: 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        /* --- HEADER & NAV --- */
        .home-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg); border-bottom: 1px solid var(--border);
            padding: 15px 0; backdrop-filter: blur(10px);
        }
        .header-top { 
            display: flex; align-items: center; gap: 15px; 
            width: 90%; max-width: 1200px; margin: 0 auto; 
        }
        .search-box {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border);
            display: flex; align-items: center; padding: 10px 20px; border-radius: 30px;
        }
        .search-box input { border: none; background: none; width: 100%; outline: none; color: var(--text); margin-left: 10px; }

        .collections-bar {
            width: 90%; max-width: 1200px; margin: 15px auto 0;
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none;
        }
        .chip {
            padding: 8px 20px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap;
            cursor: pointer; transition: var(--transition);
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- GRID --- */
        .grid { 
            columns: 4; column-gap: 20px; padding: 20px; 
            max-width: 1200px; margin: 0 auto; 
        }
        .card {
            break-inside: avoid; margin-bottom: 20px; border-radius: var(--radius);
            background: var(--card-bg); overflow: hidden; box-shadow: var(--shadow);
            transition: var(--transition); cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; display: block; }

        /* --- ADD ICON BUTTON (FAB) --- */
        #adminFab {
            position: fixed; bottom: 30px; right: 30px; z-index: 500;
            display: none; /* Only visible for Admin */
        }
        .fab {
            width: 65px; height: 65px; background: var(--primary); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(47, 109, 246, 0.4); cursor: pointer;
            transition: var(--transition);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: none; opacity: 0; transform: scale(1.1);
            transition: var(--transition); overflow-y: auto;
        }
        .modal.active { display: block; opacity: 1; transform: scale(1); }

        .btn-primary {
            background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer;
            margin-top: 10px; transition: var(--transition);
        }
        
        .theme-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 10px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i id="themeIcon" data-lucide="moon"></i>
    </button>

    <div id="loading">
        <div style="width: 50px; height: 50px; border: 4px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <h2 style="letter-spacing: 3px; margin-top: 20px; font-weight: 900;">PIXS</h2>
    </div>

    <div id="authScreen" class="screen active">
        <div style="height: 40vh; background: linear-gradient(45deg, #2f6df6, #8e44ad); display: flex; align-items: center; justify-content: center; color: white;">
            <h1 style="font-size: 48px; font-weight: 900;">PIXS</h1>
        </div>
        <div style="max-width: 400px; margin: -50px auto 0; background: var(--card-bg); padding: 40px; border-radius: 40px; text-align: center; box-shadow: var(--shadow);">
            <h2 style="margin-bottom: 5px;">Welcome</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Select your access level</p>
            
            <button class="btn-primary" onclick="login('guest')" style="background: var(--border); color: var(--text); margin-bottom: 10px;">Guest Access</button>
            <button class="btn-primary" onclick="showAdminLogin()">Administrator</button>

            <div id="adminPassArea" style="display: none; margin-top: 20px;">
                <input type="password" id="adminPass" placeholder="Enter Password" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box;">
                <button class="btn-primary" onclick="login('admin')">Verify Admin</button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="screen">
        <header class="home-header">
            <div class="header-top">
                <h2 style="font-weight: 900; color: var(--primary); margin: 0; cursor: pointer;" onclick="location.reload()">PIXS</h2>
                <div class="search-box">
                    <i data-lucide="search" size="18"></i>
                    <input type="text" placeholder="Search collections...">
                </div>
                <i data-lucide="bell" style="cursor: pointer;"></i>
            </div>
            
            <div class="collections-bar">
                <div class="chip active">All Collections</div>
                <div class="chip">UI Layouts</div>
                <div class="chip">Mobile Apps</div>
                <div class="chip">Branding</div>
                <div class="chip">Typography</div>
            </div>
        </header>

        <div class="grid">
            <div class="card"><img src="https://picsum.photos/400/600?random=1"></div>
            <div class="card"><img src="https://picsum.photos/400/300?random=2"></div>
            <div class="card"><img src="https://picsum.photos/400/500?random=3"></div>
            <div class="card"><img src="https://picsum.photos/400/400?random=4"></div>
        </div>

        <div id="adminFab">
            <div class="fab" onclick="toggleModal('uploadModal', true)">
                <i data-lucide="plus" size="32"></i>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div style="max-width: 500px; margin: 50px auto; padding: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-weight: 900;">New Asset</h2>
                <i data-lucide="x" onclick="toggleModal('uploadModal', false)" style="cursor: pointer;"></i>
            </div>
            <div style="height: 200px; border: 2px dashed var(--border); border-radius: 20px; margin: 20px 0; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--text-muted);">
                <i data-lucide="image" size="40"></i>
                <p>Click to upload image</p>
            </div>
            <input type="text" placeholder="Asset Title" style="width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box;">
            <textarea placeholder="Description" style="width: 100%; padding: 15px; height: 100px; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box;"></textarea>
            <button class="btn-primary">Post to PIXS Cloud</button>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // 1. Loading Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        });

        // 2. Auth Logic
        function showAdminLogin() {
            document.getElementById('adminPassArea').style.display = 'block';
        }

        function login(role) {
            // Aesthetic Transition to App
            const auth = document.getElementById('authScreen');
            const app = document.getElementById('appScreen');
            
            auth.style.opacity = '0';
            auth.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                auth.classList.remove('active');
                app.classList.add('active');
                
                if(role === 'admin') {
                    document.getElementById('adminFab').style.display = 'block';
                }
            }, 500);
        }

        // 3. Modal Logic
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if(show) {
                modal.style.display = 'block';
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 500);
            }
        }

        // 4. Theme Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
